<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="favicon.png">
<title>wai-lau.net</title>
<style>
  @font-face {
    font-family: 'SpaceSpeed';
    src: url('SpaceSpeed.otf') format('opentype');
    unicode-range: U+0000-00FF;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .bg-wide {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    background: url('bg.jpg') center center / 100% auto no-repeat;
    filter: brightness(0.2);
    z-index: 0;
  }
  .bg-tall {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    background: url('bg.jpg') center center / auto 100% no-repeat;
    z-index: 1;
  }
  a {
    position: relative;
    z-index: 2;
    font-family: 'SpaceSpeed', sans-serif;
    font-size: clamp(4rem, 10vw, 16rem);
    color: rgba(232, 157, 194, 0.7);
    text-decoration: none;
    text-align: center;
    line-height: 1.05;
    font-weight: bold;
    mix-blend-mode: screen;
    text-shadow: 0 0 60px rgba(232, 57, 154, 0.8);
    transition: color 0.2s, text-shadow 0.2s;
  }
  a:hover {
    color: rgba(232, 57, 154, 0.4);
    text-shadow: 0 0 60px rgba(232, 57, 154, 0.4);
  }
</style>
</head>
<body>
  <div class="bg-wide"></div>
  <div class="bg-tall"></div>
  <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank">媁</a>
</body>
</html>
