<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="icon" type="image/png" href="favicon.png">
<title>wai-lau.net</title>
<style>
  @font-face { font-family:'Iosevka Mayukai Monolite'; src:url('/fonts/Iosevka Mayukai Monolite Nerd Font Complete.ttf') format('truetype'); font-weight:400; font-style:normal; font-display:swap; }
  @font-face { font-family:'Iosevka Mayukai Monolite'; src:url('/fonts/Iosevka Mayukai Monolite Italic Nerd Font Complete.ttf') format('truetype'); font-weight:400; font-style:italic; font-display:swap; }
  @font-face { font-family:'Iosevka Mayukai Monolite'; src:url('/fonts/Iosevka Mayukai Monolite Medium Nerd Font Complete.ttf') format('truetype'); font-weight:500; font-style:normal; font-display:swap; }
  @font-face { font-family:'Iosevka Mayukai Monolite'; src:url('/fonts/Iosevka Mayukai Monolite Medium Italic Nerd Font Complete.ttf') format('truetype'); font-weight:500; font-style:italic; font-display:swap; }
  @font-face { font-family:'Iosevka Mayukai Monolite'; src:url('/fonts/Iosevka Mayukai Monolite Semibold Nerd Font Complete.ttf') format('truetype'); font-weight:600; font-style:normal; font-display:swap; }
  @font-face { font-family:'Iosevka Mayukai Monolite'; src:url('/fonts/Iosevka Mayukai Monolite Semibold Italic Nerd Font Complete.ttf') format('truetype'); font-weight:600; font-style:italic; font-display:swap; }
  @font-face { font-family:'Iosevka Mayukai Monolite'; src:url('/fonts/Iosevka Mayukai Monolite Bold Nerd Font Complete.ttf') format('truetype'); font-weight:700; font-style:normal; font-display:swap; }
  @font-face { font-family:'Iosevka Mayukai Monolite'; src:url('/fonts/Iosevka Mayukai Monolite Bold Italic Nerd Font Complete.ttf') format('truetype'); font-weight:700; font-style:italic; font-display:swap; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Iosevka Mayukai Monolite', monospace;
    font-weight: 500;
    background: #000;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
</style>
<style id="login-styles">
  .login-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    position: relative;
    z-index: 2;
  }
  .login-wrap img {
    width: 120px;
    opacity: 0.9;
    display: block;
  }
  .login-box {
    background: transparent;
    border: none;
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .login-box input[type=password] {
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(224, 74, 125, 0.4);
    color: rgb(224, 74, 125);
    font-family: 'Iosevka Mayukai Monolite', monospace;
    font-weight: 500;
    font-size: 0.95rem;
    padding: 4px 2px;
    outline: none;
    width: 160px;
    text-align: center;
  }
  .login-box input[type=password]::placeholder { color: rgba(224, 74, 125, 0.35); }
  .login-box input[type=password]:focus { border-bottom-color: rgba(224, 74, 125, 0.4); }
</style>
</head>
<body>
  <div class="login-wrap">
    <img src="/favicon.png">
    <form class="login-box" method="POST" action="/login">
      <input type="password" name="key" placeholder="access-key" autocomplete="current-password" autofocus enterkeyhint="go">
      <button type="submit" style="display:none"></button>
    </form>
  </div>
  <audio src="/nightfall-game/audio/lmm-intro.mp3" autoplay></audio>
</body>
</html>
