<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="favicon.png">
<title>wai-lau.net</title>
<style>
  @font-face {
    font-family: 'SpaceSpeed';
    src: url('SpaceSpeed.otf') format('opentype');
    unicode-range: U+0000-00FF;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
    overflow: hidden;
  }
  .bg-wide {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    background: url('IMG_25419.png') center center / 100% auto no-repeat;
    filter: brightness(0.2) hue-rotate(150deg);
    z-index: 0;
  }
  .bg-tall {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    background: url('IMG_25419.png') center center / auto 100% no-repeat;
    z-index: 1;
  }
  a {
    position: relative;
    z-index: 2;
    font-family: 'SpaceSpeed', sans-serif;
    font-size: clamp(4rem, 10vw, 16rem);
    color: rgba(232, 157, 194, 0.7);
    text-decoration: none;
    text-align: center;
    line-height: 1.05;
    font-weight: bold;
    mix-blend-mode: screen;
    text-shadow: 0 0 60px rgba(232, 57, 154, 0.8);
    transition: color 0.2s, text-shadow 0.2s;
  }
  a:hover {
    color: rgba(232, 57, 154, 0.4);
    text-shadow: 0 0 60px rgba(232, 57, 154, 0.4);
  }
  .login-box {
    position: relative;
    z-index: 2;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    padding: 20px 24px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .login-box input[type=password] {
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255, 255, 255, 0.3);
    color: rgba(232, 157, 194, 0.9);
    font-family: monospace;
    font-size: 0.95rem;
    padding: 4px 2px;
    outline: none;
    width: 160px;
  }
  .login-box input[type=password]::placeholder { color: rgba(255,255,255,0.2); }
  .login-box input[type=password]:focus { border-bottom-color: rgba(232, 157, 194, 0.7); }
  .login-box button {
    background: none;
    border: 1px solid rgba(232, 157, 194, 0.4);
    color: rgba(232, 157, 194, 0.7);
    font-family: monospace;
    font-size: 0.85rem;
    padding: 4px 14px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .login-box button:hover {
    border-color: rgba(232, 157, 194, 0.9);
    color: rgba(232, 157, 194, 1);
  }
</style>
</head>
<body>
  <div class="bg-wide"></div>
  <div class="bg-tall"></div>
  <form class="login-box" method="POST" action="/login">
    <input type="password" name="key" placeholder="key" autocomplete="current-password">
    <button type="submit">→</button>
  </form>
</body>
</html>
