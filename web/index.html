<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="icon" type="image/png" href="favicon.png?v=3">
<title>wai-lau.net</title>
<style>
  /* woff2 subsets (api/scripts/subset_cv_fonts.py) — were ~11MB Nerd-Font TTFs each. 600/700 italic dropped (no italic text renders at those weights). */
  @font-face { font-family:'Iosevka Mayukai Monolite'; src:url('/fonts/iosevka-400.woff2?v=1') format('woff2'); font-weight:400; font-style:normal; font-display:swap; }
  @font-face { font-family:'Iosevka Mayukai Monolite'; src:url('/fonts/iosevka-400-italic.woff2?v=1') format('woff2'); font-weight:400; font-style:italic; font-display:swap; }
  @font-face { font-family:'Iosevka Mayukai Monolite'; src:url('/fonts/iosevka-500.woff2?v=1') format('woff2'); font-weight:500; font-style:normal; font-display:swap; }
  @font-face { font-family:'Iosevka Mayukai Monolite'; src:url('/fonts/iosevka-500-italic.woff2?v=1') format('woff2'); font-weight:500; font-style:italic; font-display:swap; }
  @font-face { font-family:'Iosevka Mayukai Monolite'; src:url('/fonts/iosevka-600.woff2?v=1') format('woff2'); font-weight:600; font-style:normal; font-display:swap; }
  @font-face { font-family:'Iosevka Mayukai Monolite'; src:url('/fonts/iosevka-700.woff2?v=1') format('woff2'); font-weight:700; font-style:normal; font-display:swap; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Iosevka Mayukai Monolite', monospace;
    font-weight: 500;
    background: #000;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
</style>
<style id="login-styles">
  .login-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    position: relative;
    z-index: 2;
  }
  .login-wrap img {
    width: 120px;
    opacity: 0.9;
    display: block;
  }
  .login-box {
    background: transparent;
    border: none;
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .login-box input[type=password] {
    background: transparent;
    border: none;
    border-bottom: 1px solid hsl(var(--pink-hsl) / 0.25);
    color: hsl(var(--pink-hsl));
    font-family: 'Iosevka Mayukai Monolite', monospace;
    font-weight: 500;
    font-size: 0.95rem;
    padding: 4px 2px;
    outline: none;
    width: 160px;
    text-align: center;
  }
  .login-box input[type=password]::placeholder { color: hsl(var(--pink-hsl) / 0.25); }
  .login-box input[type=password]:focus { border-bottom-color: hsl(var(--pink-hsl) / 0.25); }
  .login-box button.submit {
    margin-top: 14px;
    background: transparent;
    border: 1px solid hsl(var(--pink-hsl) / 0.25);
    color: hsl(var(--pink-hsl) / 0.8);
    font-family: 'Iosevka Mayukai Monolite', monospace;
    font-weight: 500;
    font-size: 1rem;
    line-height: 1;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    outline: none;
  }
  .login-box button.submit:hover, .login-box button.submit:focus {
    color: hsl(var(--pink-hsl));
    border-color: hsl(var(--pink-hsl) / 0.8);
  }
</style>
</head>
<body>
  <div class="login-wrap">
    <img src="/favicon.png?v=3">
    <form class="login-box" method="POST" action="/login">
      <input type="text" name="username" value="admin" autocomplete="username"
        aria-hidden="true" tabindex="-1"
        style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none">
      <input type="password" name="key" placeholder="access-key" autocomplete="current-password" autofocus enterkeyhint="go">
      <input type="hidden" name="next">
      <button type="submit" class="submit" aria-label="submit">▼</button>
    </form>
  </div>
  <script>
    (function(){
      var n = new URLSearchParams(location.search).get('next');
      if (!n) return;
      var f = document.querySelector('form.login-box input[name="next"]');
      if (f) f.value = n;
    })();
  </script>
</body>
</html>
