services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./api/data:/app/data
      - ./mtg/data:/app/mtg/data
      - ./nightfall-incident:/app/nightfall
      - rmapi-auth:/root/.config/rmapi
      - gcal-auth:/root/.config/gcal

volumes:
  rmapi-auth:
  gcal-auth:
