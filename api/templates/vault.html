
<style>
.vault-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  width: min(1200px, 96vw);
  margin: 0 auto;
}
.vault-card {
  display: flex; flex-direction: column; gap: 6px;
}
.vault-label {
  font-family: 'Iosevka Mayukai Monolite', monospace; font-size: 0.72rem; font-weight: bold;
  color: rgba(0,255,65,0.85); letter-spacing: 0.06em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.vault-thumb {
  width: 100%; aspect-ratio: 3/4; object-fit: cover; object-position: top;
  border: 1px solid rgba(0,255,65,0.15); cursor: zoom-in;
  display: block;
}
.vault-thumb:hover { border-color: rgba(0,255,65,0.5); }

#lightbox {
  display: none; position: fixed; inset: 0; z-index: 999;
  background: rgba(0,0,0,0.92); cursor: zoom-out;
  align-items: center; justify-content: center;
}
#lightbox.open { display: flex; }
#lb-img { max-height: 95vh; max-width: 95vw; object-fit: contain; cursor: default; }
#lb-close {
  position: fixed; top: 16px; right: 24px;
  background: none; border: none; color: rgba(0,255,65,0.35);
  font-family: 'Iosevka Mayukai Monolite', monospace; font-size: 0.8rem; cursor: pointer; padding: 4px 8px;
}
#lb-close:hover { color: rgba(0,255,65,0.8); }
</style>

<div id="lightbox" onclick="closeLightbox()">
  <button id="lb-close" onclick="closeLightbox()">[x] close</button>
  <img id="lb-img" src="" onclick="event.stopPropagation()">
</div>

<div id="content" style="width:min(1200px,96vw)">
  <div class="vault-grid" id="files"><span style="opacity:0.4;font-size:0.8rem">loading...</span></div>
</div>

<script>
function openLightbox(src) {
  document.getElementById('lb-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
});

async function load() {
  const [archiveRes, cacheRes] = await Promise.all([fetch('/api/archive'), fetch('/api/cache')]);
  const pdfs = archiveRes.ok ? await archiveRes.json() : [];
  const cached = cacheRes.ok ? await cacheRes.json() : [];
  const el = document.getElementById('files');
  el.className = '';
  if (!pdfs.length && !cached.length) { el.innerHTML = '<p style="opacity:0.4;font-size:0.8rem">no files yet</p>'; return; }
  el.className = 'vault-grid';
  const pdfCards = pdfs.map(f => {
    const showPages = f.pages > 2 ? 1 : f.pages;
    const thumbs = Array.from({length: showPages}, (_, i) =>
      `<img class="vault-thumb" src="/api/archive/${f.filename}/page/${i}" loading="lazy"
        onclick="openLightbox('/api/archive/${f.filename}/page/${i}')">`
    ).join('');
    return `<div class="vault-card"><div class="vault-label">${f.label}</div>${thumbs}</div>`;
  });
  const cacheCards = cached.map(f =>
    `<div class="vault-card"><div class="vault-label">${f.label}</div>${
      f.pages.map(src => `<img class="vault-thumb" src="${src}" loading="lazy" onclick="openLightbox('${src}')">`).join('')
    }</div>`
  );
  el.innerHTML = [...pdfCards, ...cacheCards].join('');
}
load();
</script>
