
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
body { overflow-y: auto !important; }
#dbg-moltbook h1,#dbg-moltbook h2,#dbg-moltbook h3 {
  font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.12em;
  color: hsl(var(--green-hsl) / 0.55); border-bottom: 1px solid hsl(var(--green-hsl) / 0.1);
  padding-bottom: 4px; margin: 18px 0 8px; font-weight: normal;
}
#dbg-moltbook p { font-size: 0.78rem; color: hsl(var(--green-hsl) / 0.8); margin: 6px 0; line-height: 1.5; }
#dbg-moltbook ul,#dbg-moltbook ol { font-size: 0.78rem; color: hsl(var(--green-hsl) / 0.8); margin: 4px 0 4px 16px; padding: 0; }
#dbg-moltbook li { margin: 3px 0; }
#dbg-moltbook strong { color: hsl(var(--green-hsl) / 1); font-weight: bold; }
#dbg-moltbook em { color: hsl(var(--green-hsl) / 0.6); font-style: normal; opacity: 0.8; }
#dbg-moltbook hr { border: none; border-top: 1px solid hsl(var(--green-hsl) / 0.15); margin: 14px 0; }
#dbg-moltbook code { font-family: inherit; font-size: 0.72rem; color: hsl(var(--green-hsl) / 0.6); background: hsl(var(--green-hsl) / 0.06); padding: 1px 4px; border-radius: 2px; }
#dbg-moltbook pre { background: hsl(var(--green-hsl) / 0.04); border: 1px solid hsl(var(--green-hsl) / 0.1); border-radius: 3px; padding: 10px 12px; margin: 8px 0; overflow-x: auto; }
#dbg-moltbook pre code { background: none; padding: 0; font-size: 0.73rem; color: hsl(var(--green-hsl) / 0.75); white-space: pre-wrap; word-break: break-all; }
#dbg-moltbook table { font-size: 0.72rem; border-collapse: collapse; margin: 8px 0; }
#dbg-moltbook th { color: hsl(var(--green-hsl) / 0.5); border-bottom: 1px solid hsl(var(--green-hsl) / 0.2); padding: 3px 10px 3px 0; font-weight: normal; text-align: left; }
#dbg-moltbook td { color: hsl(var(--green-hsl) / 0.75); padding: 2px 10px 2px 0; border-bottom: 1px solid hsl(var(--green-hsl) / 0.05); }
#dbg-moltbook a { color: hsl(var(--cyan-hsl)); }
.dbg-wrap { width: min(860px, 94vw); margin: 24px auto 100px; }
.dbg-section { margin-bottom: 36px; }
.dbg-hdr {
  font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.18em;
  color: hsl(var(--green-hsl) / 0.5); border-bottom: 1px solid hsl(var(--green-hsl) / 0.12);
  padding-bottom: 6px; margin-bottom: 14px;
}
.dbg-note {
  font-size: 0.8rem; padding: 7px 0;
  border-bottom: 1px solid hsl(var(--green-hsl) / 0.07);
  display: flex; gap: 14px; align-items: baseline;
}
.dbg-note-date { font-size: 0.65rem; color: hsl(var(--green-hsl) / 0.4); flex-shrink: 0; }
.dbg-note-text { color: hsl(var(--green-hsl) / 0.85); flex: 1; }
.dbg-note-x {
  background: none; border: none; cursor: pointer; padding: 0 2px;
  font-size: 0.75rem; color: hsl(var(--green-hsl) / 0.25); line-height: 1;
  flex-shrink: 0; margin-left: auto; transition: color 0.15s;
}
.dbg-note-x:hover { color: hsl(var(--green-hsl) / 0.7); }
.dbg-note-edit {
  flex: 1; background: hsl(var(--green-hsl) / 0.05); border: 1px solid hsl(var(--green-hsl) / 0.25);
  color: hsl(var(--green-hsl) / 0.9); font-family: inherit; font-size: 0.8rem;
  padding: 4px 6px; resize: vertical; min-height: 2em; outline: none;
}
.dbg-note-edit:focus { border-color: hsl(var(--green-hsl) / 0.5); }
.dbg-note-actions { display: flex; gap: 6px; flex-shrink: 0; }
.dbg-note-save, .dbg-note-del {
  background: none; border: none; cursor: pointer; padding: 0 3px;
  font-size: 0.8rem; line-height: 1; transition: color 0.15s;
}
.dbg-note-save { color: hsl(var(--green-hsl) / 0.4); }
.dbg-note-save:hover { color: hsl(var(--green-hsl) / 0.9); }
.dbg-note-del { color: hsl(var(--red-hsl) / 0.35); }
.dbg-note-del:hover { color: hsl(var(--red-hsl) / 0.8); }
.dbg-log-file { margin-bottom: 24px; }
.dbg-log-hdr {
  font-size: 0.62rem; color: hsl(var(--green-hsl) / 0.4); margin-bottom: 8px;
  display: flex; align-items: center; gap: 10px; cursor: pointer;
}
.dbg-log-hdr:hover { color: hsl(var(--green-hsl) / 0.7); }
.dbg-log-toggle { font-size: 0.7rem; }
.dbg-log-entries { display: none; }
.dbg-log-entries.open { display: block; }
.dbg-entry {
  font-size: 0.75rem; padding: 5px 0;
  border-bottom: 1px solid hsl(var(--green-hsl) / 0.06);
  display: flex; gap: 10px; color: hsl(var(--green-hsl) / 0.7);
}
.dbg-entry-ts { font-size: 0.6rem; opacity: 0.35; flex-shrink: 0; }
.dbg-entry-action { opacity: 0.5; flex-shrink: 0; min-width: 60px; }
.dbg-entry-title { flex: 1; }
.dbg-entry-meta { font-size: 0.6rem; opacity: 0.35; }
.dbg-empty { font-size: 0.75rem; color: hsl(var(--green-hsl) / 0.5); padding: 8px 0; }
.dbg-mtg-entry { font-size: 0.75rem; padding: 10px 0; border-bottom: 1px solid hsl(var(--green-hsl) / 0.07); }
.dbg-mtg-ts { font-size: 0.6rem; opacity: 0.35; margin-bottom: 4px; }
.dbg-mtg-user { color: hsl(var(--green-hsl) / 0.45); margin-bottom: 4px; }
.dbg-mtg-user::before { content: "$ "; }
.dbg-mtg-assistant { color: hsl(var(--green-hsl) / 0.75); white-space: pre-wrap; }
.dbg-mtg-assistant::before { content: "> "; opacity: 0.4; }
.dbg-ve-entry {
  font-size: 0.78rem; padding: 8px 0;
  border-bottom: 1px solid hsl(var(--green-hsl) / 0.07);
  cursor: pointer;
}
.dbg-ve-entry:hover .dbg-ve-summary { color: hsl(var(--green-hsl) / 1); }
.dbg-ve-top { display: flex; gap: 10px; align-items: baseline; }
.dbg-ve-type {
  font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.1em;
  padding: 1px 5px; border-radius: 2px; flex-shrink: 0;
  border: 1px solid currentColor;
}
.dbg-ve-type-dm_request { color: rgba(100,200,255,0.7); }
.dbg-ve-type-mention    { color: hsl(var(--yellow-hsl) / 0.7); }
.dbg-ve-type-question   { color: hsl(var(--green-hsl) / 0.6); }
.dbg-ve-type-error      { color: hsl(var(--red-hsl) / 0.7); }
.dbg-ve-summary { flex: 1; color: hsl(var(--green-hsl) / 0.85); }
.dbg-ve-ts { font-size: 0.6rem; opacity: 0.35; flex-shrink: 0; }
.dbg-ve-detail {
  display: none; margin-top: 6px; padding: 6px 8px;
  background: hsl(var(--green-hsl) / 0.04); border-left: 2px solid hsl(var(--green-hsl) / 0.2);
  font-size: 0.72rem; color: hsl(var(--green-hsl) / 0.65); white-space: pre-wrap;
}
.dbg-ve-entry.open .dbg-ve-detail { display: block; }
.dbg-tarot-cards { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
.dbg-tarot-card {
  font-size: 0.6rem; color: hsl(var(--green-hsl) / 0.7);
  border: 1px solid hsl(var(--green-hsl) / 0.18); border-radius: 2px;
  padding: 2px 6px;
}
.dbg-tarot-card .pos { opacity: 0.45; }
.dbg-tarot-card .rev { color: hsl(var(--yellow-hsl) / 0.7); }
.dbg-tarot-sig { font-size: 0.65rem; color: hsl(var(--green-hsl) / 0.55); margin: 4px 0; }
.dbg-tarot-msg { font-size: 0.74rem; padding: 6px 0; border-bottom: 1px solid hsl(var(--green-hsl) / 0.05); }
.dbg-tarot-user { color: hsl(var(--green-hsl) / 0.45); white-space: pre-wrap; }
.dbg-tarot-user::before { content: "$ "; }
.dbg-tarot-asst { color: hsl(var(--green-hsl) / 0.78); white-space: pre-wrap; }
.dbg-tarot-asst::before { content: "> "; opacity: 0.4; }
.dbg-tarot-event { color: hsl(var(--green-hsl) / 0.3); font-style: italic; }
</style>

<div class="dbg-wrap">
  <div class="dbg-section">
    <div class="dbg-hdr">profile</div>
    <div id="dbg-profile"><span class="dbg-empty">loading...</span></div>
  </div>
  <div class="dbg-section">
    <div class="dbg-hdr">activity logs</div>
    <div id="dbg-logs"><span class="dbg-empty">loading...</span></div>
  </div>
  <div class="dbg-section">
    <div class="dbg-hdr">mtg log</div>
    <div id="dbg-mtg"><span class="dbg-empty">loading...</span></div>
  </div>
  <div class="dbg-section">
    <div class="dbg-hdr">tarot readings</div>
    <div id="dbg-tarot"><span class="dbg-empty">loading...</span></div>
  </div>
  <div class="dbg-section">
    <div class="dbg-hdr">vain-empress</div>
    <div id="dbg-ve"><span class="dbg-empty">loading...</span></div>
  </div>
  <div class="dbg-section">
    <div class="dbg-hdr">moltbook heartbeat</div>
    <div id="dbg-moltbook"><span class="dbg-empty">loading...</span></div>
  </div>
</div>

<script>
let profileNotes = [];

function renderProfile() {
  const el = document.getElementById('dbg-profile');
  if (!profileNotes.length) { el.innerHTML = '<div class="dbg-empty">no notes</div>'; return; }
  el.innerHTML = '';
  [...profileNotes].reverse().forEach((n, revIdx) => {
    const idx = profileNotes.length - 1 - revIdx;
    const row = document.createElement('div');
    row.className = 'dbg-note';
    const dateSpan = document.createElement('span');
    dateSpan.className = 'dbg-note-date';
    dateSpan.textContent = n.date || '';
    const textSpan = document.createElement('span');
    textSpan.className = 'dbg-note-text';
    textSpan.textContent = n.note;
    const xBtn = document.createElement('button');
    xBtn.className = 'dbg-note-x';
    xBtn.textContent = '×';
    xBtn.title = 'edit';
    xBtn.onclick = () => enterEditMode(row, idx);
    row.append(dateSpan, textSpan, xBtn);
    el.appendChild(row);
  });
}

function enterEditMode(row, idx) {
  const n = profileNotes[idx];
  row.innerHTML = '';
  const dateSpan = document.createElement('span');
  dateSpan.className = 'dbg-note-date';
  dateSpan.textContent = n.date || '';
  const textarea = document.createElement('textarea');
  textarea.className = 'dbg-note-edit';
  textarea.value = n.note;
  textarea.rows = Math.max(2, Math.ceil(n.note.length / 72));
  const actions = document.createElement('div');
  actions.className = 'dbg-note-actions';
  const saveBtn = document.createElement('button');
  saveBtn.className = 'dbg-note-save';
  saveBtn.textContent = '✓';
  saveBtn.title = 'save';
  saveBtn.onclick = async () => {
    const text = textarea.value.trim();
    if (!text) return;
    profileNotes[idx] = { ...n, note: text };
    await patchProfile();
    renderProfile();
  };
  const delBtn = document.createElement('button');
  delBtn.className = 'dbg-note-del';
  delBtn.textContent = '×';
  delBtn.title = 'delete';
  delBtn.onclick = async () => {
    profileNotes.splice(idx, 1);
    await patchProfile();
    renderProfile();
  };
  textarea.addEventListener('keydown', e => {
    if (e.key === 'Escape') renderProfile();
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveBtn.click(); }
  });
  actions.append(saveBtn, delBtn);
  row.append(dateSpan, textarea, actions);
  textarea.focus();
  textarea.select();
}

async function patchProfile() {
  await fetch('/api/context', {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ notes: profileNotes }),
  });
}

async function loadDebug() {
  const [ctxRes, logRes, mtgRes, veRes, mbRes, tarotRes] = await Promise.all([
    fetch('/api/context'),
    fetch('/api/debug/logs'),
    fetch('/api/mtg/log'),
    fetch('/data/moltbook_needs_human.json'),
    fetch('/api/moltbook/heartbeat-log'),
    fetch('/api/tarot/readings'),
  ]);

  // Vain-empress
  const veEl = document.getElementById('dbg-ve');
  if (veRes.ok) {
    const items = await veRes.json();
    if (!items.length) { veEl.innerHTML = '<div class="dbg-empty">no items</div>'; }
    else {
      veEl.innerHTML = items.slice().reverse().map((item) => {
        const ts = item.timestamp ? new Date(item.timestamp).toLocaleString('en-US', {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
        const typeClass = 'dbg-ve-type-' + (item.type || 'question');
        return `<div class="dbg-ve-entry" onclick="this.classList.toggle('open')">
          <div class="dbg-ve-top">
            <span class="dbg-ve-type ${typeClass}">${item.type || ''}</span>
            <span class="dbg-ve-summary">${item.summary || ''}</span>
            <span class="dbg-ve-ts">${ts}</span>
          </div>
          ${item.detail ? `<div class="dbg-ve-detail">${item.detail}</div>` : ''}
        </div>`;
      }).join('');
    }
  } else { veEl.innerHTML = '<div class="dbg-empty">unavailable</div>'; }

  // Moltbook heartbeat
  const mbEl = document.getElementById('dbg-moltbook');
  if (mbRes.ok) {
    const mb = await mbRes.json();
    const lines = (mb.content || '').trim();
    mbEl.innerHTML = lines ? marked.parse(lines) : '<div class="dbg-empty">no heartbeat entries</div>';
  } else { mbEl.innerHTML = '<div class="dbg-empty">unavailable</div>'; }

  // Profile
  if (ctxRes.ok) {
    const ctx = await ctxRes.json();
    profileNotes = ctx.notes || [];
    renderProfile();
  }

  // Logs
  if (logRes.ok) {
    const data = await logRes.json();
    const files = data.files || [];
    document.getElementById('dbg-logs').innerHTML = files.map((f, i) => {
      const entries = f.entries || [];
      const isToday = false;  // activity logs pre-minimized
      return `<div class="dbg-log-file">
        <div class="dbg-log-hdr" onclick="toggleLog(${i})">
          <span class="dbg-log-toggle" id="tog-${i}">${isToday ? '▼' : '▶'}</span>
          <span>${f.name}</span>
          <span style="opacity:0.35">(${entries.length})</span>
        </div>
        <div class="dbg-log-entries${isToday ? ' open' : ''}" id="log-${i}">
          ${entries.length ? entries.slice().reverse().map(e => {
            const ts = e.ts ? new Date(e.ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}) : '';
            const meta = e.action === 'moved' ? `${e.from_col||'?'}→${e.to_col||'?'}` : (e.column || e.day || '');
            return `<div class="dbg-entry">
              <span class="dbg-entry-ts">${ts}</span>
              <span class="dbg-entry-action">${e.action||''}</span>
              <span class="dbg-entry-title">${e.title||''}</span>
              <span class="dbg-entry-meta">${meta}</span>
            </div>`;
          }).join('') : '<div class="dbg-empty">empty</div>'}
        </div>
      </div>`;
    }).join('') || '<div class="dbg-empty">no logs</div>';
  }

  // MTG log
  if (mtgRes.ok) {
    const data = await mtgRes.json();
    const sessions = (data.sessions || []);
    const el = document.getElementById('dbg-mtg');
    if (!sessions.length) { el.innerHTML = '<div class="dbg-empty">no mtg sessions</div>'; }
    else {
      el.innerHTML = sessions.map((s, si) => {
        const started = s.started_at ? new Date(s.started_at).toLocaleString('en-US', {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : s.id;
        const exchanges = (s.exchanges || []);
        const open = false;  // mtg logs pre-minimized
        return `<div class="dbg-log-file">
          <div class="dbg-log-hdr" onclick="toggleLog('mtg-${si}')">
            <span class="dbg-log-toggle" id="tog-mtg-${si}">${open ? '▼' : '▶'}</span>
            <span>${started}</span>
            <span style="opacity:0.35">(${exchanges.length})</span>
          </div>
          <div class="dbg-log-entries${open ? ' open' : ''}" id="log-mtg-${si}">
            ${exchanges.length ? exchanges.map(e => `<div class="dbg-mtg-entry">
              <div class="dbg-mtg-ts">${e.ts ? new Date(e.ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}) : ''}</div>
              <div class="dbg-mtg-user">${e.user || ''}</div>
              <div class="dbg-mtg-assistant">${e.assistant || ''}</div>
            </div>`).join('') : '<div class="dbg-empty">empty</div>'}
          </div>
        </div>`;
      }).join('');
    }
  }

  // Tarot readings
  const tEl = document.getElementById('dbg-tarot');
  if (tarotRes.ok) {
    const data = await tarotRes.json();
    const readings = (data.readings || []);
    if (!readings.length) { tEl.innerHTML = '<div class="dbg-empty">no readings</div>'; }
    else {
      tEl.innerHTML = readings.slice().reverse().map((r, ri) => {
        const when = r.saved_at ? new Date(r.saved_at).toLocaleString('en-US', {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
        const sigName = r.significator && r.significator.name ? r.significator.name : null;
        const cards = (r.spread && r.spread.cards) || [];
        const cardsHtml = cards.map(c =>
          `<span class="dbg-tarot-card"><span class="pos">${esc(c.position_label || c.position || '')}:</span> ${esc(c.name || c.card_id || '')}${c.reversed ? ' <span class="rev">(rev)</span>' : ''}</span>`
        ).join('');
        const msgs = (r.messages || []).map(m => {
          const content = typeof m.content === 'string' ? m.content : JSON.stringify(m.content);
          const s = content.trim();
          if (m.role === 'user' && s.startsWith('[') && s.endsWith(']')) {
            return `<div class="dbg-tarot-msg dbg-tarot-event">${esc(s)}</div>`;
          }
          const cls = m.role === 'assistant' ? 'dbg-tarot-asst' : 'dbg-tarot-user';
          return `<div class="dbg-tarot-msg ${cls}">${esc(content)}</div>`;
        }).join('');
        const open = false;  // tarot readings pre-minimized
        const spreadType = (r.spread && r.spread.type) || 'no spread';
        return `<div class="dbg-log-file">
          <div class="dbg-log-hdr" onclick="toggleLog('tarot-${ri}')">
            <span class="dbg-log-toggle" id="tog-tarot-${ri}">${open ? '▼' : '▶'}</span>
            <span>${when}</span>
            <span style="opacity:0.35">${esc(spreadType)}${sigName ? ' · sig ' + esc(sigName) : ''} (${(r.messages||[]).length})</span>
          </div>
          <div class="dbg-log-entries${open ? ' open' : ''}" id="log-tarot-${ri}">
            ${sigName ? `<div class="dbg-tarot-sig">Significator: ${esc(sigName)}</div>` : ''}
            ${cardsHtml ? `<div class="dbg-tarot-cards">${cardsHtml}</div>` : ''}
            ${msgs || '<div class="dbg-empty">no messages</div>'}
          </div>
        </div>`;
      }).join('');
    }
  } else { tEl.innerHTML = '<div class="dbg-empty">unavailable</div>'; }
}

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// eslint-disable-next-line no-unused-vars
function toggleLog(i) {
  const el = document.getElementById('log-'+i);
  const tog = document.getElementById('tog-'+i);
  el.classList.toggle('open');
  tog.textContent = el.classList.contains('open') ? '▼' : '▶';
}


loadDebug();
</script>
