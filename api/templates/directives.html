<script>
const CAT_HUE = {Book:210, Self:185, Social:315, Interfacing:50, Hobby:15};
const CAT_LIGHT = {Social:+10, Hobby:+7};
const CAT_SAT   = {Social:-20};
const SIZE_MIN = {chore:30, task:90, project:240, titan:480, book:60};

const TL_PX = 1;           // 1px per minute
const TL_START = 6 * 60;   // 6am
const TL_END   = 24 * 60;  // midnight
const TL_H     = TL_END - TL_START; // 1080px
const SNAP     = 15;

function snapMin(v) { return Math.round(v / SNAP) * SNAP; }

let scheduleCards = [];
let ctxOpen = false;

function isoToday() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function cardBgDirectives(c) {
  const h = CAT_HUE[c.category];
  if (!h) return {bg:'', dark:false};
  const ds = CAT_SAT[c.category] || 0;
  const dl = CAT_LIGHT[c.category] || 0;
  const dark = ['chore','task','book'].includes(c.size);
  const col = `hsl(${h},${75+ds}%,${68+dl}%)`;
  if (dark) return {bg:`background:#0d0d0d;color:${col};border-color:hsl(${h},${65+ds}%,${60+dl}%);`, dark:true};
  return {bg:`background:hsl(${h},${50+ds}%,${54+dl}%);`, dark:false};
}


function computeStartTimes(cards) {
  const now = new Date();
  let cur = snapMin(Math.max(TL_START, now.getHours() * 60 + now.getMinutes()));
  return cards.map(c => {
    const start = cur;
    cur += Math.max(SNAP, snapMin(c.estimated_time || SIZE_MIN[c.size] || 60));
    return start;
  });
}

function fmtTime(totalMins) {
  const h = Math.floor(totalMins / 60) % 24;
  const m = totalMins % 60;
  const ampm = h >= 12 ? 'pm' : 'am';
  const hr = h > 12 ? h - 12 : (h === 0 ? 12 : h);
  return `${hr}:${String(m).padStart(2,'0')}${ampm}`;
}

function durLabel(min) {
  return min >= 60 ? `${Math.floor(min/60)}h${min%60?min%60+'m':''}` : `${min}m`;
}

function createBlock(c, track) {
  const {bg, dark} = cardBgDirectives(c);
  const durMin = Math.max(SNAP, snapMin(c.estimated_time || SIZE_MIN[c.size] || 60));
  c._durMin = durMin;
  const topPx = Math.max(0, (c._startMin - TL_START) * TL_PX);
  const heightPx = Math.max(15, durMin * TL_PX);
  const titleC = bg ? (dark ? 'inherit' : 'rgba(0,0,0,0.85)') : 'rgba(0,255,65,0.88)';
  const metaC  = bg ? (dark ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.5)') : 'rgba(0,255,65,0.4)';

  const block = document.createElement('div');
  block.className = 'dir-block' + (bg ? '' : ' plain');
  block.dataset.id = c.id;
  block.style.cssText = `${bg}top:${topPx}px;height:${heightPx}px;`;

  const titleEl = document.createElement('div');
  titleEl.className = 'dir-block-title';
  titleEl.style.color = titleC;
  titleEl.textContent = c.title;

  const metaEl = document.createElement('div');
  metaEl.className = 'dir-block-meta';
  metaEl.style.color = metaC;
  metaEl.innerHTML = `<span>${c.size||''}</span><span class="dur-lbl">${durLabel(durMin)}</span>`;

  const resizeHandle = document.createElement('div');
  resizeHandle.className = 'dir-resize';

  block.append(titleEl, metaEl, resizeHandle);

  // drag to move
  function startDrag(startClientY, getY) {
    const rect = track.getBoundingClientRect();
    const offsetY = startClientY - block.getBoundingClientRect().top;
    let moved = false;
    function onMove(ev) {
      moved = true;
      const rawMin = (getY(ev) - rect.top - offsetY) / TL_PX + TL_START;
      const snapped = Math.max(TL_START, Math.min(TL_END - c._durMin, snapMin(rawMin)));
      c._startMin = snapped;
      block.style.top = (snapped - TL_START) * TL_PX + 'px';
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onUp);
      if (!moved) { openCE(c.id); return; }
      scheduleCards.sort((a, b) => a._startMin - b._startMin);
      saveCardOrder(scheduleCards);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchmove', onMove, {passive: false});
    document.addEventListener('touchend', onUp);
  }

  block.addEventListener('mousedown', e => {
    if (resizeHandle.contains(e.target)) return;
    e.preventDefault();
    startDrag(e.clientY, ev => ev.clientY);
  });
  block.addEventListener('touchstart', e => {
    if (resizeHandle.contains(e.target)) return;
    startDrag(e.touches[0].clientY, ev => ev.touches[0].clientY);
  }, {passive: true});

  // resize
  function startResize(startClientY, getY) {
    const startDur = c._durMin;
    function onMove(ev) {
      const delta = getY(ev) - startClientY;
      const snapped = Math.max(SNAP, snapMin(startDur + delta / TL_PX));
      c._durMin = snapped;
      block.style.height = Math.max(15, snapped * TL_PX) + 'px';
      metaEl.querySelector('.dur-lbl').textContent = durLabel(snapped);
    }
    async function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onUp);
      c.estimated_time = c._durMin;
      await saveEstimatedTime(c.id, c._durMin);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchmove', onMove, {passive: false});
    document.addEventListener('touchend', onUp);
  }

  resizeHandle.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
    startResize(e.clientY, ev => ev.clientY);
  });
  resizeHandle.addEventListener('touchstart', e => {
    e.preventDefault(); e.stopPropagation();
    startResize(e.touches[0].clientY, ev => ev.touches[0].clientY);
  }, {passive: false});

  return block;
}

function buildSchedule(cards) {
  const wrap = document.getElementById('dir-schedule-wrap');
  if (!cards.length) {
    wrap.innerHTML = '<span style="opacity:0.3;font-family:monospace;font-size:0.8rem">no cards scheduled for today</span>';
    return;
  }

  const startTimes = computeStartTimes(cards);
  cards.forEach((c, i) => { c._startMin = startTimes[i]; });

  const tlWrap = document.createElement('div');
  tlWrap.style.cssText = 'display:flex;';

  const labels = document.createElement('div');
  labels.className = 'dir-tl-labels';
  labels.style.height = TL_H + 'px';

  const track = document.createElement('div');
  track.className = 'dir-tl-track';
  track.style.height = TL_H + 'px';

  for (let h = 6; h <= 24; h++) {
    const y = (h * 60 - TL_START) * TL_PX;

    const hline = document.createElement('div');
    hline.style.cssText = `position:absolute;left:0;right:0;top:${y}px;border-top:1px solid rgba(0,255,65,0.2);pointer-events:none;`;
    track.appendChild(hline);

    if (h < 24) {
      const lbl = document.createElement('div');
      lbl.className = 'dir-tl-label';
      lbl.style.top = y + 'px';
      lbl.textContent = h > 12 ? `${h-12}p` : h === 12 ? '12p' : `${h}a`;
      labels.appendChild(lbl);

      const hline2 = document.createElement('div');
      hline2.style.cssText = `position:absolute;left:0;right:0;top:${y + 30 * TL_PX}px;border-top:1px solid rgba(0,255,65,0.07);pointer-events:none;`;
      track.appendChild(hline2);
    }
  }

  cards.forEach(c => track.appendChild(createBlock(c, track)));

  // current time indicator
  const now = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes();
  if (nowMin >= TL_START && nowMin <= TL_END) {
    const nowY = (nowMin - TL_START) * TL_PX;
    const nowLine = document.createElement('div');
    nowLine.id = 'dir-now-line';
    nowLine.style.cssText = `position:absolute;left:0;right:0;top:${nowY}px;border-top:1px solid rgba(255,255,255,0.7);pointer-events:none;z-index:5;`;
    const dot = document.createElement('div');
    dot.style.cssText = 'position:absolute;left:-4px;top:-4px;width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.8);';
    nowLine.appendChild(dot);
    track.appendChild(nowLine);
  }

  tlWrap.appendChild(labels);
  tlWrap.appendChild(track);
  wrap.innerHTML = '';
  wrap.appendChild(tlWrap);

  // autoscroll to current time (offset by 60px so there's context above)
  if (nowMin >= TL_START && nowMin <= TL_END) {
    const scrollTarget = (nowMin - TL_START) * TL_PX - 60;
    wrap.scrollTop = Math.max(0, scrollTarget);
  }
}

async function saveCardOrder(cards) {
  const rd = await (await fetch('/api/rd')).json();
  const allCards = rd.cards || [];
  const todayCards = new Set(cards.map(c => c.id));
  cards.forEach((c, i) => {
    const found = allCards.find(x => x.id === c.id);
    if (found) found.order = i;
  });
  await fetch('/api/rd', {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({cards: allCards})});
}

async function saveEstimatedTime(cardId, mins) {
  setStatus('saving...');
  try {
    const rd = await (await fetch('/api/rd')).json();
    const allCards = rd.cards || [];
    const card = allCards.find(c => c.id === cardId);
    if (card) {
      card.estimated_time = mins;
      await fetch('/api/rd', {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({cards: allCards})});
    }
    setStatus('saved');
    setTimeout(() => setStatus(''), 1200);
  } catch(e) { setStatus('save error'); }
}

function toggleCtx() {
  ctxOpen = !ctxOpen;
  document.getElementById('dir-ctx').classList.toggle('open', ctxOpen);
  if (ctxOpen) loadCtx();
}

async function loadCtx() {
  const [logRes, omensRes] = await Promise.all([
    fetch('/api/rd/log'), fetch('/api/omens'),
  ]);
  let html = '';

  if (logRes.ok) {
    const log = await logRes.json();
    html += '<div class="dir-ctx-hdr">activity log</div>';
    html += (log.slice(0, 20).map(e => {
      const arrow = e.from_col ? ` ${e.from_col}→${e.to_col}` : '';
      return `<div class="dir-ctx-entry">${e.action} "${e.title}"${arrow}</div>`;
    }).join('')) || '<div class="dir-ctx-entry" style="opacity:0.3">empty</div>';
  }

  if (omensRes.ok) {
    const o = await omensRes.json();
    html += '<div class="dir-ctx-hdr">omens</div>';
    html += ((o.events || []).slice(0, 10).map(e =>
      `<div class="dir-ctx-entry">${e.date} — ${e.title}</div>`
    ).join('')) || '<div class="dir-ctx-entry" style="opacity:0.3">none</div>';
  }

  document.getElementById('dir-ctx-content').innerHTML = html;
}

function setStatus(msg) {
  document.getElementById('dir-status').textContent = msg;
}


async function load() {
  const today = isoToday();
  const [planRes, propRes] = await Promise.all([
    fetch('/api/plan'), fetch(`/api/prophecies?start=${today}`),
  ]);

  // Encouraging message
  if (planRes.ok) {
    const plan = await planRes.json();
    const enc = plan.encouraging_message || '';
    document.getElementById('dir-encourage').innerHTML = enc
      ? marked.parse(enc)
      : '<span style="opacity:0.3">no message yet — run assemble plan in Exec</span>';
  } else {
    document.getElementById('dir-encourage').innerHTML = '<span style="opacity:0.3">no plan yet</span>';
  }

  // Reminders + schedule from today's prophecies
  if (propRes.ok) {
    const data = await propRes.json();
    const todayCards = (data.days && data.days[today]) || [];

    const actionCards = todayCards.filter(c => !c.is_reminder);
    scheduleCards = actionCards;
    buildSchedule(actionCards);
  } else {
    buildSchedule([]);
  }
}

load();

// ── card edit modal ──────────────────────────────────────────────────────────
let _ceId = null, _ceCards = [];
function _ceParseMD(input) {
  if (!input || !input.trim()) return null;
  const s = input.trim().toLowerCase();
  const mnths = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  const wdays = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  const now = new Date();
  let timeStr = '', dateStr = s;
  const tm = s.match(/\s+(\d{1,2})(?::(\d{2}))?\s*(am|pm)$/i);
  if (tm) {
    let h = parseInt(tm[1]), min = tm[2] ? parseInt(tm[2]) : 0;
    if (tm[3].toLowerCase()==='pm' && h<12) h+=12;
    if (tm[3].toLowerCase()==='am' && h===12) h=0;
    timeStr = `T${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}`;
    dateStr = s.slice(0, s.length - tm[0].length).trim();
  }
  let yr = now.getFullYear(), month = -1, day = 0, useDate = null;
  const wi = wdays.findIndex(d => dateStr.startsWith(d));
  if (wi >= 0) {
    let diff = wi - now.getDay(); if (diff<=0) diff+=7;
    useDate = new Date(now); useDate.setDate(now.getDate()+diff); useDate.setHours(0,0,0,0);
    month = useDate.getMonth(); day = useDate.getDate(); yr = useDate.getFullYear();
  }

function _ceFmt(iso) {

}
async function _ceResolve(raw, size, et) {

  try {
    const r = await fetch('/api/parse_date',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:raw.trim(),size,estimated_minutes:et||null})});
    const d = await r.json();

}
async function openCE(id) {
  const data = await (await fetch('/api/rd')).json();
  _ceCards = data.cards || [];
  const c = _ceCards.find(x => x.id === id);
  if (!c) return;
  _ceId = id;
  document.getElementById('ce-title').value = c.title||'';
  document.getElementById('ce-cat').value = c.category||'Self';
  document.getElementById('ce-size').value = c.size||'task';
  document.getElementById('ce-due').value = c.due_date ? _ceFmt(c.due_date) : '';
  document.getElementById('ce-sb').value = c.start_before ? _ceFmt(c.start_before) : '';
  document.getElementById('ce-et').value = c.estimated_time != null ? c.estimated_time : '';
  document.getElementById('ce-recur').value = c.recur_type||'';
  document.getElementById('ce-reminder').checked = !!c.is_reminder;
  document.getElementById('ce-notes').value = c.notes||'';
  document.getElementById('ce-modal').classList.add('open');
  document.getElementById('ce-title').focus();
}
function closeCE() { document.getElementById('ce-modal').classList.remove('open'); _ceId = null; }
async function saveCE() {
  const c = _ceCards.find(x => x.id === _ceId);
  if (!c) return;
  c.title = document.getElementById('ce-title').value.trim() || c.title;
  c.category = document.getElementById('ce-cat').value;
  c.size = document.getElementById('ce-size').value;
  const etRaw = document.getElementById('ce-et').value;
  c.estimated_time = etRaw !== '' ? parseInt(etRaw,10) : (c.estimated_time??null);
  const dueRaw = document.getElementById('ce-due').value;
  const sbRaw = document.getElementById('ce-sb').value;
  const res = await _ceResolve(dueRaw, c.size, c.estimated_time);
  c.due_date = res.due;
  c.start_before = sbRaw.trim() ? (await _ceResolve(sbRaw)).due : (res.start_before??c.start_before??null);
  c.notes = document.getElementById('ce-notes').value.trim();
  c.recur_type = document.getElementById('ce-recur').value||null;
  c.is_reminder = document.getElementById('ce-reminder').checked;
  await fetch('/api/rd?source=dirs',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({cards:_ceCards})});
  closeCE();
  load();
}
async function deleteCE() {
  if (!_ceId) return;
  _ceCards = _ceCards.filter(x => x.id !== _ceId);
  await fetch('/api/rd?source=dirs',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({cards:_ceCards})});
  closeCE();
  load();
}
async function ceFillSB() {
  const dueRaw = document.getElementById('ce-due').value.trim();
  if (!dueRaw) return;
  const res = await _ceResolve(dueRaw, document.getElementById('ce-size').value, parseInt(document.getElementById('ce-et').value)||null);
  if (res.start_before) document.getElementById('ce-sb').value = res.start_before;
}
