
<style>
body { overflow: hidden !important; }
.dir-body {
  position: fixed; top: 0; bottom: 0; left: 0; right: 0;
  display: flex; overflow: hidden;
}
.dir-section-hdr {
  font-family: '04b25', monospace;
  font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.15em;
  color: rgba(0,255,65,0.45); margin: 18px 0 8px;
  border-bottom: 1px solid rgba(0,255,65,0.12); padding-bottom: 4px;
}
.dir-section-hdr:first-child { margin-top: 0; }
/* center: schedule */
.dir-center {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
}
.dir-schedule-wrap {
  flex: 1; overflow-y: auto; padding: 0 16px;
  position: relative;
}
.dir-block {
  position: absolute; left: 3px; right: 3px; box-sizing: border-box;
  border-radius: 4px; padding: 9px 11px 14px;
  cursor: grab; user-select: none; font-family: 'Iosevka Mayukai Monolite', monospace; font-weight: 500;
  border: 1px solid transparent; overflow: hidden;
  display: flex; flex-direction: column;
}
.dir-block:active { cursor: grabbing; }
.dir-block.plain { background: rgba(0,255,65,0.06); border-color: rgba(0,255,65,0.18); }
.dir-block-title { font-family: 'Iosevka Mayukai Monolite', monospace; font-weight: 700; font-size: 0.8rem; margin-bottom: 2px; word-break: break-word; }
.dir-block-meta { font-size: 0.6rem; opacity: 0.45; margin-top: 2px; display: flex; gap: 8px; }
.dir-block-notes { font-size: 0.72rem; opacity: 0.88; margin-top: 4px; line-height: 1.45; flex: 1; overflow: hidden; }
.dir-block-time { font-size: 0.62rem; opacity: 0.5; }
.dir-resize {
  position: absolute; bottom: 0; left: 0; right: 0; height: 8px;
  cursor: ns-resize; background: transparent;
  display: flex; align-items: center; justify-content: center;
}
.dir-resize::after {
  content: ''; display: block; width: 28px; height: 2px;
  background: #fff; border-radius: 1px; mix-blend-mode: overlay;
}
.dir-resize:hover { background: transparent; }
.dir-tl-labels { width: 22px; flex-shrink: 0; position: relative; }
.dir-tl-label {
  position: absolute; right: 4px; transform: translateY(-50%);
  font-size: 1rem; opacity: 1; white-space: nowrap; font-family: '04b25', monospace;
  color: rgba(200,200,200,0.55);
}
.dir-tl-track { flex: 1; position: relative; background: rgb(24,30,28); }
</style>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<span id="dir-status" style="display:none"></span>

<div class="dir-body">
  <!-- center schedule -->
  <div class="dir-center">
    <div class="dir-schedule-wrap" id="dir-schedule-wrap">
      <span style="opacity:0.35;font-family:monospace;font-size:0.8rem">loading...</span>
    </div>
  </div>



</div>
<script src="/card-style.js"></script>
<script src="/card-dialog.js"></script>

<script>
/* global cardStyle */
const SIZE_MIN = {chore:30, task:90, project:240, titan:480, book:60};

const TL_PX = 1;           // 1px per minute
const TL_START = 4 * 60;   // 4am
const TL_END   = 28 * 60;  // 4am next day
const TL_H     = TL_END - TL_START; // 1440px
const SNAP     = 15;

function snapMin(v) { return Math.round(v / SNAP) * SNAP; }

let scheduleCards = [];
let currentTrack = null;

function isoToday() {
  const d = new Date();
  if (d.getHours() * 60 + d.getMinutes() < 4*60+30) d.setDate(d.getDate() - 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}



function computeStartTimes(cards) {
  const now = new Date();
  let cur = snapMin(Math.max(TL_START, now.getHours() * 60 + now.getMinutes()));
  return cards.map(c => {
    if (c.dir_start_min != null) return c.dir_start_min;
    const start = cur;
    cur += Math.max(SNAP, snapMin(c.estimated_time || SIZE_MIN[c.size] || 60));
    return start;
  });
}

function durLabel(min) {
  return min >= 60 ? `${Math.floor(min/60)}h${min%60?min%60+'m':''}` : `${min}m`;
}

function createBlock(c, track) {
  const {bg, border, dark} = cardStyle(c);
  const durMin = Math.max(SNAP, snapMin(c.estimated_time || SIZE_MIN[c.size] || 60));
  c._durMin = durMin;
  const topPx = Math.max(0, (c._startMin - TL_START) * TL_PX);
  const heightPx = Math.max(15, durMin * TL_PX);
  const titleC = bg ? (dark ? 'inherit' : 'rgba(0,0,0,0.85)') : 'rgba(0,255,65,0.88)';
  const metaC  = bg ? (dark ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.5)') : 'rgba(0,255,65,0.4)';

  const block = document.createElement('div');
  block.className = 'dir-block' + (bg ? '' : ' plain');
  block.dataset.id = c.id;
  block.style.cssText = `${bg}${border}top:${topPx + 3}px;height:${Math.max(13, heightPx - 6)}px;`;

  const titleEl = document.createElement('div');
  titleEl.className = 'dir-block-title';
  titleEl.style.color = titleC;
  titleEl.textContent = c.title;

  const metaEl = document.createElement('div');
  metaEl.className = 'dir-block-meta';
  metaEl.style.color = metaC;
  metaEl.innerHTML = `<span class="dur-lbl" style="display:none">${durLabel(durMin)}</span>`;

  const resizeHandle = document.createElement('div');
  resizeHandle.className = 'dir-resize';

  if (durMin <= 30) {
    block.style.justifyContent = 'center';
    titleEl.style.marginBottom = '0';
    block.append(titleEl, resizeHandle);
  } else if (c.notes && heightPx >= 44) {
    const notesEl = document.createElement('div');
    notesEl.className = 'dir-block-notes';
    notesEl.style.color = metaC;
    notesEl.textContent = c.notes;
    block.append(titleEl, metaEl, notesEl, resizeHandle);
  } else {
    block.append(titleEl, metaEl, resizeHandle);
  }

  // drag to move
  function startDrag(startClientY, getY) {
    const rect = track.getBoundingClientRect();
    const offsetY = startClientY - block.getBoundingClientRect().top;
    let moved = false;
    function onMove(ev) {
      moved = true;
      const rawMin = (getY(ev) - rect.top - offsetY) / TL_PX + TL_START;
      const snapped = Math.max(TL_START, Math.min(TL_END - c._durMin, snapMin(rawMin)));
      c._startMin = snapped;
      block.style.top = (snapped - TL_START) * TL_PX + 'px';
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onUp);
      if (!moved) { openCardDialog(c.id, () => load(), 'dirs'); return; }
      scheduleCards.sort((a, b) => a._startMin - b._startMin);
      computeColumns(scheduleCards);
      applyColumnLayout(scheduleCards, currentTrack);
      saveCardOrder(scheduleCards);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchmove', onMove, {passive: false});
    document.addEventListener('touchend', onUp);
  }

  block.addEventListener('mousedown', e => {
    if (resizeHandle.contains(e.target)) return;
    e.preventDefault();
    startDrag(e.clientY, ev => ev.clientY);
  });
  block.addEventListener('touchstart', e => {
    if (resizeHandle.contains(e.target)) return;
    startDrag(e.touches[0].clientY, ev => ev.touches[0].clientY);
  }, {passive: true});

  // resize
  function startResize(startClientY, getY) {
    const startDur = c._durMin;
    function onMove(ev) {
      const delta = getY(ev) - startClientY;
      const snapped = Math.max(SNAP, snapMin(startDur + delta / TL_PX));
      c._durMin = snapped;
      block.style.height = Math.max(13, snapped * TL_PX - 6) + 'px';
      metaEl.querySelector('.dur-lbl').textContent = durLabel(snapped);
    }
    async function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onUp);
      c.estimated_time = c._durMin;
      await saveEstimatedTime(c.id, c._durMin);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchmove', onMove, {passive: false});
    document.addEventListener('touchend', onUp);
  }

  resizeHandle.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
    startResize(e.clientY, ev => ev.clientY);
  });
  resizeHandle.addEventListener('touchstart', e => {
    e.preventDefault(); e.stopPropagation();
    startResize(e.touches[0].clientY, ev => ev.touches[0].clientY);
  }, {passive: false});

  return block;
}

function computeColumns(cards) {
  const sorted = [...cards].sort((a, b) => a._startMin - b._startMin);
  const laneEnds = [];
  sorted.forEach(c => {
    let lane = laneEnds.findIndex(end => end <= c._startMin);
    if (lane === -1) { lane = laneEnds.length; laneEnds.push(0); }
    laneEnds[lane] = c._startMin + c._durMin;
    c._laneIdx = lane;
  });
  sorted.forEach(c => {
    const cEnd = c._startMin + c._durMin;
    let max = c._laneIdx;
    sorted.forEach(o => {
      if (o !== c && o._startMin < cEnd && o._startMin + o._durMin > c._startMin)
        max = Math.max(max, o._laneIdx);
    });
    c._totalLanes = max + 1;
  });
}

function applyColumnLayout(cards, track) {
  const GAP = 3;
  cards.forEach(c => {
    const el = track.querySelector(`[data-id="${c.id}"]`);
    if (!el) return;
    const n = c._totalLanes || 1;
    const idx = c._laneIdx || 0;
    if (n === 1) {
      el.style.left = GAP + 'px';
      el.style.right = GAP + 'px';
      el.style.width = '';
    } else {
      const pct = 100 / n;
      el.style.left = `calc(${idx * pct}% + ${GAP}px)`;
      el.style.width = `calc(${pct}% - ${GAP * 2}px)`;
      el.style.right = 'auto';
    }
  });
}

function buildSchedule(cards) {
  const wrap = document.getElementById('dir-schedule-wrap');
  if (!cards.length) {
    wrap.innerHTML = '<span style="opacity:0.3;font-family:monospace;font-size:0.8rem">no cards scheduled for today</span>';
    return;
  }

  const startTimes = computeStartTimes(cards);
  cards.forEach((c, i) => { c._startMin = startTimes[i]; });

  const tlWrap = document.createElement('div');
  tlWrap.style.cssText = 'display:flex;';

  const labels = document.createElement('div');
  labels.className = 'dir-tl-labels';
  labels.style.height = TL_H + 'px';

  const track = document.createElement('div');
  track.className = 'dir-tl-track';
  track.style.height = TL_H + 'px';

  const _nowInit = new Date();
  const nowMin = _nowInit.getHours() * 60 + _nowInit.getMinutes();

  for (let h = 4; h <= 28; h++) {
    const y = (h * 60 - TL_START) * TL_PX;

    const hline = document.createElement('div');
    hline.style.cssText = `position:absolute;left:0;right:0;top:${y}px;border-top:3px solid rgba(255,255,255,0.25);pointer-events:none;z-index:5;`;
    track.appendChild(hline);

    if (h < 28) {
      if (h > 4) {
        const lbl = document.createElement('div');
        lbl.className = 'dir-tl-label';
        lbl.style.top = y + 'px';
        lbl.style.color = 'rgba(200,200,200,0.55)';
        lbl.textContent = String(h % 24).padStart(2, '0');
        labels.appendChild(lbl);
      }

      const hline2 = document.createElement('div');
      hline2.style.cssText = `position:absolute;left:0;right:0;top:${y + 30 * TL_PX}px;border-top:1px solid rgba(255,255,255,0.08);pointer-events:none;z-index:5;`;
      track.appendChild(hline2);
    }
  }

  [
    {label: 'lunch', start: 12*60, end: 13*60},
    {label: 'dinner', start: 18*60+30, end: 20*60},
  ].forEach(({label, start, end}) => {
    const el = document.createElement('div');
    el.style.cssText = `position:absolute;left:3px;right:3px;top:${(start-TL_START)*TL_PX + 3}px;height:${(end-start)*TL_PX - 6}px;z-index:4;`
      + `backdrop-filter:blur(3px);background:hsl(185,50%,54%,0.3);border:1px solid hsl(185,50%,45%,0.5);border-radius:4px;`
      + `display:flex;align-items:center;justify-content:center;box-sizing:border-box;pointer-events:none;`;
    el.innerHTML = `<span style="font-family:'Iosevka Mayukai Monolite',monospace;font-weight:700;font-size:0.8rem;color:rgba(255,255,255,0.8)">[ ${label} ]</span>`;
    track.appendChild(el);
  });

  cards.forEach(c => track.appendChild(createBlock(c, track)));
  computeColumns(cards);
  applyColumnLayout(cards, track);
  currentTrack = track;

  // current time indicator
  const pastOverlay = document.createElement('div');
  pastOverlay.style.cssText = `position:absolute;left:-22px;right:0;top:0;pointer-events:none;z-index:6;`;
  track.appendChild(pastOverlay);
  const nowLine = document.createElement('div');
  nowLine.id = 'dir-now-line';
  nowLine.style.cssText = `position:absolute;left:0;right:0;border-top:3px solid #fff;box-shadow:0 0 4px #000,0 2px 4px #000;pointer-events:none;z-index:7;display:none;`;
  track.appendChild(nowLine);
  const nowClock = document.createElement('div');
  nowClock.id = 'dir-now-clock';
  nowClock.style.cssText = `position:absolute;left:0;right:0;text-align:center;font-family:'04b25',monospace;font-size:0.75rem;font-family:'Iosevka Mayukai Monolite',monospace;font-weight:400;color:rgba(255,160,40,0.95);pointer-events:none;z-index:7;mix-blend-mode:normal;text-shadow:0 0 8px rgba(255,120,0,0.9),0 0 20px rgba(255,100,0,0.6),0 0 40px rgba(255,80,0,0.3);display:none;`;
  track.appendChild(nowClock);

  function updateNowIndicator() {
    const n = new Date();
    const nowMin = n.getHours() * 60 + n.getMinutes();
    const visible = nowMin >= TL_START && nowMin <= TL_END;
    nowLine.style.display = visible ? '' : 'none';
    nowClock.style.display = visible ? '' : 'none';
    pastOverlay.style.display = visible ? '' : 'none';
    if (!visible) return;
    const nowY = (nowMin - TL_START) * TL_PX;
    pastOverlay.style.height = nowY + 'px';
    pastOverlay.style.background = `rgba(24,30,28,0.75)`;
    nowLine.style.top = nowY + 'px';
    nowClock.style.top = (nowY - 16) + 'px';
  }
  updateNowIndicator();
  setInterval(updateNowIndicator, 60000);

  (function tick() {
    const n = new Date();
    const h  = String(n.getHours()).padStart(2,'0');
    const mi = String(n.getMinutes()).padStart(2,'0');
    const s  = String(n.getSeconds()).padStart(2,'0');
    const cs = String(Math.floor(n.getMilliseconds()/10)).padStart(2,'0');
    nowClock.textContent = `${h} : ${mi} : ${s} : ${cs}`;
    requestAnimationFrame(tick);
  })();

  tlWrap.appendChild(labels);
  tlWrap.appendChild(track);
  wrap.innerHTML = '';
  wrap.appendChild(tlWrap);

  // autoscroll to 2 hours before current time — only after 4:30 AM (morning pipeline)
  if (nowMin >= 4*60+30 && nowMin <= TL_END) {
    const scrollTarget = (nowMin - TL_START) * TL_PX - 120 * TL_PX;
    wrap.scrollTop = Math.max(0, scrollTarget);
  }
}

async function saveCardOrder(cards) {
  const rd = await (await fetch('/api/rd')).json();
  const allCards = rd.cards || [];
  cards.forEach((c, i) => {
    const found = allCards.find(x => x.id === c.id);
    if (found) { found.order = i; found.dir_start_min = c._startMin; }
  });
  await fetch('/api/rd', {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({cards: allCards})});
}

async function saveEstimatedTime(cardId, mins) {
  setStatus('saving...');
  try {
    const rd = await (await fetch('/api/rd')).json();
    const allCards = rd.cards || [];
    const card = allCards.find(c => c.id === cardId);
    if (card) {
      card.estimated_time = mins;
      await fetch('/api/rd', {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({cards: allCards})});
    }
    setStatus('saved');
    setTimeout(() => setStatus(''), 1200);
  } catch(e) { setStatus('save error: ' + e.message); }
}


function setStatus(msg) {
  document.getElementById('dir-status').textContent = msg;
}


async function load() {
  const today = isoToday();
  const propRes = await fetch(`/api/prophecies?start=${today}`);

  // Reminders + schedule from today's prophecies
  if (propRes.ok) {
    const data = await propRes.json();
    const todayCards = (data.days && data.days[today]) || [];

    const actionCards = todayCards.filter(c => !c.is_reminder);
    scheduleCards = actionCards;
    buildSchedule(actionCards);
  } else {
    buildSchedule([]);
  }
}

load();

</script>
