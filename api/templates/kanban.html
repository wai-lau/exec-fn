
<style>
body { overflow: hidden !important; }
.rd-reminders {
  display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 19;
  height: auto; max-height: 90px;
  flex-direction: column; align-items: stretch;
  padding: 0; gap: 0; overflow-x: hidden; overflow-y: auto;
  scrollbar-width: none; touch-action: pan-y; -webkit-overflow-scrolling: touch;
  background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(0,255,65,0.08);
  font-family: 'BitLight', monospace; font-size: 0.63rem;
}
.rd-reminders::-webkit-scrollbar { display: none; }
.rd-reminders .rem-item { cursor: pointer; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0.85; padding: 9px 14px 5px; border-radius: 0; border-left: none !important; border-right: none !important; border-top: none !important; }
.rd-reminders .rem-item:hover { opacity: 1; }
.rem-overflow-btn { position: absolute; bottom: 2px; right: 2px; background: rgba(0,0,0,0.8); border: 1px solid rgba(0,255,65,0.35); color: rgba(0,255,65,0.7); font-family: 'BitLight', monospace; font-size: 0.55rem; padding: 2px 6px; border-radius: 2px; cursor: pointer; white-space: nowrap; line-height: 1.4; }
.rem-overflow-btn:hover { border-color: rgba(0,255,65,0.7); color: rgba(0,255,65,1); }
.dragging-card .rd-reminders { min-height: 42px; }
.rem-ov-modal { display: none; position: fixed; inset: 0; z-index: 60; background: rgba(0,0,0,0.75); align-items: center; justify-content: center; }
.rem-ov-box { background: #0a0a0a; border: 1px solid rgba(0,255,65,0.25); padding: 20px 24px; width: min(360px,88vw); max-height: 70vh; display: flex; flex-direction: column; font-family: 'BitLight', monospace; }
.rem-ov-hdr { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.15em; color: rgba(0,255,65,0.5); margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
.rem-ov-close { background: none; border: none; color: rgba(0,255,65,0.5); font-size: 1rem; cursor: pointer; padding: 0; line-height: 1; }
.rem-ov-close:hover { color: rgba(0,255,65,1); }
.rem-ov-list { overflow-y: auto; flex: 1; }
.rem-ov-row { padding: 7px 4px; font-size: 0.75rem; cursor: pointer; border-bottom: 1px solid rgba(0,255,65,0.07); }
.rem-ov-row:hover { background: rgba(0,255,65,0.05); }
.has-reminders .rd-reminders { display: flex; }
.dragging-card .rd-reminders { display: flex !important; min-height: 48px; border-bottom-color: rgba(0,255,65,0.22); }
.rd-board {
  position: fixed; top: 0; bottom: 0; left: 0; right: 0;
  display: flex; gap: 1px; overflow: hidden;
  background: rgb(24,30,28);
}
.has-reminders .rd-board { top: var(--rem-bar-h, 48px); }
.col-group { flex: 1; display: flex; flex-direction: column; gap: 1px; min-width: 0; min-height: 0; }
.col { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; background: rgb(24,30,28); }
.col.col-collapsed { flex: 0 0 38px; cursor: pointer; overflow: hidden; }
.col.col-collapsed .col-list { pointer-events: none; overflow: hidden; }
.drag-active .col-group { flex: 4 !important; }
.drag-active .col.col-collapsed { flex: 1 !important; overflow: visible !important; }
.drag-active .col.col-collapsed .col-list { pointer-events: auto !important; overflow-y: auto !important; min-height: 40px; }
.col-hdr {
  flex-shrink: 0; padding: 6px 16px 10px;
  font-family: '04b25', monospace; font-size: 0.68rem; text-transform: uppercase;
  letter-spacing: 0.18em; color: rgba(0,255,65,0.8);
  border-bottom: 1px solid rgba(0,255,65,0.1);
  display: flex; align-items: center; gap: 6px;
}
.col-hdr-label { flex: 1; }
.done-toggle { background:none; border:none; color:rgba(0,255,65,0.4); cursor:pointer; font-size:0.7rem; padding:0; line-height:1; }
.done-toggle:hover { color:rgba(0,255,65,0.9); }
.col-list { flex: 1; overflow-y: auto; padding: 10px 10px 20px; min-height: 0; }
#col-rd { direction: rtl; }
#col-rd > * { direction: ltr; }
.card {
  border-radius: 4px; padding: 12px 11px; margin-bottom: 7px;
  cursor: grab; user-select: none; font-family: 'Iosevka Mayukai Monolite', monospace; font-weight: 500;
  border: 1px solid transparent;
  transition: filter 0.15s;
}
.card:hover { filter: brightness(1.08); }
.card:active { cursor: grabbing; }
.card.plain { background: rgba(0,255,65,0.05); border-color: rgba(0,255,65,0.15); }
.card.plain:hover { background: rgba(0,255,65,0.09); }
.card-title { font-family: 'Iosevka Mayukai Monolite', monospace; font-weight: 700; font-size: 0.8rem; margin-bottom: 2px; }
.card-desc { font-size: 0.72rem; margin-top: 4px; opacity: 0.88; line-height: 1.45;
  overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.card-foot { display: flex; justify-content: space-between; align-items: baseline; margin-top: 5px; }
.card-badge { font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.6; }
.card-due { font-size: 0.62rem; }
.sortable-ghost { opacity: 0.2; }
#rd-search {
  background: none; border: none; outline: none;
  color: rgba(0,255,65,0.7); font-family: 'Iosevka Mayukai Monolite', monospace;
  font-weight: 500; font-size: 0.68rem; line-height: 1; padding: 0; width: 0; flex: 1; min-width: 0;
  text-align: right; align-self: center;
}
#rd-search::placeholder { color: rgba(0,255,65,0.3); }
#rd-search:focus { color: rgba(0,255,65,0.95); }
.card.search-hide { display: none; }
</style>

<div id="reminders-bar" class="rd-reminders"></div>

<div class="rem-ov-modal" id="rem-overflow-modal" onclick="if(event.target===this)this.style.display='none'">
  <div class="rem-ov-box">
    <div class="rem-ov-hdr">
      <span>upcoming reminders</span>
      <button class="rem-ov-close" onclick="document.getElementById('rem-overflow-modal').style.display='none'">&times;</button>
    </div>
    <div class="rem-ov-list" id="rem-overflow-list"></div>
  </div>
</div>

<div class="rd-board" id="board">
  <span style="padding:32px;font-family:'Iosevka Mayukai Monolite',monospace;font-size:0.8rem;opacity:0.4">loading...</span>
</div>

<script src="/card-style.js?v=2"></script>
<script src="/card-graph.js?v=12"></script>
<script src="/card-dialog.js?v=9"></script>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script>
/* global cardStyle, CAT_HUE, CAT_SAT, CAT_LIGHT */
const COLS = ['rd','hq','archives','exile'];
let cards = [];
let dragging = false;
let barSortable = null;
let archivesCollapsed = true;
let exileCollapsed = true;

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso.includes('T') ? iso : iso + 'T12:00:00');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  if (iso.includes('T')) {
    const hh = String(d.getHours()).padStart(2,'0');
    const min = String(d.getMinutes()).padStart(2,'0');
    return `${mm}/${dd} ${hh}:${min}`;
  }
  return `${mm}/${dd}`;
}

function isUrgent(iso) {
  return iso && (new Date(iso) - new Date()) / 86400000 <= 3;
}

function isOverdue(iso) {
  if (!iso) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  return new Date(iso.slice(0,10)) < today;
}

function isDueSoon(iso) {
  if (!iso) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  const days = (new Date(iso.slice(0,10)) - today) / 86400000;
  return days >= 0 && days <= 5;
}

// rd float window: due within 2 weeks (includes overdue)
function isDueWithin2wk(iso) {
  if (!iso) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  const days = (new Date(iso.slice(0,10)) - today) / 86400000;
  return days <= 14;
}

function renderCard(c) {
  const {bg, border, dark} = cardStyle(c);
  const hasStyle = !!bg;
  const bright = hasStyle && !dark;
  const titleC = !hasStyle ? 'rgba(0,255,65,0.9)' : dark ? 'inherit' : 'rgba(0,0,0,0.92)';
  const tc     = !hasStyle ? 'rgba(0,255,65,0.65)' : dark ? 'rgba(255,255,255,0.6)' : 'rgba(0,0,0,0.8)';
  const displayDate = c.due_date;
  const urgent = isUrgent(displayDate);
  const overdue = c.column === 'rd' && isOverdue(displayDate);
  const dueSoon = !overdue && isDueSoon(displayDate);
  const dateLabel = displayDate ? fmtDate(c.due_date) : '';
  const RECUR_LABEL = {week:'↺wk', 'bi-week':'↺2wk', month:'↺mo', holiday:'↺yr', birthday:'↺bday'};
  const recurBadge = c.recur_type ? `<span style="opacity:0.55;margin-left:4px">${RECUR_LABEL[c.recur_type]||'↺'}</span>` : '';
  const reminderBadge = c.is_reminder ? `<span style="opacity:0.4;font-size:0.55rem;margin-left:4px">[reminder]</span>` : '';
  const dateC = overdue ? 'rgba(255,80,80,0.9)' : dueSoon ? (bright ? 'rgba(0,90,0,0.95)' : 'rgba(0,255,65,0.95)') : bright ? (urgent ? 'rgba(0,0,0,1)' : 'rgba(30,30,30,0.75)') : (urgent && dark ? 'rgba(0,255,65,0.95)' : tc);
  return `<div class="card${hasStyle ? '' : ' plain'}" data-id="${c.id}" data-title="${(c.title||'').replace(/"/g,'&quot;')}" data-notes="${(c.notes||'').replace(/"/g,'&quot;')}" style="${bg}${border}">
    <div class="card-title" style="color:${titleC};${bright ? 'font-weight:700;' : ''}">${c.title}${reminderBadge}</div>
    ${(c.notes||c.description) ? `<div class="card-desc" style="color:${tc}">${c.notes||c.description}</div>` : ''}
    <div class="card-foot">
      <div class="card-badge" style="color:${tc}">${recurBadge}</div>
      ${displayDate ? `<div class="card-due" style="color:${dateC}">${dateLabel}</div>` : ''}
    </div>
  </div>`;
}

async function save() {
  COLS.forEach(col => {
    document.querySelectorAll(`#col-${col} .card`).forEach((el, i) => {
      const c = cards.find(x => x.id === el.dataset.id);
      if (c) { c.column = col; c.order = i; }
    });
  });
  await fetch('/api/rd', {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({cards})});
}

// eslint-disable-next-line no-unused-vars
function toggleArchives(e) { if (e) e.stopPropagation(); archivesCollapsed = !archivesCollapsed; buildBoard(); }
// eslint-disable-next-line no-unused-vars
function toggleExile(e) { if (e) e.stopPropagation(); exileCollapsed = !exileCollapsed; buildBoard(); }

const COL_LABELS = {rd: 'r&d', hq: 'hq', archives: 'archives', exile: 'exile'};

function renderCol(col) {
  const count = cards.filter(c=>c.column===col).length;
  const isArchives = col === 'archives', isExile = col === 'exile';
  const collapsed = (isArchives && archivesCollapsed) || (isExile && exileCollapsed);
  const toggle = isArchives ? 'toggleArchives' : (isExile ? 'toggleExile' : null);
  const label = COL_LABELS[col] || col;
  const hdr = toggle
    ? `<span class="col-hdr-label">${collapsed ? '▶' : label} <span style="opacity:0.35">(${count})</span></span>
       ${!collapsed ? `<button class="done-toggle" onclick="${toggle}(event)">▼</button>` : ''}`
    : col === 'rd'
      ? `<span class="col-hdr-label">${label} <span style="opacity:0.35">(${count})</span></span><input id="rd-search" type="text" placeholder="...search" autocomplete="off" spellcheck="false">`
      : `<span class="col-hdr-label">${label} <span style="opacity:0.35">(${count})</span></span>`;
  const hideFromMain = col === 'rd' || col === 'hq';
  const floatSoon = col === 'rd' || col === 'hq';
  const colCards = collapsed ? '' : cards.filter(c=>c.column===col && !(hideFromMain && (c.is_reminder || c.size==='book'))).sort((a,b)=>{
    if (col === 'rd') {
      // due within 2 weeks floats to top, sorted by due date (overrides manual order)
      const da = isDueWithin2wk(a.due_date), db = isDueWithin2wk(b.due_date);
      if (da !== db) return da ? -1 : 1;
      if (da && db) return a.due_date.localeCompare(b.due_date);
    } else if (floatSoon) {
      const sa = isDueSoon(a.due_date) ? 0 : 1, sb = isDueSoon(b.due_date) ? 0 : 1;
      if (sa !== sb) return sa - sb;
    }
    return a.order - b.order;
  }).map(renderCard).join('');
  return `<div class="col${collapsed?' col-collapsed':''}"${collapsed&&toggle?` onclick="${toggle}()"`:''}>
    <div class="col-hdr">${hdr}</div>
    <div class="col-list" id="col-${col}">${colCards}</div>
  </div>`;
}


function _remChipHtml(c) {
  const date = c.due_date ? ` <span style="opacity:0.45;font-size:0.9em">${c.due_date.slice(5)}</span>` : '';
  const h = CAT_HUE[c.category];
  const ds = CAT_SAT[c.category] || 0;
  const dl = CAT_LIGHT[c.category] || 0;
  const color  = h !== undefined ? `hsl(${h},${75+ds}%,${72+dl}%)` : 'rgba(0,255,65,0.9)';
  const bg     = h !== undefined ? `hsl(${h},${55+ds}%,${18+dl}%)` : 'rgba(0,255,65,0.07)';
  const border = h !== undefined ? `hsl(${h},${50+ds}%,${32+dl}%)` : 'rgba(0,255,65,0.22)';
  const title = c.title;
  return `<div class="rem-item" data-id="${c.id}" style="color:${color};background:${bg};border:1px solid ${border}">${title}${date}</div>`;
}

function _syncRemH() {
  const bar = document.getElementById('reminders-bar');
  if (bar) document.documentElement.style.setProperty('--rem-bar-h', bar.offsetHeight + 'px');
}

function buildReminders() {
  const all = cards.filter(c => c.is_reminder && c.column !== 'archives' && c.column !== 'exile')
    .sort((a, b) => (a.due_date || '9999') < (b.due_date || '9999') ? -1 : 1);
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() + 30);
  const cutoffIso = cutoff.toISOString().slice(0, 10);
  const visible = all.filter(c => c.pinned_reminder || !c.due_date || c.due_date.slice(0, 10) <= cutoffIso);
  const overflow = all.filter(c => !c.pinned_reminder && c.due_date && c.due_date.slice(0, 10) > cutoffIso);
  if (!all.length) { document.body.classList.remove('has-reminders'); }
  else { document.body.classList.add('has-reminders'); }
  const bar = document.getElementById('reminders-bar');
  bar.innerHTML = visible.map(_remChipHtml).join('');
  bar.querySelectorAll('.rem-item').forEach(el => {
    el.addEventListener('click', () => { if (!dragging) openCardDialog(el.dataset.id, () => { load(); }, 'core'); });
  });
  if (overflow.length) {
    const last = bar.lastElementChild;
    if (last) {
      last.style.position = 'relative';
      last.style.overflow = 'visible';
      const btn = document.createElement('button');
      btn.className = 'rem-overflow-btn';
      btn.textContent = `+${overflow.length}`;
      btn.onclick = showRemOverflow;
      last.appendChild(btn);
    }
  }
  _syncRemH();
}

function showRemOverflow() {
  const all = cards.filter(c => c.is_reminder && c.column !== 'archives' && c.column !== 'exile')
    .sort((a, b) => (a.due_date || '9999') < (b.due_date || '9999') ? -1 : 1);
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() + 30);
  const cutoffIso = cutoff.toISOString().slice(0, 10);
  const overflow = all.filter(c => c.due_date && c.due_date.slice(0, 10) > cutoffIso);
  const modal = document.getElementById('rem-overflow-modal');
  document.getElementById('rem-overflow-list').innerHTML = overflow.map(c => {
    const h = CAT_HUE[c.category];
    const ds = CAT_SAT[c.category] || 0;
    const dl = CAT_LIGHT[c.category] || 0;
    const color = h !== undefined ? `hsl(${h},${75+ds}%,${72+dl}%)` : 'rgba(0,255,65,0.9)';
    return `<div class="rem-ov-row" data-id="${c.id}" style="color:${color}">${c.title}<span style="opacity:0.45;margin-left:8px;font-size:0.85em">${c.due_date.slice(5)}</span></div>`;
  }).join('');
  modal.style.display = 'flex';
  modal.querySelectorAll('.rem-ov-row').forEach(el => {
    el.addEventListener('click', () => {
      modal.style.display = 'none';
      openCardDialog(el.dataset.id, () => { load(); }, 'core');
    });
  });
}

function buildBoard() {
  buildReminders();
  // preserve per-column scroll across innerHTML rebuild
  const scrollPos = {};
  COLS.forEach(col => { const el = document.getElementById('col-'+col); if (el) scrollPos[col] = el.scrollTop; });
  const mainCol = col => renderCol(col).replace('<div class="col', '<div style="flex:4" class="col');
  const groupExpanded = !archivesCollapsed || !exileCollapsed;
  document.getElementById('board').innerHTML =
    ['rd','hq'].map(mainCol).join('') +
    `<div class="col-group" style="flex:${groupExpanded ? 4 : 1}">${['archives','exile'].map(renderCol).join('')}</div>`;
  COLS.forEach(col => { const el = document.getElementById('col-'+col); if (el && scrollPos[col] != null) el.scrollTop = scrollPos[col]; });
  COLS.forEach(col => {
    const el = document.getElementById('col-'+col);
    if (!el) return;
    Sortable.create(el, {
      group:'kanban', animation:120, ghostClass:'sortable-ghost',
      delay: 300, delayOnTouchOnly: true,
      onStart: () => { dragging = true; document.getElementById('board').classList.add('drag-active'); document.body.classList.add('dragging-card'); },
      onEnd: () => { document.getElementById('board').classList.remove('drag-active'); document.body.classList.remove('dragging-card'); setTimeout(() => { dragging = false; }, 50); save(); }
    });
  });
  document.querySelectorAll('.card').forEach(el => {
    el.addEventListener('click', () => { if (!dragging) openCardDialog(el.dataset.id, () => { load(); }, 'core'); });
  });
  initBarSortable();
  const srch = document.getElementById('rd-search');
  if (srch) srch.addEventListener('input', function() {
    const q = this.value.trim().toLowerCase();
    document.querySelectorAll('#col-rd .card, #col-hq .card').forEach(el => {
      const title = (el.dataset.title || '').toLowerCase();
      const notes = (el.dataset.notes || '').toLowerCase();
      el.classList.toggle('search-hide', !!q && !title.includes(q) && !notes.includes(q));
    });
  });
}

function initBarSortable() {
  const bar = document.getElementById('reminders-bar');
  if (!bar) return;
  if (barSortable) { barSortable.destroy(); barSortable = null; }
  barSortable = Sortable.create(bar, {
    group: { name: 'kanban', put: true, pull: true },
    animation: 120,
    ghostClass: 'sortable-ghost',
    delay: 300, delayOnTouchOnly: true,
    onAdd: async (evt) => {
      const id = evt.item.dataset.id;
      evt.item.remove();
      const c = cards.find(x => x.id === id);
      if (c) {
        c.is_reminder = true;
        await save();
        buildBoard();
      }
    },
    onRemove: (evt) => {
      const id = evt.item.dataset.id;
      evt.item.remove();
      const c = cards.find(x => x.id === id);
      if (c) {
        c.is_reminder = false;
        setTimeout(() => { save(); buildBoard(); }, 80);
      }
    }
  });
}

async function load() {
  const data = await (await fetch('/api/rd')).json();
  cards = data.cards || [];
  buildBoard();
}

window.addEventListener('resize', _syncRemH);
// exec bubble changed cards -> reload live
window.addEventListener('exec:cards-changed', () => load());

load();
</script>
