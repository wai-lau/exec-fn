
<style>
body { overflow-y: auto !important; }
.clr-wrap { width: min(980px, 94vw); margin: 24px auto 100px; font-family: 'Iosevka Mayukai Monolite', monospace; color: var(--green); }
.clr-note {
  font-size: 0.66rem; color: rgba(var(--green-rgb),0.4);
  margin-bottom: 28px; line-height: 1.5;
}
.clr-note code { background: rgba(var(--green-rgb),0.08); padding: 1px 4px; border-radius: 2px; }
.clr-section { margin-bottom: 30px; }
.clr-hdr {
  font-family: '04b25', monospace; font-size: 0.6rem; text-transform: uppercase;
  letter-spacing: 0.18em; color: rgba(var(--green-rgb),0.5);
  border-bottom: 1px solid rgba(var(--green-rgb),0.12);
  padding-bottom: 6px; margin-bottom: 10px;
}
.clr-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.clr-card {
  border: 1px solid rgba(var(--green-rgb),0.12); border-radius: 4px;
  overflow: hidden; background: rgba(0,0,0,0.25);
}
.clr-swatch { height: 54px; display: flex; position: relative; }
/* white bar behind the color — 1/3 height, centered — exposes alpha:
   translucent tokens read against both white and the dark card */
.clr-swatch::before {
  content: ''; position: absolute;
  left: 0; right: 0; top: 33.3%; height: 33.4%;
  background: #fff;
}
.clr-swatch span { flex: 1; position: relative; }
.clr-info { padding: 8px 10px 9px; border-top: 1px solid rgba(var(--green-rgb),0.1); }
.clr-name-row { display: flex; justify-content: space-between; align-items: baseline; gap: 6px; margin-bottom: 2px; }
.clr-name { font-size: 0.64rem; color: rgba(var(--green-rgb),0.92); word-break: break-all; }
.clr-count { font-size: 0.56rem; color: rgba(var(--green-rgb),0.55); flex-shrink: 0; }
.clr-val { font-size: 0.56rem; opacity: 0.5; margin-bottom: 4px; word-break: break-all; }
.clr-use { font-size: 0.6rem; opacity: 0.45; line-height: 1.45; }
.clr-empty { font-size: 0.75rem; color: rgba(var(--green-rgb),0.5); padding: 8px 0; }
</style>

<div class="clr-wrap">
  <div class="clr-note">
    palette moodboard — read-only, parsed live from <code>chrome.css :root</code>.
    edit the tokens there; this page just watches.
    <code>-rgb</code> triplets show their alpha ramp (0.1 / 0.3 / 0.6 / 1.0).
    ×N = <code>var(--token)</code> references across templates + web assets.
    hidden: unused tokens, and solid twins of <code>-rgb</code> tokens.
  </div>
  <div id="clr-board"><span class="clr-empty">loading...</span></div>
</div>

<script>
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function swatchHtml(name, value) {
  if (name.endsWith('-rgb')) {
    const ramp = [0.1, 0.3, 0.6, 1.0]
      .map(a => `<span style="background:rgba(${esc(value)},${a})"></span>`).join('');
    return `<div class="clr-swatch">${ramp}</div>`;
  }
  return `<div class="clr-swatch"><span style="background:${esc(value)}"></span></div>`;
}

function parsePalette(css) {
  const root = css.match(/:root\s*\{([^}]*)\}/);
  if (!root) return [];
  const sections = [];
  let current = { title: 'palette', tokens: [] };
  for (const line of root[1].split('\n')) {
    const hdr = line.match(/^\s*\/\*\s*──\s*(.+?)\s*─+\s*\*\/\s*$/);
    if (hdr) {
      if (current.tokens.length) sections.push(current);
      current = { title: hdr[1], tokens: [] };
      continue;
    }
    const tok = line.match(/^\s*--([\w-]+):\s*([^;]+);\s*(?:\/\*\s*(.*?)\s*\*\/)?/);
    if (tok) current.tokens.push({ name: tok[1], value: tok[2].trim(), use: tok[3] || '' });
  }
  if (current.tokens.length) sections.push(current);
  return sections;
}

// Hide solid twins of -rgb tokens (their counts fold into the -rgb card)
// and anything with zero combined usage.
function visibleTokens(tokens, usage) {
  const names = new Set(tokens.map(t => t.name));
  return tokens
    .filter(t => !names.has(t.name + '-rgb'))
    .map(t => {
      const twin = t.name.endsWith('-rgb') ? t.name.slice(0, -4) : null;
      const twinCount = twin && names.has(twin) ? (usage[twin] || 0) : 0;
      return { ...t, count: (usage[t.name] || 0) + twinCount };
    })
    .filter(t => t.count > 0);
}

function cardHtml(t) {
  return `<div class="clr-card">
    ${swatchHtml(t.name, t.value)}
    <div class="clr-info">
      <div class="clr-name-row">
        <span class="clr-name">--${esc(t.name)}</span>
        <span class="clr-count">&times;${t.count}</span>
      </div>
      <div class="clr-val">${esc(t.value)}</div>
      ${t.use ? `<div class="clr-use">${esc(t.use)}</div>` : ''}
    </div>
  </div>`;
}

async function loadColors() {
  const board = document.getElementById('clr-board');
  try {
    const [cssRes, usageRes] = await Promise.all([
      fetch('/chrome.css'),
      fetch('/api/color/usage'),
    ]);
    const css = await cssRes.text();
    const usage = usageRes.ok ? await usageRes.json() : {};
    const sections = parsePalette(css);
    if (!sections.length) { board.innerHTML = '<div class="clr-empty">no :root palette found in chrome.css</div>'; return; }
    board.innerHTML = sections.map(sec => {
      const tokens = visibleTokens(sec.tokens, usage);
      if (!tokens.length) return '';
      return `<div class="clr-section">
        <div class="clr-hdr">${esc(sec.title)}</div>
        <div class="clr-grid">${tokens.map(cardHtml).join('')}</div>
      </div>`;
    }).join('');
  } catch (e) {
    board.innerHTML = `<div class="clr-empty">failed to load palette: ${esc(e.message)}</div>`;
  }
}

loadColors();
</script>
