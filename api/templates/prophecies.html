<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

<div class="pr-books" id="pr-books-bar"></div>
<div class="book-ov-modal" id="book-overflow-modal" onclick="if(event.target===this)this.style.display='none'">
  <div class="book-ov-box">
    <div class="book-ov-hdr">
      <span>all books</span>
      <button class="book-ov-close" onclick="document.getElementById('book-overflow-modal').style.display='none'">&times;</button>
    </div>
    <div class="book-ov-list" id="book-overflow-list"></div>
  </div>
</div>
<div class="pr-board" id="pr-board">
  <span style="padding:32px;font-family:monospace;font-size:0.8rem;opacity:0.4">loading...</span>
</div>

<script>
/* global cardStyle */
const RECUR_LABEL = {week:'↺wk', 'bi-week':'↺2wk', month:'↺mo', holiday:'↺yr', birthday:'↺bday'};
const SIZE_MIN = {chore:30, task:90, project:240, titan:480, book:60};

let weekStart = null;
let weekData = null;
let pendingUpdates = [];
let saveTimer = null;
let _prDragging = false;

function isoToday() {
  const d = new Date();
  if (d.getHours() * 60 + d.getMinutes() < 4*60+30) d.setDate(d.getDate() - 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function addDays(iso, n) {
  const d = new Date(iso + 'T12:00:00');
  d.setDate(d.getDate() + n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmtDay(iso) {
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
}

function cardHeight(c, small) {
  const mins = c.estimated_time || SIZE_MIN[c.size] || 60;
  if (small) return Math.max(26, Math.min(80, Math.round(mins * 0.3))) + 'px';
  return Math.max(44, Math.min(220, Math.round(mins * 0.75))) + 'px';
}


function isOverdue(card, dayIso) {
  if (!card.due_date) return false;
  return dayIso > card.due_date.slice(0, 10);
}

function renderCard(c, dayIso, small) {
  const {bg, border, dark} = cardStyle(c);
  const titleC = bg ? (dark ? 'inherit' : 'rgba(0,0,0,0.85)') : 'rgba(0,255,65,0.88)';
  const metaC  = bg ? (dark ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.5)') : 'rgba(0,255,65,0.4)';
  const h = cardHeight(c, small);

  const over = (dayIso && isOverdue(c, dayIso)) ? '<span class="pr-overdue">!</span>' : '';
  const reminder = c.is_reminder ? '<span style="opacity:0.35;font-size:0.6rem"> [rem]</span>' : '';
  const recur = c.recur_type ? `<span style="opacity:0.45">${RECUR_LABEL[c.recur_type]||'↺'}</span>` : '';
  const dueC = (dayIso && isOverdue(c, dayIso)) ? 'rgba(255,80,80,0.9)' : metaC;
  const due = c.due_date ? `<span class="pr-due" style="color:${dueC}">due ${c.due_date.slice(5).replace('T',' ')}</span>` : '';
  const metaHtml = (recur || due) ? `<div class="pr-card-meta" style="color:${metaC}">${recur}${due}</div>` : '';
  const hPx = parseInt(h);
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const notesHtml = (!small && c.notes && hPx >= 44) ? `<div class="pr-card-notes" style="color:${metaC}">${esc(c.notes)}</div>` : '';
  return `<div class="pr-card${bg ? '' : ' plain'}" data-id="${c.id}" data-due="${c.due_date||''}" style="${bg}${border}height:${h};min-height:${h}">
    ${over}
    <div class="pr-card-title" style="color:${titleC}">${c.title}${reminder}</div>
    ${metaHtml}
    ${notesHtml}
  </div>`;
}

function dayCellHtml(day, today, small) {
  const cards = weekData.days[day] || [];
  const isToday = day === today;
  const dow = new Date(day + 'T12:00:00').getDay();
  const isWeekend = dow === 0 || dow === 6;
  const dayLabel = fmtDay(day).split(',')[0];
  const dateLabel = fmtDay(day).replace(/^[^,]+, /, '');
  return `<div class="pr-col${isWeekend?' weekend':''}" data-day="${day}">
    <div class="pr-col-hdr${isToday?' today-hdr':''}">
      <div class="pr-day-name">${dayLabel} <span class="pr-date">${dateLabel}</span></div>
    </div>
    <div class="pr-list" id="pr-list-${day}">${cards.map(c=>renderCard(c,day,small)).join('')}</div>
  </div>`;
}

function buildBoard() {
  if (!weekData) return;
  const today = isoToday();

  // Always include today even when viewing a different week
  if (!weekData.days[today]) weekData.days[today] = [];
  const days = Object.keys(weekData.days).sort();

  // three columns: today | tomorrow + day after | next three (small)
  const groups = [days.slice(0, 1), days.slice(1, 3), days.slice(3, 6)];
  let html = '';
  groups.forEach((groupDays, gi) => {
    const small = gi === 2;
    html += `<div class="pr-colgroup${small?' small':''}">`;
    html += groupDays.map(day => dayCellHtml(day, today, small)).join('');
    html += `</div>`;
  });

  document.getElementById('pr-board').innerHTML = html;
  initSortable(days);
  document.querySelectorAll('.pr-card').forEach(el => {
    el.addEventListener('click', () => { if (!_prDragging) openCardDialog(el.dataset.id, () => load(weekStart), 'prof'); });
  });
}

function initSortable(days) {
  const unscheduleEl = document.getElementById('pr-unschedule');

  Sortable.create(unscheduleEl, {
    group: { name: 'prophecies', put: true, pull: false },
    animation: 120,
    ghostClass: 'sortable-ghost',
    onAdd(evt) {
      const cardId = evt.item.dataset.id;
      evt.item.remove();
      queueUpdate(cardId, null, false);
      setTimeout(() => load(weekStart), 700);
    },
  });

  days.forEach(day => {
    const el = document.getElementById('pr-list-' + day);
    if (!el) return;
    Sortable.create(el, {
      group: 'prophecies',
      animation: 120,
      ghostClass: 'sortable-ghost',
      delay: 300,
      delayOnTouchOnly: true,
      onStart() {
        _prDragging = true;
        document.body.classList.add('pr-dragging');
      },
      onEnd(evt) {
        _prDragging = false;
        document.body.classList.remove('pr-dragging');
        const cardId = evt.item.dataset.id;
        const cardDue = evt.item.dataset.due;
        const toDay = evt.to.id.replace('pr-list-', '');

        if (evt.to === unscheduleEl) return;

        if (cardDue && toDay > cardDue) {
          showToast(`Warning: scheduling after due date (${cardDue})`);
        }
        evt.to.querySelectorAll('.pr-card').forEach((el, i) => {
          if (el.dataset.id === cardId) queueUpdate(el.dataset.id, toDay, i);
          else queueUpdate(el.dataset.id, undefined, i);
        });
        if (evt.from !== evt.to) {
          evt.from.querySelectorAll('.pr-card').forEach((el, i) => {
            queueUpdate(el.dataset.id, undefined, i);
          });
        }
      },
    });
  });

  unscheduleEl.addEventListener('dragover', () => unscheduleEl.classList.add('drag-over'));
  unscheduleEl.addEventListener('dragleave', () => unscheduleEl.classList.remove('drag-over'));
}

function queueUpdate(cardId, scheduledDay, order) {
  const idx = pendingUpdates.findIndex(u => u.id === cardId);
  const upd = {id: cardId};
  if (scheduledDay !== undefined) upd.scheduled_day = scheduledDay || null;
  if (order !== undefined) upd.order = order;
  if (idx >= 0) pendingUpdates[idx] = {...pendingUpdates[idx], ...upd};
  else pendingUpdates.push(upd);
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(flushUpdates, 600);
}

async function flushUpdates() {
  if (!pendingUpdates.length) return;
  const updates = [...pendingUpdates];
  pendingUpdates = [];
  setStatus('saving...');
  try {
    await fetch('/api/prophecies', {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({updates}),
    });
    setStatus('saved');
    setTimeout(() => setStatus(''), 1500);
  } catch(e) {
    setStatus('save error: ' + e.message);
  }
}

function setStatus(msg) {
  document.getElementById('pr-status').textContent = msg;
}

let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('pr-toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 4000);
}

function _syncBooksH() {
  const bar = document.getElementById('pr-books-bar');
  if (bar) document.documentElement.style.setProperty('--books-bar-h', bar.offsetHeight + 'px');
}

async function buildBooks() {
  const r = await fetch('/api/rd');
  const data = await r.json();
  const all = (data.cards || []).filter(c => c.size === 'book' && c.column !== 'archives' && c.column !== 'exile');
  const bar = document.getElementById('pr-books-bar');
  if (!all.length) { document.body.classList.remove('has-books'); bar.innerHTML = ''; return; }
  document.body.classList.add('has-books');
  const MAX_VISIBLE = 8;
  const visible = all.slice(0, MAX_VISIBLE);
  const overflow = all.slice(MAX_VISIBLE);
  bar.innerHTML = visible.map(c => {
    const pct = (c.current_page && c.total_pages && c.total_pages > 0)
      ? Math.min(100, Math.round(c.current_page / c.total_pages * 100)) : 0;
    const bar_html = `<div class="book-item-bar"><div class="book-item-fill" style="width:${pct}%"></div></div>`;
    return `<div class="book-item" data-id="${c.id}" style="color:hsl(210,75%,72%);background:hsl(210,55%,12%);border:1px solid hsl(210,50%,26%)"><div class="book-item-title">${c.title}</div>${bar_html}</div>`;
  }).join('');
  bar.querySelectorAll('.book-item').forEach(el => {
    el.addEventListener('click', () => { if (!_prDragging) openCardDialog(el.dataset.id, () => { buildBooks(); }, 'prof'); });
  });
  if (overflow.length) {
    const last = bar.lastElementChild;
    if (last) {
      last.style.position = 'relative';
      last.style.overflow = 'visible';
      const btn = document.createElement('button');
      btn.className = 'book-overflow-btn';
      btn.textContent = `+${overflow.length}`;
      btn.onclick = showBookOverflow;
      last.appendChild(btn);
    }
  }
  _syncBooksH();
}

function showBookOverflow() {
  const modal = document.getElementById('book-overflow-modal');
  const list = document.getElementById('book-overflow-list');
  fetch('/api/rd').then(r => r.json()).then(data => {
    const all = (data.cards || []).filter(c => c.size === 'book' && c.column !== 'archives' && c.column !== 'exile');
    list.innerHTML = all.slice(8).map(c =>
      `<div class="book-ov-row" data-id="${c.id}">${c.title}</div>`
    ).join('');
    list.querySelectorAll('.book-ov-row').forEach(el => {
      el.addEventListener('click', () => {
        modal.style.display = 'none';
        openCardDialog(el.dataset.id, () => { buildBooks(); }, 'prof');
      });
    });
    modal.style.display = 'flex';
  });
}

function consult_oracle() {
  const unsched = weekData.unscheduled || [];
  if (!unsched.length) return;

  const today = isoToday();
  // Stay within backend window (today..today+5); skip today itself.
  const targetDays = Array.from({length: 5}, (_, i) => addDays(today, i + 1));

  // count already-scheduled cards per target day
  const counts = {};
  for (const day of targetDays) {
    counts[day] = (weekData.days[day] || []).length;
  }

  for (const card of unsched) {
    const day = targetDays.reduce((a, b) => counts[a] <= counts[b] ? a : b);
    counts[day]++;
    // Place locally so buildBoard renders it this paint — never leave a
    // card stranded in the (unrendered) unscheduled bucket.
    card.scheduled_day = day;
    (weekData.days[day] = weekData.days[day] || []).push(card);
    queueUpdate(card.id, day, false);
  }
  weekData.unscheduled = [];
}

async function load(start) {
  document.getElementById('pr-board').innerHTML = '<span style="padding:32px;font-family:monospace;font-size:0.8rem;opacity:0.4">loading...</span>';
  const url = start ? `/api/prophecies?start=${start}` : '/api/prophecies';
  const [r] = await Promise.all([fetch(url), buildBooks()]);
  weekData = await r.json();
  weekStart = weekData.week_start;
  if (!start) consult_oracle();
  buildBoard();
}

window.addEventListener('resize', _syncBooksH);
// exec bubble changed cards -> reload live
window.addEventListener('exec:cards-changed', () => load(weekStart));
load(null);

</script>
