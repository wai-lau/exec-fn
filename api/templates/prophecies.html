
<style>
body { overflow: hidden !important; }
.pr-loading { padding: 32px; font-family: monospace; font-size: 0.8rem; opacity: 0.4; }
.pr-board {
  position: fixed; top: 0; bottom: 0; left: 0; right: 0;
  display: flex; gap: 1px; overflow: hidden;
  background: var(--bg);
}
/* three columns: [today] | [tomorrow, day after] | [next three, smaller] */
.pr-colgroup {
  flex: 1; min-width: 0; min-height: 0; position: relative;
  display: flex; flex-direction: column; gap: 3px;
  background: var(--bg);
}
/* today (timeline) column 25% wider, last column 25% narrower */
.pr-colgroup:first-child { flex: 1.25; }
.pr-colgroup:last-child { flex: 0.75; }
.pr-col {
  flex: 1; display: flex; flex-direction: column;
  background: var(--bg); min-width: 0; min-height: 0; overflow: hidden;
}
/* vertical divider between columns — matches the timeline hour lines,
   80% of column height, centered */
.pr-colgroup:not(:first-child)::before {
  content: ''; position: absolute; left: 0; top: 10%; height: 80%; width: 3px;
  background: rgba(255,255,255,0.2); pointer-events: none; z-index: 10;
}
/* side columns pack three days — shrink chrome to fit (day-name font +
   header padding stay the same as the today column so titles align) */
.pr-colgroup.small .pr-list { padding: 5px 6px 14px; }
.pr-colgroup.small .pr-card { padding: 5px 8px; margin-bottom: 4px; }
.pr-colgroup.small .pr-card-title { font-size: 0.66rem; line-height: 1.2; margin-bottom: 0; }
.pr-colgroup.small .pr-card-meta { font-size: 0.5rem; margin-top: 2px; }
.pr-col.weekend { background: var(--bg); }
.pr-col.weekend .pr-day-name { color: var(--blue-weekend); }
.pr-col-hdr {
  flex-shrink: 0; padding: 4px 10px 5px;
  font-family: '04b25', monospace; font-size: 0.6rem; text-transform: uppercase;
  letter-spacing: 0.15em; color: rgba(var(--green-rgb),0.55);
}
.pr-col-hdr .pr-day-name { color: rgba(var(--green-rgb),0.8); font-size: 0.68rem; }
.pr-col-hdr .pr-date { opacity: 0.45; font-size: 0.58rem; }
.pr-col-hdr.today-hdr { border-bottom: none; }
.pr-col-hdr.today-hdr .pr-day-name { color: var(--green); }
.pr-list {
  flex: 1; overflow-y: auto; padding: 8px 8px 20px;
  min-height: 0;
}
.pr-card {
  border-radius: 4px; padding: 9px 11px; margin-bottom: 5px;
  cursor: grab; user-select: none; font-family: 'Iosevka Mayukai Monolite', monospace; font-weight: 500;
  border: 1px solid transparent; position: relative;
  overflow: hidden; box-sizing: border-box;
  transition: filter 0.12s;
  min-height: 36px; display: flex; flex-direction: column;
}
.pr-card:active { cursor: grabbing; }
.pr-card:hover { filter: brightness(1.1); }
.pr-card.plain { background: rgba(var(--green-rgb),0.06); border-color: rgba(var(--green-rgb),0.18); }
.pr-card-title { font-family: 'Iosevka Mayukai Monolite', monospace; font-weight: 700; font-size: 0.8rem; line-height: 1.3; word-break: break-word; margin-bottom: 2px; }
.pr-card-meta { font-size: 0.58rem; opacity: 0.5; margin-top: 3px; display: flex; justify-content: space-between; gap: 4px; }
.pr-card-notes { font-size: 0.72rem; opacity: 0.88; margin-top: 4px; line-height: 1.45; word-break: break-word; }
.pr-overdue { position: absolute; top: 4px; right: 6px; font-size: 0.6rem; color: rgba(var(--orange-overdue-rgb),0.9); }
.sortable-ghost { opacity: 0.15; }
.pr-unschedule {
  position: fixed; bottom: 0; left: 0; right: 0; height: 58px; z-index: 25;
  display: flex; align-items: center; justify-content: center;
  font-family: monospace; font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase;
  color: rgba(var(--red-rgb),0); border-top: 1px solid rgba(var(--red-rgb),0);
  transition: color 0.15s, border-color 0.15s, background 0.15s;
  pointer-events: none;
}
body.pr-dragging .pr-unschedule {
  pointer-events: all;
  color: rgba(var(--red-rgb),0.55); border-top-color: rgba(var(--red-rgb),0.3);
  background: rgba(var(--red-dark-rgb),0.06);
}
body.pr-dragging .pr-unschedule.drag-over {
  color: var(--red); border-top-color: rgba(var(--red-rgb),0.8);
  background: rgba(var(--red-dark-rgb),0.18);
}
.pr-toast {
  position: fixed; bottom: 68px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.9); border: 1px solid rgba(var(--orange-overdue-rgb),0.5);
  color: rgba(var(--orange-overdue-rgb),0.9); font-family: monospace; font-size: 0.78rem;
  padding: 8px 20px; z-index: 100; pointer-events: none;
  opacity: 0; transition: opacity 0.3s;
}
.pr-toast.show { opacity: 1; }

/* today column = timeline (grid, time-sort, now-line, past "hider") */
.pr-tl-wrap { flex: 1; overflow-y: auto; padding: 0 10px; position: relative; min-height: 0; scrollbar-width: none; -ms-overflow-style: none; }
.pr-tl-wrap::-webkit-scrollbar { display: none; }
.dir-block {
  position: absolute; left: 3px; right: 3px; box-sizing: border-box;
  border-radius: 4px; padding: 6px 9px 12px;
  cursor: grab; user-select: none; font-family: 'Iosevka Mayukai Monolite', monospace; font-weight: 500;
  border: 1px solid transparent; overflow: hidden; display: flex; flex-direction: column;
  z-index: 3;
}
.dir-block:active { cursor: grabbing; }
.dir-block.plain { background: rgba(var(--green-rgb),0.06); border-color: rgba(var(--green-rgb),0.18); }
.dir-block-title { font-family: 'Iosevka Mayukai Monolite', monospace; font-weight: 700; font-size: 0.66rem; line-height: 1.2; margin-bottom: 2px; word-break: break-word; }
.dir-block-meta { font-size: 0.5rem; opacity: 0.45; margin-top: 2px; display: flex; gap: 8px; }
.dir-block-notes { font-size: 0.72rem; opacity: 0.88; margin-top: 4px; line-height: 1.4; flex: 1; overflow: hidden; }
.dir-resize {
  position: absolute; bottom: 0; left: 0; right: 0; height: 8px;
  cursor: ns-resize; display: flex; align-items: center; justify-content: center;
}
.dir-resize::after { content: ''; display: block; width: 24px; height: 2px; background: #fff; border-radius: 1px; mix-blend-mode: overlay; }
.dir-tl-labels { width: 18px; flex-shrink: 0; position: relative; }
.dir-tl-label {
  position: absolute; right: 3px; transform: translateY(-50%);
  font-size: 0.85rem; white-space: nowrap; font-family: '04b25', monospace;
  color: var(--gray-label);
}
.dir-tl-track { flex: 1; position: relative; background: var(--bg); }

/* timeline furniture (positioned per-element from JS) */
.tl-hour-line, .tl-half-line { position: absolute; left: 0; right: 0; pointer-events: none; z-index: 5; }
.tl-hour-line { border-top: 3px solid rgba(255,255,255,0.25); }
.tl-half-line { border-top: 1px solid rgba(255,255,255,0.08); }
.tl-meal {
  position: absolute; left: 3px; right: 3px; z-index: 1;
  background: var(--teal-meal); border: 1px solid var(--teal-meal-border); border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  box-sizing: border-box; pointer-events: none;
}
.tl-meal-label { font-family: 'Iosevka Mayukai Monolite', monospace; font-weight: 700; font-size: 0.72rem; color: rgba(255,255,255,0.16); }
.tl-empty { position: absolute; top: 16px; left: 8px; opacity: 0.3; font-family: monospace; font-size: 0.75rem; pointer-events: none; }
.tl-past { position: absolute; left: -18px; right: 0; top: 0; background: rgba(var(--bg-rgb),0.75); pointer-events: none; z-index: 6; }
/* shown/hidden via inline style from updateNowIndicator — keep display
   out of these classes or style.display='' falls back to hidden */
.tl-now-line { position: absolute; left: 0; right: 0; border-top: 3px solid #fff; box-shadow: 0 0 4px #000, 0 2px 4px #000; pointer-events: none; z-index: 7; }
.tl-now-clock {
  position: absolute; left: 0; right: 0; text-align: center;
  font-family: 'Iosevka Mayukai Monolite', monospace; font-size: 0.72rem; font-weight: 400;
  color: rgba(var(--orange-rgb),0.95);
  text-shadow: 0 0 8px rgba(var(--orange-glow-rgb),0.9), 0 0 20px rgba(var(--orange-glow-rgb),0.6);
  pointer-events: none; z-index: 7;
}

/* faint placeholder showing where a dragged block will land (Sortable-style) */
.pr-drop-preview { opacity: 0.2; border: 1px dashed rgba(var(--green-rgb),0.55); border-radius: 4px; box-sizing: border-box; pointer-events: none; color: rgba(var(--green-rgb),0.9); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-family: 'Iosevka Mayukai Monolite', monospace; font-size: 0.66rem; }
.pr-drop-preview.today { position: absolute; left: 3px; right: 3px; background: rgba(var(--green-rgb),0.12); padding: 5px 8px; }
</style>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

<div class="pr-board" id="pr-board">
  <span class="pr-loading">loading...</span>
</div>
<span id="pr-status" style="display:none"></span>
<div class="pr-toast" id="pr-toast"></div>
<div class="pr-unschedule" id="pr-unschedule">unschedule</div>

<script src="/card-style.js?v=2"></script>
<script src="/card-graph.js?v=12"></script>
<script src="/card-dialog.js?v=11"></script>

<script>
/* global cardStyle */
const RECUR_LABEL = {week:'↺wk', 'bi-week':'↺2wk', month:'↺mo', holiday:'↺yr', birthday:'↺bday'};
const SIZE_MIN = {chore:30, task:90, project:240, titan:480, book:60};

let weekStart = null;
let weekData = null;
let pendingUpdates = [];
let saveTimer = null;
let _prDragging = false;

// today-column timeline state
const TL_PX = 1;                 // 1px per minute
const TL_START = 4 * 60 + 30;    // 4:30am
const TL_END   = 28 * 60 + 30;   // 4:30am next day
const TL_H     = TL_END - TL_START; // 1440px
const SNAP     = 15;
let currentTrack = null;
let scheduleCards = [];
let _nowInterval = null;
let _nowRaf = null;
function snapMin(v) { return Math.round(v / SNAP) * SNAP; }
function nowMinutes() {
  const n = new Date();
  const m = n.getHours() * 60 + n.getMinutes();
  return m < TL_START ? m + 24 * 60 : m;
}
function durLabel(min) {
  return min >= 60 ? `${Math.floor(min/60)}h${min%60?min%60+'m':''}` : `${min}m`;
}

function isoToday() {
  const d = new Date();
  if (d.getHours() * 60 + d.getMinutes() < 4*60+30) d.setDate(d.getDate() - 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function addDays(iso, n) {
  const d = new Date(iso + 'T12:00:00');
  d.setDate(d.getDate() + n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmtDay(iso) {
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
}

function isOverdue(card, dayIso) {
  if (!card.due_date) return false;
  return dayIso > card.due_date.slice(0, 10);
}

// Day cards are not sized by duration — they grow to fit their content
// (title, meta, notes) so all the info is visible.
function renderCard(c, dayIso) {
  const {bg, border, dark} = cardStyle(c);
  const titleC = bg ? (dark ? 'inherit' : 'rgba(0,0,0,0.85)') : 'rgba(var(--green-rgb),0.88)';
  const metaC  = bg ? (dark ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.5)') : 'rgba(var(--green-rgb),0.4)';

  const over = (dayIso && isOverdue(c, dayIso)) ? '<span class="pr-overdue">!</span>' : '';
  const reminder = c.is_reminder ? '<span style="opacity:0.35;font-size:0.6rem"> [rem]</span>' : '';
  const recur = c.recur_type ? `<span style="opacity:0.45">${RECUR_LABEL[c.recur_type]||'↺'}</span>` : '';
  const dueC = (dayIso && isOverdue(c, dayIso)) ? 'rgba(var(--red-rgb),0.9)' : metaC;
  const due = c.due_date ? `<span class="pr-due" style="color:${dueC}">due ${c.due_date.slice(5).replace('T',' ')}</span>` : '';
  const metaHtml = (recur || due) ? `<div class="pr-card-meta" style="color:${metaC}">${recur}${due}</div>` : '';
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const notesHtml = c.notes ? `<div class="pr-card-notes" style="color:${metaC}">${esc(c.notes)}</div>` : '';
  return `<div class="pr-card${bg ? '' : ' plain'}" data-id="${c.id}" data-due="${c.due_date||''}" style="${bg}${border}">
    ${over}
    <div class="pr-card-title" style="color:${titleC}">${c.title}${reminder}</div>
    ${metaHtml}
    ${notesHtml}
  </div>`;
}

// drop-target hit-testing for dragging a timeline block out to another day
function dropTarget(x, y) {
  if (x == null || y == null) return null;
  const el = document.elementFromPoint(x, y);
  if (!el) return null;
  if (el.closest('#pr-unschedule')) return 'unschedule';
  const col = el.closest('[data-day]');
  return col ? col.dataset.day : null;
}

function createBlock(c, track) {
  const {bg, border, dark} = cardStyle(c);
  const durMin = Math.max(SNAP, snapMin(c.estimated_time || SIZE_MIN[c.size] || 60));
  c._durMin = durMin;
  const topPx = Math.max(0, (c._startMin - TL_START) * TL_PX);
  const heightPx = Math.max(15, durMin * TL_PX);
  const titleC = bg ? (dark ? 'inherit' : 'rgba(0,0,0,0.85)') : 'rgba(var(--green-rgb),0.88)';
  const metaC  = bg ? (dark ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.5)') : 'rgba(var(--green-rgb),0.4)';

  const block = document.createElement('div');
  block.className = 'dir-block' + (bg ? '' : ' plain');
  block.dataset.id = c.id;
  block.style.cssText = `${bg}${border}top:${topPx + 3}px;height:${Math.max(13, heightPx - 6)}px;`;

  const titleEl = document.createElement('div');
  titleEl.className = 'dir-block-title';
  titleEl.style.color = titleC;
  titleEl.textContent = c.title;

  const metaEl = document.createElement('div');
  metaEl.className = 'dir-block-meta';
  metaEl.style.color = metaC;
  metaEl.innerHTML = `<span class="dur-lbl" style="display:none">${durLabel(durMin)}</span>`;

  const resizeHandle = document.createElement('div');
  resizeHandle.className = 'dir-resize';

  if (durMin <= 30) {
    block.style.justifyContent = 'center';
    titleEl.style.marginBottom = '0';
    block.append(titleEl, resizeHandle);
  } else if (c.notes && heightPx >= 44) {
    const notesEl = document.createElement('div');
    notesEl.className = 'dir-block-notes';
    notesEl.style.color = metaC;
    notesEl.textContent = c.notes;
    block.append(titleEl, metaEl, notesEl, resizeHandle);
  } else {
    block.append(titleEl, metaEl, resizeHandle);
  }

  // Drag like the day<->day Sortable: a floating ghost follows the cursor and
  // the target list highlights. Drop on another day / unschedule -> reschedule;
  // drop within today -> set the block's time from the release position.
  function startDrag(startClientX, startClientY, getX, getY) {
    const rect = track.getBoundingClientRect();
    const bRect = block.getBoundingClientRect();
    const offsetX = startClientX - bRect.left;
    const offsetY = startClientY - bRect.top;
    const width = bRect.width, height = bRect.height;
    let moved = false;
    let lastX = startClientX, lastY = startClientY;
    let ghost = null;
    document.body.classList.add('pr-dragging');

    let preview = null;
    const unEl = document.getElementById('pr-unschedule');

    function makeGhost() {
      ghost = block.cloneNode(true);
      ghost.style.position = 'fixed';
      ghost.style.margin = '0';
      ghost.style.left = (lastX - offsetX) + 'px';
      ghost.style.top = (lastY - offsetY) + 'px';
      ghost.style.width = width + 'px';
      ghost.style.height = height + 'px';
      ghost.style.right = 'auto';
      ghost.style.bottom = 'auto';
      ghost.style.pointerEvents = 'none';
      ghost.style.zIndex = '9999';
      ghost.style.opacity = '1';
      ghost.style.boxShadow = '0 6px 18px rgba(0,0,0,0.6)';
      document.body.appendChild(ghost);
      block.style.display = 'none';   // lifted into the ghost
    }
    function mkPreview(ctx) {
      const p = document.createElement('div');
      p.className = 'pr-drop-preview ' + ctx;
      p.dataset.ctx = ctx;
      p.textContent = c.title;
      return p;
    }
    function clearPreview() {
      if (preview) { preview.remove(); preview = null; }
      if (unEl) unEl.classList.remove('drag-over');
    }
    // Move the faint placeholder to where the card would land — a timeline slot
    // over today, an insertion point inside another day's list, like Sortable.
    function placePreview(x, y) {
      const tgt = dropTarget(x, y);
      if (unEl) unEl.classList.toggle('drag-over', tgt === 'unschedule');
      if (tgt === 'unschedule') { if (preview) { preview.remove(); preview = null; } return; }
      if (tgt && tgt !== isoToday()) {
        const list = document.getElementById('pr-list-' + tgt);
        if (!list) { if (preview) { preview.remove(); preview = null; } return; }
        if (!preview || preview.dataset.ctx !== 'day') {
          if (preview) preview.remove();
          // a real (faded) card so it matches the Sortable placeholder exactly
          const tmp = document.createElement('div');
          tmp.innerHTML = renderCard(c, tgt);
          preview = tmp.firstElementChild;
          preview.dataset.ctx = 'day';
          preview.classList.add('sortable-ghost');
          preview.style.pointerEvents = 'none';
        }
        const ref = [...list.querySelectorAll('.pr-card')].filter(el => el !== preview).find(el => {
          const r = el.getBoundingClientRect();
          return y < r.top + r.height / 2;
        });
        if (ref) list.insertBefore(preview, ref); else list.appendChild(preview);
      } else {
        if (!preview || preview.dataset.ctx !== 'today') { if (preview) preview.remove(); preview = mkPreview('today'); track.appendChild(preview); }
        const rawMin = (y - rect.top - offsetY) / TL_PX + TL_START;
        const snapped = Math.max(TL_START, Math.min(TL_END - c._durMin, snapMin(rawMin)));
        preview.style.top = ((snapped - TL_START) * TL_PX + 3) + 'px';
        preview.style.height = Math.max(13, c._durMin * TL_PX - 6) + 'px';
      }
    }

    function onMove(ev) {
      lastX = getX(ev); lastY = getY(ev);
      if (!moved) { moved = true; makeGhost(); }
      if (ev.cancelable) ev.preventDefault();
      ghost.style.left = (lastX - offsetX) + 'px';
      ghost.style.top = (lastY - offsetY) + 'px';
      placePreview(lastX, lastY);
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onUp);
      document.body.classList.remove('pr-dragging');
      if (ghost) { ghost.remove(); ghost = null; }
      const tgt = dropTarget(lastX, lastY);
      // capture the previewed insertion index before clearing it
      let dayIndex = 0;
      if (preview && preview.dataset.ctx === 'day' && preview.parentElement) {
        dayIndex = [...preview.parentElement.querySelectorAll('.pr-card, .pr-drop-preview')].indexOf(preview);
      }
      clearPreview();
      block.style.display = '';
      if (!moved) { openCardDialog(c.id, () => load(weekStart), 'prof'); return; }
      if (tgt === 'unschedule') {
        block.style.display = 'none';
        queueUpdate(c.id, null, false);
        setTimeout(() => load(weekStart), 700);
        return;
      }
      if (tgt && tgt !== isoToday()) {
        block.style.display = 'none';
        queueUpdate(c.id, tgt, dayIndex);
        setTimeout(() => load(weekStart), 700);
        return;
      }
      // dropped within today -> set the block's time from the release position
      const rawMin = (lastY - rect.top - offsetY) / TL_PX + TL_START;
      const snapped = Math.max(TL_START, Math.min(TL_END - c._durMin, snapMin(rawMin)));
      c._startMin = snapped;
      block.style.top = (snapped - TL_START) * TL_PX + 'px';
      scheduleCards.sort((a, b) => a._startMin - b._startMin);
      computeColumns(scheduleCards);
      applyColumnLayout(scheduleCards, currentTrack);
      saveStartTime(c.id, c._startMin);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchmove', onMove, {passive: false});
    document.addEventListener('touchend', onUp);
  }

  block.addEventListener('mousedown', e => {
    if (resizeHandle.contains(e.target)) return;
    e.preventDefault();
    startDrag(e.clientX, e.clientY, ev => ev.clientX, ev => ev.clientY);
  });
  block.addEventListener('touchstart', e => {
    if (resizeHandle.contains(e.target)) return;
    const t0Y = e.touches[0].clientY, t0X = e.touches[0].clientX;
    let timer = setTimeout(() => { timer = null; cleanup(); startDrag(t0X, t0Y, ev => ev.touches[0].clientX, ev => ev.touches[0].clientY); }, 300);
    function cleanup() {
      block.removeEventListener('touchmove', onEarlyMove);
      block.removeEventListener('touchend', onEarlyEnd);
    }
    function onEarlyMove(ev) {
      if (!timer) return;
      const t = ev.touches[0];
      if (Math.abs(t.clientY - t0Y) > 8 || Math.abs(t.clientX - t0X) > 8) { clearTimeout(timer); timer = null; cleanup(); }
    }
    function onEarlyEnd() { if (timer) { clearTimeout(timer); timer = null; } cleanup(); }
    block.addEventListener('touchmove', onEarlyMove, {passive: true});
    block.addEventListener('touchend', onEarlyEnd, {once: true});
  }, {passive: true});

  function startResize(startClientY, getY) {
    const startDur = c._durMin;
    function onMove(ev) {
      const delta = getY(ev) - startClientY;
      const snapped = Math.max(SNAP, snapMin(startDur + delta / TL_PX));
      c._durMin = snapped;
      block.style.height = Math.max(13, snapped * TL_PX - 6) + 'px';
      metaEl.querySelector('.dur-lbl').textContent = durLabel(snapped);
    }
    async function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onUp);
      c.estimated_time = c._durMin;
      await saveEstimatedTime(c.id, c._durMin);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchmove', onMove, {passive: false});
    document.addEventListener('touchend', onUp);
  }

  resizeHandle.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
    startResize(e.clientY, ev => ev.clientY);
  });
  resizeHandle.addEventListener('touchstart', e => {
    e.stopPropagation();
    const t0Y = e.touches[0].clientY;
    let timer = setTimeout(() => { timer = null; cleanup(); startResize(t0Y, ev => ev.touches[0].clientY); }, 300);
    function cleanup() {
      resizeHandle.removeEventListener('touchmove', onEarlyMove);
      resizeHandle.removeEventListener('touchend', onEarlyEnd);
    }
    function onEarlyMove() { if (timer) { clearTimeout(timer); timer = null; cleanup(); } }
    function onEarlyEnd() { if (timer) { clearTimeout(timer); timer = null; } cleanup(); }
    resizeHandle.addEventListener('touchmove', onEarlyMove, {passive: true});
    resizeHandle.addEventListener('touchend', onEarlyEnd, {once: true});
  }, {passive: true});

  return block;
}

function computeColumns(cards) {
  const sorted = [...cards].sort((a, b) => a._startMin - b._startMin);
  const laneEnds = [];
  sorted.forEach(c => {
    let lane = laneEnds.findIndex(end => end <= c._startMin);
    if (lane === -1) { lane = laneEnds.length; laneEnds.push(0); }
    laneEnds[lane] = c._startMin + c._durMin;
    c._laneIdx = lane;
  });
  sorted.forEach(c => {
    const cEnd = c._startMin + c._durMin;
    let max = c._laneIdx;
    sorted.forEach(o => {
      if (o !== c && o._startMin < cEnd && o._startMin + o._durMin > c._startMin)
        max = Math.max(max, o._laneIdx);
    });
    c._totalLanes = max + 1;
  });
}

function applyColumnLayout(cards, track) {
  const GAP = 3;
  cards.forEach(c => {
    const el = track.querySelector(`[data-id="${c.id}"]`);
    if (!el) return;
    const n = c._totalLanes || 1;
    const idx = c._laneIdx || 0;
    if (n === 1) {
      el.style.left = GAP + 'px';
      el.style.right = GAP + 'px';
      el.style.width = '';
    } else {
      const pct = 100 / n;
      el.style.left = `calc(${idx * pct}% + ${GAP}px)`;
      el.style.width = `calc(${pct}% - ${GAP * 2}px)`;
      el.style.right = 'auto';
    }
  });
}

function buildSchedule(cards) {
  const wrap = document.getElementById('pr-tl-wrap');
  if (!wrap) return;
  if (_nowInterval) { clearInterval(_nowInterval); _nowInterval = null; }
  if (_nowRaf) { cancelAnimationFrame(_nowRaf); _nowRaf = null; }

  scheduleCards = cards;
  cards.forEach(c => { c._startMin = c.dir_start_min != null ? c.dir_start_min : TL_START; });

  const tlWrap = document.createElement('div');
  tlWrap.style.cssText = 'display:flex;';

  const labels = document.createElement('div');
  labels.className = 'dir-tl-labels';
  labels.style.height = TL_H + 'px';

  const track = document.createElement('div');
  track.className = 'dir-tl-track';
  track.style.height = TL_H + 'px';

  const nowMin = nowMinutes();

  for (let h = 5; h <= 28; h++) {
    const y = (h * 60 - TL_START) * TL_PX;
    const hline = document.createElement('div');
    hline.className = 'tl-hour-line';
    hline.style.top = y + 'px';
    track.appendChild(hline);
    if (h < 28) {
      const lbl = document.createElement('div');
      lbl.className = 'dir-tl-label';
      lbl.style.top = y + 'px';
      lbl.textContent = String(h % 24).padStart(2, '0');
      labels.appendChild(lbl);
      const hline2 = document.createElement('div');
      hline2.className = 'tl-half-line';
      hline2.style.top = (y + 30 * TL_PX) + 'px';
      track.appendChild(hline2);
    }
  }

  [
    {label: 'lunch', start: 12*60, end: 13*60},
    {label: 'dinner', start: 18*60+30, end: 20*60},
  ].forEach(({label, start, end}) => {
    const el = document.createElement('div');
    el.className = 'tl-meal';
    el.style.top = ((start - TL_START) * TL_PX + 3) + 'px';
    el.style.height = ((end - start) * TL_PX - 6) + 'px';
    el.innerHTML = `<span class="tl-meal-label">[ ${label} ]</span>`;
    track.appendChild(el);
  });

  if (!cards.length) {
    const empty = document.createElement('div');
    empty.className = 'tl-empty';
    empty.textContent = 'nothing scheduled today';
    track.appendChild(empty);
  }
  cards.forEach(c => track.appendChild(createBlock(c, track)));
  computeColumns(cards);
  applyColumnLayout(cards, track);
  currentTrack = track;

  // current-time indicator + past "hider" overlay
  const pastOverlay = document.createElement('div');
  pastOverlay.className = 'tl-past';
  track.appendChild(pastOverlay);
  const nowLine = document.createElement('div');
  nowLine.className = 'tl-now-line';
  nowLine.style.display = 'none';
  track.appendChild(nowLine);
  const nowClock = document.createElement('div');
  nowClock.className = 'tl-now-clock';
  nowClock.style.display = 'none';
  track.appendChild(nowClock);

  function updateNowIndicator() {
    const m = nowMinutes();
    const visible = m >= TL_START && m <= TL_END;
    nowLine.style.display = visible ? '' : 'none';
    nowClock.style.display = visible ? '' : 'none';
    pastOverlay.style.display = visible ? '' : 'none';
    if (!visible) return;
    const nowY = (m - TL_START) * TL_PX;
    pastOverlay.style.height = nowY + 'px';
    nowLine.style.top = nowY + 'px';
    nowClock.style.top = (nowY - 16) + 'px';
  }
  updateNowIndicator();
  _nowInterval = setInterval(updateNowIndicator, 60000);
  (function tick() {
    const n = new Date();
    const h  = String(n.getHours()).padStart(2,'0');
    const mi = String(n.getMinutes()).padStart(2,'0');
    const s  = String(n.getSeconds()).padStart(2,'0');
    const cs = String(Math.floor(n.getMilliseconds()/10)).padStart(2,'0');
    nowClock.textContent = `${h} : ${mi} : ${s} : ${cs}`;
    _nowRaf = requestAnimationFrame(tick);
  })();

  tlWrap.appendChild(labels);
  tlWrap.appendChild(track);
  wrap.innerHTML = '';
  wrap.appendChild(tlWrap);

  // drop target: drag a card from another day onto today's timeline
  Sortable.create(wrap, {
    group: { name: 'prophecies', put: true, pull: false },
    draggable: '.__nodrag__',
    onAdd(evt) {
      const cardId = evt.item.dataset.id;
      evt.item.remove();
      queueUpdate(cardId, isoToday(), false);
      setTimeout(() => load(weekStart), 700);
    },
  });

  // autoscroll to 2 hours before now
  if (nowMin >= TL_START && nowMin <= TL_END) {
    wrap.scrollTop = Math.max(0, (nowMin - TL_START) * TL_PX - 120 * TL_PX);
  }
}

async function saveStartTime(cardId, startMin) {
  const rd = await (await fetch('/api/rd')).json();
  const allCards = rd.cards || [];
  const card = allCards.find(x => x.id === cardId);
  if (!card) return;
  card.dir_start_min = startMin;
  await fetch('/api/rd', {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({cards: allCards})});
}

async function saveEstimatedTime(cardId, mins) {
  setStatus('saving...');
  try {
    const rd = await (await fetch('/api/rd')).json();
    const allCards = rd.cards || [];
    const card = allCards.find(c => c.id === cardId);
    if (card) {
      card.estimated_time = mins;
      await fetch('/api/rd', {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({cards: allCards})});
    }
    setStatus('saved');
    setTimeout(() => setStatus(''), 1200);
  } catch(e) { setStatus('save error: ' + e.message); }
}

function dayCellHtml(day, today) {
  const isToday = day === today;
  const dow = new Date(day + 'T12:00:00').getDay();
  const isWeekend = dow === 0 || dow === 6;
  const dayLabel = fmtDay(day).split(',')[0];
  const dateLabel = fmtDay(day).replace(/^[^,]+, /, '');
  const hdr = `<div class="pr-col-hdr${isToday?' today-hdr':''}">
      <div class="pr-day-name">${dayLabel} <span class="pr-date">${dateLabel}</span></div>
    </div>`;
  // today renders as a timeline instead of a card list
  if (isToday) {
    return `<div class="pr-col today-col" data-day="${day}">${hdr}
      <div class="pr-tl-wrap" id="pr-tl-wrap"><span style="opacity:0.3;padding:12px;font-size:0.75rem">loading…</span></div>
    </div>`;
  }
  const cards = weekData.days[day] || [];
  return `<div class="pr-col${isWeekend?' weekend':''}" data-day="${day}">${hdr}
    <div class="pr-list" id="pr-list-${day}">${cards.map(c=>renderCard(c,day)).join('')}</div>
  </div>`;
}

function buildBoard() {
  if (!weekData) return;
  const today = isoToday();

  // Always include today even when viewing a different week
  if (!weekData.days[today]) weekData.days[today] = [];
  const days = Object.keys(weekData.days).sort();

  // three columns: today (timeline) | next 3 days | last 3 days — full week
  const groups = [days.slice(0, 1), days.slice(1, 4), days.slice(4, 7)];
  let html = '';
  groups.forEach((groupDays, gi) => {
    const small = gi >= 1;
    html += `<div class="pr-colgroup${small?' small':''}">`;
    html += groupDays.map(day => dayCellHtml(day, today)).join('');
    html += `</div>`;
  });

  document.getElementById('pr-board').innerHTML = html;
  initSortable(days);
  document.querySelectorAll('.pr-card').forEach(el => {
    el.addEventListener('click', () => { if (!_prDragging) openCardDialog(el.dataset.id, () => load(weekStart), 'prof'); });
  });
  // build the today timeline (drop target + blocks)
  const todayCards = (weekData.days[today] || []).filter(c => !c.is_reminder && c.size !== 'book');
  buildSchedule(todayCards);
}

function initSortable(days) {
  const unscheduleEl = document.getElementById('pr-unschedule');

  Sortable.create(unscheduleEl, {
    group: { name: 'prophecies', put: true, pull: false },
    animation: 120,
    ghostClass: 'sortable-ghost',
    onAdd(evt) {
      const cardId = evt.item.dataset.id;
      evt.item.remove();
      queueUpdate(cardId, null, false);
      setTimeout(() => load(weekStart), 700);
    },
  });

  days.forEach(day => {
    const el = document.getElementById('pr-list-' + day);
    if (!el) return;
    Sortable.create(el, {
      group: 'prophecies',
      animation: 120,
      ghostClass: 'sortable-ghost',
      delay: 300,
      delayOnTouchOnly: true,
      onStart() {
        _prDragging = true;
        document.body.classList.add('pr-dragging');
      },
      onEnd(evt) {
        _prDragging = false;
        document.body.classList.remove('pr-dragging');
        const cardId = evt.item.dataset.id;
        const cardDue = evt.item.dataset.due;
        const toDay = evt.to.id.replace('pr-list-', '');

        if (evt.to === unscheduleEl) return;

        if (cardDue && toDay > cardDue) {
          showToast(`Warning: scheduling after due date (${cardDue})`);
        }
        evt.to.querySelectorAll('.pr-card').forEach((el, i) => {
          if (el.dataset.id === cardId) queueUpdate(el.dataset.id, toDay, i);
          else queueUpdate(el.dataset.id, undefined, i);
        });
        if (evt.from !== evt.to) {
          evt.from.querySelectorAll('.pr-card').forEach((el, i) => {
            queueUpdate(el.dataset.id, undefined, i);
          });
        }
      },
    });
  });

  unscheduleEl.addEventListener('dragover', () => unscheduleEl.classList.add('drag-over'));
  unscheduleEl.addEventListener('dragleave', () => unscheduleEl.classList.remove('drag-over'));
}

function queueUpdate(cardId, scheduledDay, order) {
  const idx = pendingUpdates.findIndex(u => u.id === cardId);
  const upd = {id: cardId};
  if (scheduledDay !== undefined) upd.scheduled_day = scheduledDay || null;
  if (order !== undefined) upd.order = order;
  if (idx >= 0) pendingUpdates[idx] = {...pendingUpdates[idx], ...upd};
  else pendingUpdates.push(upd);
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(flushUpdates, 600);
}

async function flushUpdates() {
  if (!pendingUpdates.length) return;
  const updates = [...pendingUpdates];
  pendingUpdates = [];
  setStatus('saving...');
  try {
    await fetch('/api/prophecies', {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({updates}),
    });
    setStatus('saved');
    setTimeout(() => setStatus(''), 1500);
  } catch(e) {
    setStatus('save error: ' + e.message);
  }
}

function setStatus(msg) {
  document.getElementById('pr-status').textContent = msg;
}

let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('pr-toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 4000);
}

function consult_oracle() {
  const unsched = weekData.unscheduled || [];
  if (!unsched.length) return;

  const today = isoToday();
  // Stay within backend window (today..today+6); skip today itself.
  const targetDays = Array.from({length: 6}, (_, i) => addDays(today, i + 1));

  // count already-scheduled cards per target day
  const counts = {};
  for (const day of targetDays) {
    counts[day] = (weekData.days[day] || []).length;
  }

  for (const card of unsched) {
    const day = targetDays.reduce((a, b) => counts[a] <= counts[b] ? a : b);
    counts[day]++;
    // Place locally so buildBoard renders it this paint — never leave a
    // card stranded in the (unrendered) unscheduled bucket.
    card.scheduled_day = day;
    (weekData.days[day] = weekData.days[day] || []).push(card);
    queueUpdate(card.id, day, false);
  }
  weekData.unscheduled = [];
}

async function load(start) {
  document.getElementById('pr-board').innerHTML = '<span class="pr-loading">loading...</span>';
  const url = start ? `/api/prophecies?start=${start}` : '/api/prophecies';
  const r = await fetch(url);
  weekData = await r.json();
  weekStart = weekData.week_start;
  if (!start) consult_oracle();
  buildBoard();
}

// exec bubble changed cards -> reload live
window.addEventListener('exec:cards-changed', () => load(weekStart));
load(null);

</script>
