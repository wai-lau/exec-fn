
<style>
body { overflow: hidden !important; }
.pr-topbar {
  position: fixed; top: 0; left: 0; right: 0; height: 52px; z-index: 20;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; gap: 10px;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(0,255,65,0.12);
}
.pr-board {
  position: fixed; top: 52px; bottom: 52px; left: 0; right: 182px;
  display: flex; gap: 1px; overflow-x: auto; overflow-y: hidden;
  background: rgba(0,255,65,0.04);
}
.pr-unscheduled-panel {
  position: fixed; top: 52px; bottom: 52px; right: 0; width: 181px;
  display: flex; flex-direction: column;
  background: rgba(0,0,0,0.5);
  border-left: 1px solid rgba(0,255,65,0.12);
  z-index: 5;
}
.pr-col {
  flex: 0 0 200px; display: flex; flex-direction: column;
  background: rgba(0,0,0,0.3); min-width: 0;
}
.pr-col-hdr {
  flex-shrink: 0; padding: 12px 14px 8px;
  font-family: monospace; font-size: 0.6rem; text-transform: uppercase;
  letter-spacing: 0.15em; color: rgba(0,255,65,0.55);
  border-bottom: 1px solid rgba(0,255,65,0.1);
}
.pr-col-hdr .pr-day-name { color: rgba(0,255,65,0.8); font-size: 0.68rem; }
.pr-col-hdr .pr-date { opacity: 0.45; font-size: 0.58rem; }
.pr-col-hdr.today-hdr { border-bottom-color: rgba(0,255,65,0.4); }
.pr-col-hdr.today-hdr .pr-day-name { color: rgba(0,255,65,1); }
.pr-list {
  flex: 1; overflow-y: auto; padding: 8px 8px 20px;
  min-height: 80px;
}
.pr-card {
  border-radius: 3px; padding: 6px 9px; margin-bottom: 5px;
  cursor: grab; user-select: none; font-family: monospace;
  border: 1px solid transparent; position: relative;
  overflow: hidden; box-sizing: border-box;
  transition: filter 0.12s;
  min-height: 36px;
}
.pr-card:active { cursor: grabbing; }
.pr-card:hover { filter: brightness(1.1); }
.pr-card.plain { background: rgba(0,255,65,0.06); border-color: rgba(0,255,65,0.18); }
.pr-card-title { font-size: 0.76rem; line-height: 1.3; word-break: break-word; }
.pr-card-meta { font-size: 0.58rem; opacity: 0.5; margin-top: 4px; display: flex; justify-content: space-between; gap: 4px; }
.pr-pin { position: absolute; top: 4px; right: 6px; font-size: 0.6rem; opacity: 0.4; }
.pr-overdue { position: absolute; top: 4px; right: c.manual_pin ? 20px : 6px; font-size: 0.6rem; color: rgba(255,120,80,0.9); }
.sortable-ghost { opacity: 0.15; }
.pr-btn {
  background: none; border: 1px solid rgba(0,255,65,0.35);
  color: rgba(0,255,65,0.75); font-family: monospace; font-size: 0.72rem;
  padding: 3px 10px; cursor: pointer; transition: all 0.18s;
}
.pr-btn:hover { border-color: rgba(0,255,65,0.9); color: rgba(0,255,65,1); }
.pr-toast {
  position: fixed; bottom: 68px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.9); border: 1px solid rgba(255,120,80,0.5);
  color: rgba(255,140,80,0.9); font-family: monospace; font-size: 0.78rem;
  padding: 8px 20px; z-index: 100; pointer-events: none;
  opacity: 0; transition: opacity 0.3s;
}
.pr-toast.show { opacity: 1; }
/* card edit modal */
.ce-ov { display:none; position:fixed; inset:0; z-index:50; background:rgba(0,0,0,0.78); align-items:center; justify-content:center; }
.ce-ov.open { display:flex; }
.ce-box { background:#0a0a0a; border:1px solid rgba(0,255,65,0.25); padding:24px 28px; width:min(420px,92vw); font-family:'Iosevka Mayukai Monolite',monospace; max-height:90vh; overflow-y:auto; }
.ce-box-title { font-size:0.68rem; text-transform:uppercase; letter-spacing:0.15em; color:rgba(0,255,65,0.6); margin-bottom:16px; }
.ce-box label { display:block; font-size:0.6rem; color:rgba(0,255,65,0.45); margin:12px 0 3px; text-transform:uppercase; letter-spacing:0.1em; }
.ce-box input,.ce-box select,.ce-box textarea { width:100%; background:rgba(255,255,255,0.03); border:1px solid rgba(0,255,65,0.2); color:rgba(0,255,65,0.9); font-family:'Iosevka Mayukai Monolite',monospace; font-size:16px; padding:5px 8px; box-sizing:border-box; resize:vertical; }
.ce-box select option { background:#111; }
.ce-box textarea { min-height:56px; }
.ce-actions { display:flex; gap:10px; margin-top:18px; justify-content:space-between; align-items:center; }
.ce-btn { background:none; border:1px solid rgba(0,255,65,0.4); color:rgba(0,255,65,0.8); font-family:'Iosevka Mayukai Monolite',monospace; font-size:0.78rem; padding:4px 12px; cursor:pointer; transition:all 0.2s; }
.ce-btn:hover { border-color:rgba(0,255,65,1); color:rgba(0,255,65,1); }
</style>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

<div class="pr-topbar">
  <span style="font-family:monospace;font-size:0.62rem;text-transform:uppercase;letter-spacing:0.15em;opacity:0.5">prophecies</span>
  <div style="display:flex;gap:8px;align-items:center">
    <span id="pr-status" style="font-family:monospace;font-size:0.65rem;opacity:0.35"></span>
    <button class="pr-btn" id="pr-prev-btn" onclick="shiftWeek(-7)">&#8249; prev</button>
    <button class="pr-btn" id="pr-today-btn" onclick="resetWeek()">today</button>
    <button class="pr-btn" id="pr-next-btn" onclick="shiftWeek(7)">next &#8250;</button>
  </div>
</div>

<div class="pr-board" id="pr-board">
  <span style="padding:32px;font-family:monospace;font-size:0.8rem;opacity:0.4">loading...</span>
</div>
<div class="pr-unscheduled-panel" id="pr-unscheduled"></div>

<div class="pr-toast" id="pr-toast"></div>

<div class="ce-ov" id="ce-modal" onclick="if(event.target===this)closeCE()">
  <div class="ce-box">
    <div class="ce-box-title">edit card</div>
    <label>title</label><input id="ce-title" type="text">
    <label>category</label>
    <select id="ce-cat"><option>Interfacing</option><option>Hobby</option><option>Social</option><option>Self</option><option>Book</option></select>
    <label>size</label>
    <select id="ce-size">
      <option value="chore">chore &mdash; under 1 hour</option>
      <option value="task">task &mdash; under 4 hours</option>
      <option value="book">book &mdash; ongoing read</option>
      <option value="project">project &mdash; under 2 days</option>
      <option value="titan">titan &mdash; needs breaking down</option>
    </select>
    <label>due date &mdash; <span style="opacity:0.55;font-size:0.7em;text-transform:none">monday 6pm &nbsp;|&nbsp; apr 26 &nbsp;|&nbsp; 4/26</span></label>
    <input id="ce-due" type="text" placeholder="optional" onblur="ceFillSB()">
    <label>start before &mdash; <span style="opacity:0.55;font-size:0.7em;text-transform:none">auto-filled from due date</span></label>
    <input id="ce-sb" type="text" placeholder="optional">
    <label>estimated time (minutes)</label><input id="ce-et" type="number" min="1" placeholder="auto from size">
    <label>recurrence</label>
    <select id="ce-recur">
      <option value="">— none —</option><option value="week">weekly</option><option value="bi-week">bi-weekly</option>
      <option value="month">monthly</option><option value="holiday">holiday (annual)</option><option value="birthday">birthday (annual)</option>
    </select>
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-top:12px">
      <input id="ce-reminder" type="checkbox" style="width:auto;accent-color:rgba(0,255,65,0.8)">
      <span>reminder only &mdash; <span style="opacity:0.55;font-size:0.85em">no action needed</span></span>
    </label>
    <label>notes</label><textarea id="ce-notes"></textarea>
    <div class="ce-actions">
      <button class="ce-btn" style="border-color:rgba(255,100,100,0.4);color:rgba(255,120,120,0.7)" onclick="deleteCE()">delete</button>
      <div style="display:flex;gap:8px">
        <button class="ce-btn" onclick="closeCE()">cancel</button>
        <button class="ce-btn" onclick="saveCE()">save</button>
      </div>
    </div>
  </div>
</div>

<script>
const CAT_HUE = {Book:210, Self:185, Social:315, Interfacing:50, Hobby:15};
const CAT_LIGHT = {Social:+10, Hobby:+7};
const CAT_SAT   = {Social:-20};
const RECUR_LABEL = {week:'↺wk', 'bi-week':'↺2wk', month:'↺mo', holiday:'↺yr', birthday:'↺bday'};
const SIZE_MIN = {chore:30, task:90, project:240, titan:480, book:60};

let weekStart = null;
let weekData = null;
let pendingUpdates = [];
let saveTimer = null;
let _prDragging = false;

function isoToday() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function addDays(iso, n) {
  const d = new Date(iso + 'T12:00:00');
  d.setDate(d.getDate() + n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmtDay(iso) {
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
}

function cardHeight(c) {
  const mins = c.estimated_time || SIZE_MIN[c.size] || 60;
  return Math.max(44, Math.min(220, Math.round(mins * 0.75))) + 'px';
}

function cardBg(c) {
  const h = CAT_HUE[c.category];
  if (!h) return {bg:'', dark:false};
  const ds = CAT_SAT[c.category] || 0;
  const dl = CAT_LIGHT[c.category] || 0;
  const dark = ['chore','task','book'].includes(c.size);
  const col = `hsl(${h},${75+ds}%,${68+dl}%)`;
  if (dark) return {bg:`background:#0d0d0d;color:${col};border-color:hsl(${h},${65+ds}%,${60+dl}%);`, dark:true};
  return {bg:`background:hsl(${h},${50+ds}%,${54+dl}%);`, dark:false};
}

function isOverdue(card, dayIso) {
  if (!card.due_date) return false;
  return dayIso > card.due_date.slice(0, 10);
}

function renderCard(c, dayIso) {
  const {bg, dark} = cardBg(c);
  const titleC = bg ? (dark ? 'inherit' : 'rgba(0,0,0,0.85)') : 'rgba(0,255,65,0.88)';
  const metaC  = bg ? (dark ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.5)') : 'rgba(0,255,65,0.4)';
  const h = cardHeight(c);
  const pin = c.manual_pin ? '<span class="pr-pin">&#128275;</span>' : '';
  const over = (dayIso && isOverdue(c, dayIso)) ? '<span class="pr-overdue">!</span>' : '';
  const reminder = c.is_reminder ? '<span style="opacity:0.35;font-size:0.6rem"> [rem]</span>' : '';
  const recur = c.recur_type ? `<span style="opacity:0.45">${RECUR_LABEL[c.recur_type]||'↺'}</span>` : '';
  const due = c.due_date ? `<span style="opacity:0.45">${c.due_date.slice(5)}</span>` : '';
  const mins = c.estimated_time || SIZE_MIN[c.size] || 60;
  const dur = mins >= 60 ? `${Math.floor(mins/60)}h${mins%60?mins%60+'m':''}` : `${mins}m`;
  return `<div class="pr-card${bg ? '' : ' plain'}" data-id="${c.id}" data-due="${c.due_date||''}" style="${bg}height:${h};min-height:${h}">
    ${pin}${over}
    <div class="pr-card-title" style="color:${titleC}">${c.title}${reminder}</div>
    <div class="pr-card-meta" style="color:${metaC}">
      <span>${[c.size, recur||''].filter(Boolean).join(' ')}</span>
      <span>${[dur, due].filter(Boolean).join(' ')}</span>
    </div>
  </div>`;
}

function buildBoard() {
  if (!weekData) return;
  const today = isoToday();
  const days = Object.keys(weekData.days);

  // Always include today even when viewing a different week
  if (!days.includes(today) && !weekData.days[today]) {
    weekData.days[today] = [];
    days.unshift(today);
  }
  let html = '';

  for (const day of days) {
    const cards = weekData.days[day];
    const isToday = day === today;
    const dayLabel = day === today ? 'Today' : fmtDay(day).split(',')[0];
    const dateLabel = fmtDay(day).replace(/^[^,]+, /, '');
    html += `<div class="pr-col" data-day="${day}">
      <div class="pr-col-hdr${isToday?' today-hdr':''}">
        <div class="pr-day-name">${dayLabel}</div>
        <div class="pr-date">${dateLabel}</div>
      </div>
      <div class="pr-list" id="pr-list-${day}">${cards.map(c=>renderCard(c,day)).join('')}</div>
    </div>`;
  }

  document.getElementById('pr-board').innerHTML = html;

  // Unscheduled panel (fixed, always visible)
  const unsched = weekData.unscheduled || [];
  document.getElementById('pr-unscheduled').innerHTML =
    `<div class="pr-col-hdr">
      <div class="pr-day-name">unscheduled</div>
      <div class="pr-date">hq pool</div>
    </div>
    <div class="pr-list" id="pr-list-unscheduled">${unsched.map(c=>renderCard(c,null)).join('')}</div>`;
  initSortable(days);
  document.querySelectorAll('.pr-card').forEach(el => {
    el.addEventListener('click', () => { if (!_prDragging) openCE(el.dataset.id); });
  });
}

function initSortable(days) {
  const allListIds = [...days.map(d=>'pr-list-'+d), 'pr-list-unscheduled'];

  allListIds.forEach(listId => {
    const el = document.getElementById(listId);
    if (!el) return;
    Sortable.create(el, {
      group: 'prophecies',
      animation: 120,
      ghostClass: 'sortable-ghost',
      delay: 250,
      delayOnTouchOnly: true,
      onStart() { _prDragging = true; },
      onEnd(evt) {
        _prDragging = false;
        const cardId = evt.item.dataset.id;
        const cardDue = evt.item.dataset.due;
        const toListId = evt.to.id;
        const toDay = toListId === 'pr-list-unscheduled' ? null
          : toListId.replace('pr-list-', '');

        // Due date warning
        if (toDay && cardDue && toDay > cardDue) {
          showToast(`Warning: scheduling after due date (${cardDue})`);
        }

        // Mark as manual pin if moved to a day column
        if (toDay) evt.item.querySelector('.pr-pin') || (evt.item.insertAdjacentHTML('afterbegin','<span class="pr-pin">&#128275;</span>'));

        queueUpdate(cardId, toDay, true);
      },
    });
  });
}

function queueUpdate(cardId, scheduledDay, manualPin) {
  const idx = pendingUpdates.findIndex(u => u.id === cardId);
  const upd = {id: cardId, scheduled_day: scheduledDay || null, manual_pin: manualPin};
  if (idx >= 0) pendingUpdates[idx] = upd; else pendingUpdates.push(upd);
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(flushUpdates, 600);
}

async function flushUpdates() {
  if (!pendingUpdates.length) return;
  const updates = [...pendingUpdates];
  pendingUpdates = [];
  setStatus('saving...');
  try {
    await fetch('/api/prophecies', {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({updates}),
    });
    setStatus('saved');
    setTimeout(() => setStatus(''), 1500);
  } catch(e) {
    setStatus('save error');
  }
}

function setStatus(msg) {
  document.getElementById('pr-status').textContent = msg;
}

let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('pr-toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 4000);
}

async function load(start) {
  document.getElementById('pr-board').innerHTML = '<span style="padding:32px;font-family:monospace;font-size:0.8rem;opacity:0.4">loading...</span>';
  const url = start ? `/api/prophecies?start=${start}` : '/api/prophecies';
  const r = await fetch(url);
  weekData = await r.json();
  weekStart = weekData.week_start;
  buildBoard();
}

function shiftWeek(days) {
  const newStart = addDays(weekStart, days);
  load(newStart);
}

function resetWeek() {
  load(null);
}

load(null);

// ── card edit modal ──────────────────────────────────────────────────────────
let _ceId = null, _ceCards = [];
function _ceParseMD(input) {
  if (!input || !input.trim()) return null;
  const s = input.trim().toLowerCase();
  const mnths = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  const wdays = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  const now = new Date();
  let timeStr = '', dateStr = s;
  const tm = s.match(/\s+(\d{1,2})(?::(\d{2}))?\s*(am|pm)$/i);
  if (tm) {
    let h = parseInt(tm[1]), min = tm[2] ? parseInt(tm[2]) : 0;
    if (tm[3].toLowerCase()==='pm' && h<12) h+=12;
    if (tm[3].toLowerCase()==='am' && h===12) h=0;
    timeStr = `T${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}`;
    dateStr = s.slice(0, s.length - tm[0].length).trim();
  }
  let yr = now.getFullYear(), month = -1, day = 0, useDate = null;
  const wi = wdays.findIndex(d => dateStr.startsWith(d));
  if (wi >= 0) {
    let diff = wi - now.getDay(); if (diff<=0) diff+=7;
    useDate = new Date(now); useDate.setDate(now.getDate()+diff); useDate.setHours(0,0,0,0);
    month = useDate.getMonth(); day = useDate.getDate(); yr = useDate.getFullYear();
  }
  if (month<0) { const m = dateStr.match(/^(\d{1,2})[\/-](\d{1,2})$/); if (m) { month=parseInt(m[1])-1; day=parseInt(m[2]); } }
  if (month<0) { const m = dateStr.match(/^([a-z]+)\s+(\d{1,2})$/); if (m) { const i=mnths.findIndex(x=>m[1].startsWith(x)); if (i>=0) { month=i; day=parseInt(m[2]); } } }
  if (month<0||!day) return null;
  if (!useDate && new Date(yr,month,day)<=now) yr++;
  const iso = `${yr}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  return timeStr ? iso+timeStr : iso;
}
function _ceFmt(iso) {
  if (!iso) return '';
  const hasT = iso.includes('T');
  const d = hasT ? new Date(iso) : new Date(iso+'T12:00:00');
  let s = d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  if (hasT) s += ' '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}).toLowerCase();
  return s;
}
async function _ceResolve(raw, size, et) {
  const q = _ceParseMD(raw);
  if (q !== null || !raw.trim()) return {due:q, start_before:null};
  try {
    const r = await fetch('/api/parse_date',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:raw.trim(),size,estimated_minutes:et||null})});
    const d = await r.json();
    return {due:d.iso||null, start_before:d.start_before||null};
  } catch(_) { return {due:null, start_before:null}; }
}
async function openCE(id) {
  const data = await (await fetch('/api/rd')).json();
  _ceCards = data.cards || [];
  const c = _ceCards.find(x => x.id === id);
  if (!c) return;
  _ceId = id;
  document.getElementById('ce-title').value = c.title||'';
  document.getElementById('ce-cat').value = c.category||'Self';
  document.getElementById('ce-size').value = c.size||'task';
  document.getElementById('ce-due').value = c.due_date ? _ceFmt(c.due_date) : '';
  document.getElementById('ce-sb').value = c.start_before ? _ceFmt(c.start_before) : '';
  document.getElementById('ce-et').value = c.estimated_time != null ? c.estimated_time : '';
  document.getElementById('ce-recur').value = c.recur_type||'';
  document.getElementById('ce-reminder').checked = !!c.is_reminder;
  document.getElementById('ce-notes').value = c.notes||'';
  document.getElementById('ce-modal').classList.add('open');
  document.getElementById('ce-title').focus();
}
function closeCE() { document.getElementById('ce-modal').classList.remove('open'); _ceId = null; }
async function saveCE() {
  const c = _ceCards.find(x => x.id === _ceId);
  if (!c) return;
  c.title = document.getElementById('ce-title').value.trim() || c.title;
  c.category = document.getElementById('ce-cat').value;
  c.size = document.getElementById('ce-size').value;
  const etRaw = document.getElementById('ce-et').value;
  c.estimated_time = etRaw !== '' ? parseInt(etRaw,10) : (c.estimated_time??null);
  const dueRaw = document.getElementById('ce-due').value;
  const sbRaw = document.getElementById('ce-sb').value;
  const res = await _ceResolve(dueRaw, c.size, c.estimated_time);
  c.due_date = res.due;
  c.start_before = sbRaw.trim() ? (await _ceResolve(sbRaw)).due : (res.start_before??c.start_before??null);
  c.notes = document.getElementById('ce-notes').value.trim();
  c.recur_type = document.getElementById('ce-recur').value||null;
  c.is_reminder = document.getElementById('ce-reminder').checked;
  await fetch('/api/rd?source=prof',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({cards:_ceCards})});
  closeCE();
  load(weekStart);
}
async function deleteCE() {
  if (!_ceId) return;
  _ceCards = _ceCards.filter(x => x.id !== _ceId);
  await fetch('/api/rd?source=prof',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({cards:_ceCards})});
  closeCE();
  load(weekStart);
}
async function ceFillSB() {
  const dueRaw = document.getElementById('ce-due').value.trim();
  if (!dueRaw) return;
  const res = await _ceResolve(dueRaw, document.getElementById('ce-size').value, parseInt(document.getElementById('ce-et').value)||null);
  if (res.start_before) document.getElementById('ce-sb').value = res.start_before;
}
</script>
