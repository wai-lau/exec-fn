
<style>
body { overflow: hidden !important; }
.pr-books {
  display: none; position: fixed; top: 0; left: 0; right: 0; height: 48px; z-index: 19;
  align-items: center; padding: 0 12px; gap: 6px; overflow-x: scroll; overflow-y: hidden;
  scrollbar-width: none; touch-action: pan-x; -webkit-overflow-scrolling: touch;
  background: rgba(0,0,0,0.35); border-bottom: 1px solid rgba(210,160,80,0.1);
  font-family: 'Iosevka Mayukai Monolite', monospace; font-size: 0.63rem;
}
.pr-books::-webkit-scrollbar { display: none; }
.pr-books .book-item { cursor: pointer; flex-shrink: 0; white-space: nowrap; opacity: 0.8; padding: 4px 14px; border-radius: 3px; }
.pr-books .book-item:hover { opacity: 1; }
.has-books .pr-books { display: flex; }
.pr-board {
  position: fixed; top: 0; bottom: 58px; left: 0; right: 0;
  display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr);
  gap: 1px; overflow: hidden;
  background: rgba(0,255,65,0.04);
}
.has-books .pr-board { top: 48px; }
.pr-col {
  display: flex; flex-direction: column;
  background: rgba(0,0,0,0.3); min-width: 0; min-height: 0;
}
.pr-col.weekend { background: rgba(220,220,220,0.11); }
.pr-col-hdr {
  flex-shrink: 0; padding: 6px 14px 8px;
  font-family: monospace; font-size: 0.6rem; text-transform: uppercase;
  letter-spacing: 0.15em; color: rgba(0,255,65,0.55);
  border-bottom: 1px solid rgba(0,255,65,0.1);
}
.pr-col-hdr .pr-day-name { color: rgba(0,255,65,0.8); font-size: 0.68rem; }
.pr-col-hdr .pr-date { opacity: 0.45; font-size: 0.58rem; }
.pr-col-hdr.today-hdr { border-bottom-color: rgba(0,255,65,0.4); }
.pr-col-hdr.today-hdr .pr-day-name { color: rgba(0,255,65,1); }
.pr-list {
  flex: 1; overflow-y: auto; padding: 8px 8px 20px;
  min-height: 0;
}
.pr-card {
  border-radius: 3px; padding: 6px 9px; margin-bottom: 5px;
  cursor: grab; user-select: none; font-family: monospace;
  border: 1px solid transparent; position: relative;
  overflow: hidden; box-sizing: border-box;
  transition: filter 0.12s;
  min-height: 36px;
}
.pr-card:active { cursor: grabbing; }
.pr-card:hover { filter: brightness(1.1); }
.pr-card.plain { background: rgba(0,255,65,0.06); border-color: rgba(0,255,65,0.18); }
.pr-card-title { font-size: 0.76rem; line-height: 1.3; word-break: break-word; }
.pr-card-meta { font-size: 0.58rem; opacity: 0.5; margin-top: 4px; display: flex; justify-content: space-between; gap: 4px; }
.pr-overdue { position: absolute; top: 4px; right: 6px; font-size: 0.6rem; color: rgba(255,120,80,0.9); }
.sortable-ghost { opacity: 0.15; }
.pr-unschedule {
  position: fixed; bottom: 0; left: 0; right: 0; height: 58px; z-index: 25;
  display: flex; align-items: center; justify-content: center;
  font-family: monospace; font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase;
  color: rgba(255,80,80,0.0); border-top: 1px solid rgba(255,80,80,0);
  transition: color 0.15s, border-color 0.15s, background 0.15s;
  pointer-events: none;
}
body.pr-dragging .pr-unschedule {
  pointer-events: all;
  color: rgba(255,80,80,0.55); border-top-color: rgba(255,80,80,0.3);
  background: rgba(255,30,30,0.06);
}
body.pr-dragging .pr-unschedule.drag-over {
  color: rgba(255,80,80,1); border-top-color: rgba(255,80,80,0.8);
  background: rgba(255,30,30,0.18);
}
.pr-toast {
  position: fixed; bottom: 68px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.9); border: 1px solid rgba(255,120,80,0.5);
  color: rgba(255,140,80,0.9); font-family: monospace; font-size: 0.78rem;
  padding: 8px 20px; z-index: 100; pointer-events: none;
  opacity: 0; transition: opacity 0.3s;
}
.pr-toast.show { opacity: 1; }
</style>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

<div class="pr-books" id="pr-books-bar"></div>
<div class="pr-board" id="pr-board">
  <span style="padding:32px;font-family:monospace;font-size:0.8rem;opacity:0.4">loading...</span>
</div>
<span id="pr-status" style="display:none"></span>
<div class="pr-toast" id="pr-toast"></div>
<div class="pr-unschedule" id="pr-unschedule">unschedule</div>

<script src="/card-dialog.js"></script>

<script>
const CAT_HUE = {Book:193, Self:193, Social:338, Interfacing:36, Hobby:8};
const CAT_LIGHT = {Book:0, Self:0, Social:+10, Interfacing:0, Hobby:8};
const CAT_SAT   = {Social:+10, Interfacing:+35, Self:+35, Hobby:+10, Book:+30};
const RECUR_LABEL = {week:'↺wk', 'bi-week':'↺2wk', month:'↺mo', holiday:'↺yr', birthday:'↺bday'};
const SIZE_MIN = {chore:30, task:90, project:240, titan:480, book:60};

let weekStart = null;
let weekData = null;
let pendingUpdates = [];
let saveTimer = null;
let _prDragging = false;

function isoToday() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function addDays(iso, n) {
  const d = new Date(iso + 'T12:00:00');
  d.setDate(d.getDate() + n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmtDay(iso) {
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
}

function cardHeight(c) {
  const mins = c.estimated_time || SIZE_MIN[c.size] || 60;
  return Math.max(44, Math.min(220, Math.round(mins * 0.75))) + 'px';
}

function cardBg(c) {
  const h = CAT_HUE[c.category];
  if (!h) return {bg:'', dark:false};
  const ds = CAT_SAT[c.category] || 0;
  const dl = CAT_LIGHT[c.category] || 0;
  const dark = ['chore','task','book'].includes(c.size);
  const col = `hsl(${h},${75+ds}%,${68+dl}%)`;
  if (dark) return {bg:`background:#0d0d0d;color:${col};border-color:hsl(${h},${65+ds}%,${60+dl}%);`, dark:true};
  return {bg:`background:hsl(${h},${50+ds}%,${54+dl}%);`, dark:false};
}

function isOverdue(card, dayIso) {
  if (!card.due_date) return false;
  return dayIso > card.due_date.slice(0, 10);
}

function renderCard(c, dayIso) {
  const {bg, dark} = cardBg(c);
  const titleC = bg ? (dark ? 'inherit' : 'rgba(0,0,0,0.85)') : 'rgba(0,255,65,0.88)';
  const metaC  = bg ? (dark ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.5)') : 'rgba(0,255,65,0.4)';
  const h = cardHeight(c);

  const over = (dayIso && isOverdue(c, dayIso)) ? '<span class="pr-overdue">!</span>' : '';
  const reminder = c.is_reminder ? '<span style="opacity:0.35;font-size:0.6rem"> [rem]</span>' : '';
  const recur = c.recur_type ? `<span style="opacity:0.45">${RECUR_LABEL[c.recur_type]||'↺'}</span>` : '';
  const due = c.due_date ? `<span style="opacity:0.45">${c.due_date.slice(5)}</span>` : '';
  const mins = c.estimated_time || SIZE_MIN[c.size] || 60;
  const dur = mins >= 60 ? `${Math.floor(mins/60)}h${mins%60?mins%60+'m':''}` : `${mins}m`;
  return `<div class="pr-card${bg ? '' : ' plain'}" data-id="${c.id}" data-due="${c.due_date||''}" style="${bg}height:${h};min-height:${h}">
    ${over}
    <div class="pr-card-title" style="color:${titleC}">${c.title}${reminder}</div>
    <div class="pr-card-meta" style="color:${metaC}">
      <span>${[c.size, recur||''].filter(Boolean).join(' ')}</span>
      <span>${[dur, due].filter(Boolean).join(' ')}</span>
    </div>
  </div>`;
}

function buildBoard() {
  if (!weekData) return;
  const today = isoToday();
  const days = Object.keys(weekData.days);

  // Always include today even when viewing a different week
  if (!days.includes(today) && !weekData.days[today]) {
    weekData.days[today] = [];
    days.unshift(today);
  }
  let html = '';

  for (const day of days) {
    const cards = weekData.days[day];
    const isToday = day === today;
    const dow = new Date(day + 'T12:00:00').getDay();
    const isWeekend = dow === 0 || dow === 6;
    const dayLabel = fmtDay(day).split(',')[0];
    const dateLabel = fmtDay(day).replace(/^[^,]+, /, '');
    html += `<div class="pr-col${isWeekend?' weekend':''}" data-day="${day}">
      <div class="pr-col-hdr${isToday?' today-hdr':''}">
        <div class="pr-day-name">${dayLabel}</div>
        <div class="pr-date">${dateLabel}</div>
      </div>
      <div class="pr-list" id="pr-list-${day}">${cards.map(c=>renderCard(c,day)).join('')}</div>
    </div>`;
  }

  document.getElementById('pr-board').innerHTML = html;
  initSortable(days);
  document.querySelectorAll('.pr-card').forEach(el => {
    el.addEventListener('click', () => { if (!_prDragging) openCardDialog(el.dataset.id, () => load(weekStart), 'prof'); });
  });
}

function initSortable(days) {
  const unscheduleEl = document.getElementById('pr-unschedule');

  Sortable.create(unscheduleEl, {
    group: { name: 'prophecies', put: true, pull: false },
    animation: 120,
    ghostClass: 'sortable-ghost',
    onAdd(evt) {
      const cardId = evt.item.dataset.id;
      evt.item.remove();
      queueUpdate(cardId, null, false);
      setTimeout(() => load(weekStart), 700);
    },
  });

  days.forEach(day => {
    const el = document.getElementById('pr-list-' + day);
    if (!el) return;
    Sortable.create(el, {
      group: 'prophecies',
      animation: 120,
      ghostClass: 'sortable-ghost',
      delay: 250,
      delayOnTouchOnly: true,
      onStart() {
        _prDragging = true;
        document.body.classList.add('pr-dragging');
      },
      onEnd(evt) {
        _prDragging = false;
        document.body.classList.remove('pr-dragging');
        const cardId = evt.item.dataset.id;
        const cardDue = evt.item.dataset.due;
        const toDay = evt.to.id.replace('pr-list-', '');

        if (evt.to === unscheduleEl) return;

        if (cardDue && toDay > cardDue) {
          showToast(`Warning: scheduling after due date (${cardDue})`);
        }
        evt.to.querySelectorAll('.pr-card').forEach((el, i) => {
          if (el.dataset.id === cardId) queueUpdate(el.dataset.id, toDay, i);
          else queueUpdate(el.dataset.id, undefined, i);
        });
        if (evt.from !== evt.to) {
          evt.from.querySelectorAll('.pr-card').forEach((el, i) => {
            queueUpdate(el.dataset.id, undefined, i);
          });
        }
      },
    });
  });

  unscheduleEl.addEventListener('dragover', () => unscheduleEl.classList.add('drag-over'));
  unscheduleEl.addEventListener('dragleave', () => unscheduleEl.classList.remove('drag-over'));
}

function queueUpdate(cardId, scheduledDay, order) {
  const idx = pendingUpdates.findIndex(u => u.id === cardId);
  const upd = {id: cardId};
  if (scheduledDay !== undefined) upd.scheduled_day = scheduledDay || null;
  if (order !== undefined) upd.order = order;
  if (idx >= 0) pendingUpdates[idx] = {...pendingUpdates[idx], ...upd};
  else pendingUpdates.push(upd);
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(flushUpdates, 600);
}

async function flushUpdates() {
  if (!pendingUpdates.length) return;
  const updates = [...pendingUpdates];
  pendingUpdates = [];
  setStatus('saving...');
  try {
    await fetch('/api/prophecies', {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({updates}),
    });
    setStatus('saved');
    setTimeout(() => setStatus(''), 1500);
  } catch(e) {
    setStatus('save error');
  }
}

function setStatus(msg) {
  document.getElementById('pr-status').textContent = msg;
}

let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('pr-toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 4000);
}

async function buildBooks() {
  const r = await fetch('/api/rd');
  const data = await r.json();
  const all = (data.cards || []).filter(c => c.size === 'book' && c.column !== 'archives' && c.column !== 'exile');
  const bar = document.getElementById('pr-books-bar');
  if (!all.length) { document.body.classList.remove('has-books'); bar.innerHTML = ''; return; }
  document.body.classList.add('has-books');
  bar.innerHTML = all.map(c => {
    const title = c.title.length > 30 ? c.title.slice(0, 30) + '…' : c.title;
    return `<div class="book-item" data-id="${c.id}" style="color:hsl(210,75%,72%);background:hsl(210,55%,12%);border:1px solid hsl(210,50%,26%)">${title}</div>`;
  }).join('');
  bar.querySelectorAll('.book-item').forEach(el => {
    el.addEventListener('click', () => { if (!_prDragging) openCardDialog(el.dataset.id, () => { buildBooks(); }, 'prof'); });
  });
}

function consult_oracle() {
  const unsched = weekData.unscheduled || [];
  if (!unsched.length) return;

  const today = isoToday();
  const targetDays = Array.from({length: 6}, (_, i) => addDays(today, i + 1));

  // count already-scheduled cards per target day
  const counts = {};
  for (const day of targetDays) {
    counts[day] = (weekData.days[day] || []).length;
  }

  for (const card of unsched) {
    const day = targetDays.reduce((a, b) => counts[a] <= counts[b] ? a : b);
    counts[day]++;
    queueUpdate(card.id, day, false);
  }
}

async function load(start) {
  document.getElementById('pr-board').innerHTML = '<span style="padding:32px;font-family:monospace;font-size:0.8rem;opacity:0.4">loading...</span>';
  const url = start ? `/api/prophecies?start=${start}` : '/api/prophecies';
  const [r] = await Promise.all([fetch(url), buildBooks()]);
  weekData = await r.json();
  weekStart = weekData.week_start;
  if (!start) consult_oracle();
  buildBoard();
}

load(null);

</script>
