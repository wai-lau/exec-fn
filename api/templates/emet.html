<link rel="stylesheet" href="/gpu-mode.css?v=3">
<link rel="stylesheet" href="/emet.css?v=19">

<main class="emet doc-card">
  <div class="emet-head">
    <p class="emet-lede">emet knowledge-graph · MCP test harness</p>
    <div id="gpu-mode" class="gpu-mode" hidden>
      <button type="button" class="gpu-mode-btn" data-mode="emo">emo</button>
      <button type="button" class="gpu-mode-btn" data-mode="idle">idle</button>
      <button type="button" class="gpu-mode-btn" data-mode="homo">homo</button>
    </div>
  </div>

  <section class="emet-sec">
    <h2 class="doc-h2">recall</h2>
    <p class="emet-hint">resolve free text to the best-matching node; returns its public scope.</p>
    <form id="form-recall" class="emet-form" data-out="out-recall">
      <input type="text" name="topic" placeholder="topic" autocomplete="off" required>
      <button type="submit">recall</button>
    </form>
    <div class="emet-out" id="out-recall"></div>
  </section>

  <section class="emet-sec">
    <h2 class="doc-h2">scope</h2>
    <p class="emet-hint">bounded public neighbourhood around a node id.</p>
    <form id="form-scope" class="emet-form" data-out="out-scope">
      <input type="text" name="node_id" placeholder="node_id" autocomplete="off" required>
      <input type="number" name="hops" class="emet-hops" value="1" min="0" max="5" title="hops">
      <button type="submit">scope</button>
    </form>
    <div class="emet-out" id="out-scope"></div>
  </section>

  <section class="emet-sec">
    <h2 class="doc-h2">ask</h2>
    <p class="emet-hint">local-LLM prose over sensitive facts; never raw private rows.</p>
    <form id="form-ask" class="emet-form emet-form-ask" data-out="out-ask">
      <input type="text" name="question" placeholder="question" autocomplete="off" required>
      <input type="text" name="topic" placeholder="topic (optional)" autocomplete="off">
      <button type="submit">ask</button>
    </form>
    <div class="emet-out" id="out-ask"></div>
  </section>
</main>

<script src="/gpu-mode.js?v=2"></script>
<script src="/emet.js?v=13"></script>
