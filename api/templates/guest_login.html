<link rel="stylesheet" href="/guest_login.css?v=3">
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<div style="display:flex;flex-direction:column;align-items:center;gap:24px">
  <img src="/ped-logo.png" style="width:160px;opacity:0.9">
  <form class="login-box" method="post" action="/guest">
    <input type="hidden" name="next" value="{next}">
    <div class="cf-turnstile" data-sitekey="{site_key}" data-callback="onGuestVerified" data-theme="dark"></div>
    <button type="submit" class="submit" aria-label="submit">▼</button>
  </form>
</div>
<script src="/guest_login.js?v=1"></script>
<a href="/login" class="landing-admin">admin</a>
