
<link rel="stylesheet" href="/tts.css?v=6">

<main class="tts">
  <textarea id="tts-text" placeholder="Type something to speak...">Hello from the web.</textarea>
  <button id="tts-speak">Speak</button>
  <div id="tts-status"></div>

  <select id="tts-voice"><option>loading voices...</option></select>

  <div id="tts-cb">
    <div class="tts-group">clone knobs (chatterbox)</div>
    <div class="tts-knobs">
      <label class="tts-knob"><span class="tts-kname">emotional intensity</span>
        <input type="range" id="tts-exaggeration" min="0" max="2" step="0.05" value="0.4">
        <span class="tts-kval" id="tts-exaggeration-val"></span>
        <span class="tts-kdesc">how dramatic the delivery is. low = flat, restrained; high = theatrical. above ~1 gets hammy.</span></label>
      <label class="tts-knob"><span class="tts-kname">guidance</span>
        <input type="range" id="tts-cfg_weight" min="0" max="1" step="0.05" value="0.5">
        <span class="tts-kval" id="tts-cfg_weight-val"></span>
        <span class="tts-kdesc">how tightly it sticks to the voice (also pacing). low = looser, slower, more natural; high = faithful but stiff, clipped.</span></label>
      <label class="tts-knob"><span class="tts-kname">randomness</span>
        <input type="range" id="tts-temperature" min="0.1" max="2" step="0.05" value="0.3">
        <span class="tts-kval" id="tts-temperature-val"></span>
        <span class="tts-kdesc">sampling spread take-to-take. low = consistent, samey; high = varied, spontaneous, less stable.</span></label>
    </div>
  </div>

  <div class="tts-group">playback</div>
  <div class="tts-knobs">
    <label class="tts-knob"><span class="tts-kname">speed</span>
      <input type="range" id="tts-speed" min="0.5" max="2" step="0.05" value="1.1">
      <span class="tts-kval" id="tts-speed-val"></span></label>
    <label class="tts-knob"><span class="tts-kname">volume</span>
      <input type="range" id="tts-volume" min="0" max="5" step="0.1" value="1.0">
      <span class="tts-kval" id="tts-volume-val"></span></label>
  </div>

</main>

<script src="/hosaka-audio.js?v=3"></script>
<script src="/tts.js?v=7"></script>
