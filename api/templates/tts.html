
<link rel="stylesheet" href="/tts.css?v=18">

<main class="tts">
  <textarea id="tts-text" placeholder="Type something to speak...">Hi, so, there's a project that I've been working on that I really want to talk to you about.--- It's called Hosaka!
I know the name sounds like a computer brand from Neuromancer, and--- Well, it is!---

Okay, full honesty, setting it up is a teeeeeny-tiny-little bit temperamental: You have to install everything in just the right order or it gets all manic. It doesn't find the graphics card and the whole thing screams at you and you're up all night and — then the next day you're trying to sell this piece of junk to some strangers on the internet!- Uh, I mean, friends! I mean friends!</textarea>
  <div class="tts-row">
    <select id="tts-voice"><option>loading voices...</option></select>
    <button id="tts-speak">Speak</button>
  </div>
  <div id="tts-status"></div>
  <canvas id="tts-wave" aria-hidden="true"></canvas>

  <div id="tts-cb">
    <div class="tts-group">clone knobs (chatterbox)</div>
    <div class="tts-knobs">
      <label class="tts-knob"><span class="tts-kname">intensity</span>
        <input type="range" id="tts-exaggeration" min="0" max="2" step="0.05" value="0.85">
        <span class="tts-kval" id="tts-exaggeration-val"></span>
        <span class="tts-kdesc">how dramatic the delivery is. low = flat, restrained; high = theatrical. above ~1 gets hammy.</span></label>
      <label class="tts-knob"><span class="tts-kname">guidance</span>
        <input type="range" id="tts-cfg_weight" min="0" max="1" step="0.05" value="0.75">
        <span class="tts-kval" id="tts-cfg_weight-val"></span>
        <span class="tts-kdesc">how tightly it sticks to the voice. low = looser, slower; high = faithful but stiff.</span></label>
      <label class="tts-knob"><span class="tts-kname">randomness</span>
        <input type="range" id="tts-temperature" min="0.1" max="2" step="0.05" value="0.15">
        <span class="tts-kval" id="tts-temperature-val"></span>
        <span class="tts-kdesc">sampling spread take-to-take. low = consistent, samey; high = varied, spontaneous, less stable.</span></label>
    </div>
  </div>

  <div class="tts-group">playback</div>
  <div class="tts-knobs">
    <label class="tts-knob"><span class="tts-kname">speed</span>
      <input type="range" id="tts-speed" min="0.5" max="2" step="0.05" value="1.1">
      <span class="tts-kval" id="tts-speed-val"></span></label>
    <label class="tts-knob"><span class="tts-kname">volume</span>
      <input type="range" id="tts-volume" min="0" max="5" step="0.1" value="1.0">
      <span class="tts-kval" id="tts-volume-val"></span></label>
  </div>

</main>

<script src="/hosaka-audio.js?v=4"></script>
<script src="/tts.js?v=16"></script>
