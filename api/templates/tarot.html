<style>
/* chat-reader.css carries the shared merged-input + reader-voice skin;
   below: tarot-only — spread layout, cards, zoom, centered scrollback */

/* keep the nav visible while the composer is focused — but only on non-touch
   (desktop, html.no-touch set by JS); on touch devices (incl. iOS) let kb-open
   hide it so the soft keyboard has room */
html.no-touch.kb-open .exec-nav { visibility: visible !important; }
/* Spread height fits the cards; terminal eats the rest. */
:root {
  --card-w: min(13vh, 18vw);
  --card-h: min(22vh, 30vw);
  --spread-pad: max(0.4vh, calc(var(--card-h) * 0.06));
  --spread-h: calc(var(--card-h) + var(--spread-pad) * 2);
  /* tarot-only accents (global palette lives in chrome.css) */
  --ember-hsl: 23 100% 70%;            /* spread-btn hover glow */
  --ember-bright: hsl(25 100% 81%);    /* spread-btn hover text */
}
#spread-area {
  position:fixed; bottom:max(var(--nav-h, 56px), var(--kb, 0px)); left:0; right:0; height:var(--spread-h);
  overflow:hidden;
  background:hsl(var(--bg-hsl));
  z-index:5;
}
#input-bar { bottom: calc(max(var(--nav-h, 56px), var(--kb, 0px)) + var(--spread-h)) !important; }
#input-line { max-width:720px; margin-left:auto; margin-right:auto; }
/* hide the $ prompt while the reader is streaming a reply */
body.reader-speaking #input-prompt { visibility:hidden; }
#terminal { scrollbar-width:none; -ms-overflow-style:none; }
#terminal::-webkit-scrollbar { display:none; }
#terminal { top:0 !important; inset:0 0 calc(var(--spread-h) + max(var(--nav-h, 56px), var(--kb, 0px)) + var(--input-h, 48px)) !important; }
body.no-input #input-bar { opacity:0; visibility:hidden; pointer-events:none; }
body.no-input #terminal { transition: inset 0.7s ease; inset:0 0 calc(var(--spread-h) + max(var(--nav-h, 56px), var(--kb, 0px))) !important; }

#spread-controls {
  grid-column: 2;
  display:flex; align-items:center; justify-content:center;
  height:100%;
}
.spread-btn {
  background:radial-gradient(circle at center, hsl(var(--green-hsl) / 0.18), hsl(var(--green-hsl) / 0) 70%);
  border:none; outline:none;
  color:hsl(var(--green-hsl) / 0.95);
  font-family:'Iosevka Mayukai Monolite',monospace; font-weight:700;
  font-size:clamp(0.45rem, 1.1vw, 0.7rem);
  white-space:nowrap;
  line-height:1; padding:4px 6px; cursor:pointer; border-radius:50%;
  text-shadow:0 0 6px hsl(var(--green-hsl) / 0.55);
  animation: btn-pulse 2.6s ease-in-out infinite;
  transition:color 0.15s, transform 0.15s, text-shadow 0.15s;
}
@keyframes btn-pulse {
  0%,100% { text-shadow:0 0 4px hsl(var(--green-hsl) / 0.4); }
  50%     { text-shadow:0 0 10px hsl(var(--green-hsl) / 0.85); }
}
.spread-btn:hover { color:var(--ember-bright); transform:scale(1.18); text-shadow:0 0 12px hsl(var(--ember-hsl) / 0.85); }
.spread-btn:active { transform:scale(0.94); }
.spread-btn .rst-glyph {
  font-family: system-ui, sans-serif;
  font-size:1.7em; line-height:1; vertical-align:-0.18em;
  margin:0 0.15em; display:inline-block;
}

#spread-empty {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  color:hsl(var(--green-hsl) / 0.4);
  font-family:'Iosevka Mayukai Monolite',monospace; font-size:0.85rem;
  pointer-events:none;
}

#spread-grid {
  position:absolute; inset:0;
  display:grid;
  grid-template-columns: var(--card-w) calc(var(--card-w) / 2) var(--card-w) var(--card-w) var(--card-w);
  column-gap: min(1vh, 1.5vw);
  align-items:center; justify-content:center;
  pointer-events:none;
}
#spread-grid > * { pointer-events:auto; }

/* spread cards + Significator slot share the same card body… */
.tarot-card, #sig-card {
  position:relative;
  box-sizing:border-box;
  isolation:isolate;
  width:var(--card-w); height:var(--card-h);
  cursor:pointer;
  border-radius:8px;
  outline:1.5px solid hsl(var(--green-hsl) / 0.4);
  filter:drop-shadow(0 2px 6px rgba(0,0,0,0.7));
  user-select:none;
}
/* …and the same green phosphor wash while face-down */
.tarot-card::after, #sig-card::after {
  content:''; position:absolute; inset:0;
  background:hsl(var(--green-hsl));
  mix-blend-mode:color;
  pointer-events:none;
  border-radius:8px;
}
.tarot-card { transition:outline-width 0.15s, outline-color 0.15s, transform 0.4s ease; }
.tarot-card[data-flipped="true"]::after { display:none; }
.tarot-card:hover { outline:2px solid hsl(var(--green-hsl) / 0.45); }
.tarot-card img {
  width:100%; height:100%; object-fit:contain;
  border-radius:8px;
  display:block;
}
.tarot-card img.back { object-fit:fill; }
.tarot-card .card-label { display:none; }
.tarot-card .face { display:none; }
.tarot-card[data-flipped="true"] .back { display:none; }
.tarot-card[data-flipped="true"] .face { display:block; }
.tarot-card[data-locked="true"] { cursor:default; opacity:0.55; }
.tarot-card[data-locked="true"]:hover { outline:1.5px solid hsl(var(--green-hsl) / 0.4); }
.tarot-card[data-next="true"] { animation:nextpulse 1.8s ease-in-out infinite; }
/* hold the beckon-pulse until the reader has finished speaking */
body.reader-speaking .tarot-card[data-next="true"] {
  animation:none;
  outline:0 solid hsl(var(--green-hsl) / 0);
}
@keyframes nextpulse {
  0%,100% { outline:1px solid hsl(var(--green-hsl) / 0.25); }
  50%     { outline:2px solid hsl(var(--green-hsl) / 0.5); }
}
.msg.event { color:hsl(var(--green-hsl) / 0.45); font-style:italic; font-size:0.74rem; margin:6px auto; }
.msg.event::before { content:"~ "; opacity:0.5; }

.reader-cursor {
  display:inline-block; width:0.55em; height:1em;
  background:hsl(var(--green-hsl) / 0.85);
  vertical-align:text-bottom; margin-left:1px;
  animation:blink 1s step-end infinite;
}

/* Significator slot deltas (shares the card body rules above) */
#sig-card {
  grid-column: 1;
  border:1px solid rgba(0,0,0,0.4);
  background:hsl(var(--surface-hsl)) url('/tarot/card_back.jpg?v=4') center/100% 100% no-repeat;
  display:flex; align-items:center; justify-content:center;
}
#sig-card.set { background:#000; }
#sig-card.set:hover { outline:2px solid hsl(var(--green-hsl) / 0.45); }
#sig-card.set::after { display:none; }
#sig-card.set img { width:100%; height:100%; object-fit:contain; border-radius:8px; }
#sig-card .sig-label {
  position:absolute; left:50%; bottom:calc(100% + 4px);
  transform:translateX(-50%);
  white-space:nowrap;
  color:hsl(var(--green-hsl) / 0.65);
  font-family:'Iosevka Mayukai Monolite',monospace; font-size:0.66rem;
  text-align:center; line-height:1.15;
  pointer-events:none;
}
#sig-card .sig-name {
  display:block; color:hsl(var(--green-hsl) / 0.9); font-size:0.62rem;
}

/* phase/event readouts pinned to the spread edges */
#phase-debug, #event-debug {
  position:absolute; left:0; right:0; z-index:5; text-align:center;
  font-family:'Iosevka Mayukai Monolite',monospace; font-size:0.66rem;
  color:hsl(var(--green-hsl) / 0.4); letter-spacing:0.05em;
  pointer-events:none; user-select:none;
}
#phase-debug { bottom:8px; }
#event-debug { top:8px; }

#card-zoom {
  position:fixed; inset:0; z-index:60; display:none;
  background:rgba(0,0,0,0.92);
  align-items:center; justify-content:center;
  flex-direction:column; gap:14px;
  padding:20px;
}
#card-zoom.open { display:flex; }
#card-zoom img {
  max-width:min(90vw, 60vh); max-height:80vh; height:auto; width:auto;
  border-radius:6px; border:1px solid rgba(0,0,0,0.5);
  outline:3px solid hsl(var(--green-hsl) / 0.55);
}
#card-zoom .zoom-label {
  font-family:'Iosevka Mayukai Monolite',monospace; font-size:0.85rem;
  color:hsl(var(--green-hsl) / 0.85); text-align:center; line-height:1.3;
  max-width:60vh;
}
#card-zoom .zoom-hint {
  font-family:'Iosevka Mayukai Monolite',monospace; font-size:0.66rem;
  color:hsl(var(--green-hsl) / 0.35); letter-spacing:0.05em;
}

/* centered 720px scrollback (chat-reader supplies the glow) */
.msg { max-width:720px; margin-left:auto; margin-right:auto; width:100%; }
</style>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<div id="spread-area">
  <div id="spread-grid">
    <div id="sig-card"></div>
    <div id="spread-controls">
      <button class="spread-btn" id="reset-btn" title="Reset" aria-label="Reset">[<span class="rst-glyph">↺</span>]</button>
    </div>
  </div>
  <div id="spread-empty"></div>
  <div id="phase-debug" style="display:none"></div>
  <div id="event-debug" style="display:none"></div>
</div>
<div id="card-zoom">
  <img alt="" />
  <div class="zoom-label"></div>
  <div class="zoom-hint">tap anywhere to return</div>
</div>
<div id="terminal"></div>
<div id="input-bar">
  <div id="input-line">
    <span id="input-prompt">$</span>
    <div id="input-wrapper">
      <div id="input-display" aria-hidden="true"><span id="input-pre"></span><span id="input-cursor"></span><span id="input-post"></span></div>
      <div id="msg-input" contenteditable="true" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></div>
    </div>
  </div>
</div>

<script>
const LS_SPREAD = 'tarot.spread';
const LS_MESSAGES = 'tarot.messages';
const LS_SIG = 'tarot.significator';

const COURT_RANKS = ['page', 'knight', 'queen', 'king'];
const COURT_RANK_LABEL = {page: 'Page', knight: 'Knight', queen: 'Queen', king: 'King'};
const COURT_SUITS = ['cups', 'wands', 'swords', 'pentacles'];
const COURT_SUIT_LABEL = {cups: 'Cups', wands: 'Wands', swords: 'Swords', pentacles: 'Pentacles'};

function courtList() {
  const out = [];
  for (const rank of COURT_RANKS) {
    for (const suit of COURT_SUITS) {
      const id = `${rank}_of_${suit}`;
      const name = `${COURT_RANK_LABEL[rank]} of ${COURT_SUIT_LABEL[suit]}`;
      out.push({card_id: id, name, image: `/tarot/cards/${id}.jpg`});
    }
  }
  return out;
}

let spread = JSON.parse(localStorage.getItem(LS_SPREAD) || 'null');
let messages = JSON.parse(localStorage.getItem(LS_MESSAGES) || '[]');
let significator = JSON.parse(localStorage.getItem(LS_SIG) || 'null');
let spreadsMeta = null;
let streaming = false;

const terminal = document.getElementById('terminal');
const spreadEmpty = document.getElementById('spread-empty');
const sigCard = document.getElementById('sig-card');
const phaseDebug = document.getElementById('phase-debug');
const eventDebug = document.getElementById('event-debug');
const cardZoom = document.getElementById('card-zoom');
const cardZoomImg = cardZoom.querySelector('img');
const cardZoomLabel = cardZoom.querySelector('.zoom-label');

const FRAME_LABELS = {
  past_present_future:       { past:'Past',      present:'Present',  future:'Future'  },
  situation_obstacle_advice: { past:'Situation', present:'Obstacle', future:'Advice'  },
};
function framePosLabel(positionKey) {
  const frame = (spread && spread.frame) || 'past_present_future';
  return FRAME_LABELS[frame]?.[positionKey];
}

// Remove a trailing flip-invite ("When you're ready, turn the **Past**.") that
// the reader appended to the deal turn against the prompt's ban — the frontend
// prints the canonical invite itself in drawSpread.
function stripDealInvite(t) {
  return t.replace(
    /\n+\s*(when you'?re ready[,.]?\s*)?(go ahead and\s+)?turn the\s+\*{0,2}[\w][\w ]*\*{0,2}\s*[.?!]*\s*$/i,
    ''
  ).trimEnd();
}

function currentPhase() {
  if (!significator) return ['1', 'baseline'];
  if (!spread) return ['2', 'query'];
  const flipped = spread.cards.filter(c => c.flipped).length;
  const total = spread.cards.length;
  if (flipped === 0) return ['3', 'encounter'];
  if (flipped < total) {
    const last = spread.cards.filter(c => c.flipped).slice(-1)[0];
    const label = framePosLabel(last.position) || last.position;
    return [`4 (${flipped}/${total})`, label.toLowerCase()];
  }
  return ['5', 'interlinked'];
}

function renderPhaseDebug() {
  const [num, label] = currentPhase();
  phaseDebug.textContent = `phase ${num} — ${label}`;
}

function sigLocked() {
  return !!(spread && spread.cards && spread.cards.some(c => c.flipped));
}

function renderSigCard() {
  sigCard.classList.toggle('set', !!significator);
  if (significator) {
    sigCard.innerHTML = `<img src="${significator.image}" alt="${significator.name}">`;
  } else {
    sigCard.innerHTML = '';
  }
  renderPhaseDebug();
}
const renderSigSlot = renderSigCard;

marked.use({ breaks: true });
function renderText(raw) { return marked.parse(raw); }

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  if (role === 'assistant' || role === 'user') {
    const body = document.createElement('div');
    body.className = 'msg-body';
    body.innerHTML = renderText(text);
    div.appendChild(body);
  } else {
    div.textContent = text;
  }
  terminal.appendChild(div);
  terminal.scrollTop = terminal.scrollHeight;
  return div;
}

function addStreamDiv() {
  const div = document.createElement('div');
  div.className = 'msg assistant';
  const body = document.createElement('div');
  body.className = 'msg-body';
  const cur = document.createElement('span');
  cur.className = 'reader-cursor';
  body.appendChild(cur);
  div.appendChild(body);
  terminal.appendChild(div);
  return {div, body, cur};
}

async function loadSpreadsMeta() {
  if (spreadsMeta) return spreadsMeta;
  const r = await fetch('/api/tarot/spreads');
  spreadsMeta = await r.json();
  return spreadsMeta;
}

const spreadGrid = document.getElementById('spread-grid');
const SPREAD_GRID_COLUMN = {past: 3, present: 4, future: 5};

function clearSpreadCards() {
  for (const el of spreadGrid.querySelectorAll('.tarot-card')) el.remove();
}

function nextPosition() {
  if (!spread || !spread.cards) return null;
  const next = spread.cards.find(c => !c.flipped);
  return next ? next.position : null;
}

function updateInputBarVisibility() {
  // input stays visible at all times — including while the reader speaks and
  // during the card-turning phase. The streaming send-guard still blocks
  // submits mid-stream.
  const wasHidden = document.body.classList.contains('no-input');
  document.body.classList.remove('no-input');
  // while the reader speaks, no card should beckon to be flipped
  document.body.classList.toggle('reader-speaking', streaming);
  if (wasHidden) {
    // input just reappeared: re-pin scroll to the last line and grab focus
    requestAnimationFrame(() => { terminal.scrollTop = terminal.scrollHeight; });
    focusInput();
  }
}

function renderSpread() {
  updateInputBarVisibility();
  clearSpreadCards();
  if (!spread || !spread.cards) {
    spreadEmpty.style.display = '';
    return;
  }
  spreadEmpty.style.display = 'none';
  const meta = spreadsMeta && spreadsMeta[spread.type];
  if (!meta) return;
  const posByKey = Object.fromEntries(meta.positions.map(p => [p.key, p]));
  const nextKey = nextPosition();
  for (const card of spread.cards) {
    const pos = posByKey[card.position];
    if (!pos) continue;
    const isNext = !card.flipped && card.position === nextKey;
    const isLocked = !card.flipped && !isNext;
    const el = document.createElement('div');
    el.className = 'tarot-card';
    el.dataset.position = card.position;
    el.dataset.cardId = card.card_id;
    el.dataset.flipped = card.flipped ? 'true' : 'false';
    el.dataset.reversed = card.reversed ? 'true' : 'false';
    el.dataset.next = isNext ? 'true' : 'false';
    el.dataset.locked = isLocked ? 'true' : 'false';
    el.style.gridColumn = SPREAD_GRID_COLUMN[card.position] || 'auto';
    const rot = (pos.rotate || 0) + ((card.flipped && card.reversed) ? 180 : 0);
    if (rot) el.style.transform = `rotate(${rot}deg)`;

    const back = document.createElement('img');
    back.className = 'back'; back.src = '/tarot/card_back.jpg?v=4'; back.alt = '';
    el.appendChild(back);
    const face = document.createElement('img');
    face.className = 'face'; face.src = card.image; face.alt = card.name;
    el.appendChild(face);

    const label = document.createElement('div');
    label.className = 'card-label';
    const posLabel = framePosLabel(card.position) || pos.label;
    label.innerHTML = `<span>${posLabel}</span><span class="card-name">${card.name}${card.reversed ? ' (rev)' : ''}</span>`;
    el.appendChild(label);

    if (isNext || card.flipped) el.addEventListener('click', () => flipCard(card.position));
    spreadGrid.appendChild(el);
  }
  renderPhaseDebug();
}

async function flipCard(positionKey) {
  if (!spread) return;
  const card = spread.cards.find(c => c.position === positionKey);
  if (!card) return;
  if (card.flipped) {
    // Already revealed → zoom it
    const meta = spreadsMeta && spreadsMeta[spread.type];
    const fallback = (meta && meta.positions.find(p => p.key === card.position)?.label) || card.position;
    const posLabel = framePosLabel(card.position) || fallback;
    openZoom(card.image, card.name + (card.reversed ? ' (reversed)' : ''), posLabel, card.reversed);
    return;
  }
  if (streaming) return;
  if (positionKey !== nextPosition()) return;
  const wasLocked = sigLocked();
  card.flipped = true;
  localStorage.setItem(LS_SPREAD, JSON.stringify(spread));
  renderSpread();
  if (!wasLocked) renderSigCard();
  const meta = spreadsMeta && spreadsMeta[spread.type];
  const fallback = (meta && meta.positions.find(p => p.key === card.position)?.label) || card.position;
  const posLabel = framePosLabel(card.position) || fallback;
  const orient = card.reversed ? 'reversed' : 'upright';
  openZoom(card.image, card.name + (card.reversed ? ' (reversed)' : ''), posLabel, card.reversed);
  await new Promise(resolve => {
    cardZoom.addEventListener('click', resolve, {once: true});
  });
  await autoTrigger(`[turned **${posLabel}**: ${card.name}, ${orient}]`);
}

function openZoom(src, name, position, reversed) {
  cardZoomImg.src = src;
  cardZoomImg.alt = name;
  cardZoomImg.style.transform = reversed ? 'rotate(180deg)' : '';
  cardZoomLabel.innerHTML = `<strong>${name}</strong>${position ? `<br><span style="opacity:0.6">${position}</span>` : ''}`;
  cardZoom.classList.add('open');
  _msgInput.blur();
}

function closeZoom() {
  cardZoom.classList.remove('open');
  cardZoomImg.src = '';
  _msgInput.focus();
}

function addEventMsg(text) {
  if (text.startsWith('[opened /tarot')) {
    eventDebug.textContent = text;
    return;
  }
  const div = document.createElement('div');
  div.className = 'msg event';
  div.textContent = text;
  terminal.appendChild(div);
  terminal.scrollTop = terminal.scrollHeight;
}

async function autoTrigger(text) {
  if (streaming) return;
  addEventMsg(text);
  messages.push({role: 'user', content: text});
  await streamResponse();
}

async function drawSpread(type, frame = 'past_present_future') {
  if (spread) return;
  let drawn;
  try {
    const body = {spread_type: type};
    if (significator) body.significator_id = significator.card_id;
    const r = await fetch('/api/tarot/draw', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error(await r.text());
    drawn = await r.json();
  } catch (e) {
    alert('Draw failed: ' + e.message);
    return;
  }
  for (const c of drawn.cards) c.flipped = false;
  spread = drawn;
  spread.frame = frame;
  localStorage.setItem(LS_SPREAD, JSON.stringify(spread));
  await loadSpreadsMeta();
  renderSpread();
  renderSigSlot();
  const meta = spreadsMeta[spread.type];
  // Phase 3 is deterministic: record the deal as an event marker and print the
  // first-position flip invite ourselves. No model turn — the reader kept
  // duplicating this line against the prompt's hard ban, so the frontend owns it.
  const drewMarker = `[drew a ${meta?.label || spread.type} spread; ${spread.cards.length} cards face-down]`;
  addEventMsg(drewMarker);
  messages.push({role: 'user', content: drewMarker});
  const firstPos = spread.cards[0]?.position;
  const label = framePosLabel(firstPos) || firstPos;
  const invite = `When you're ready, turn the **${label}**.`;
  addMsg('assistant', invite);
  messages.push({role: 'assistant', content: invite});
  localStorage.setItem(LS_MESSAGES, JSON.stringify(messages));
  focusInput();
}


function filteredSpread() {
  const sig = significator ? {card_id: significator.card_id, name: significator.name} : null;
  if (!spread) return {type: null, revealed: [], face_down_positions: [], significator: sig};
  const revealed = spread.cards
    .filter(c => c.flipped)
    .map(c => ({position: c.position, card_id: c.card_id, name: c.name, reversed: c.reversed}));
  const face_down_positions = spread.cards.filter(c => !c.flipped).map(c => c.position);
  return {type: spread.type, revealed, face_down_positions, significator: sig};
}

async function sendMsg() {
  if (streaming) return;
  const input = document.getElementById('msg-input');
  const text = input.innerText.trim();
  if (!text) return;
  input.textContent = '';
  renderCaret();
  input.focus();
  addMsg('user', text);
  messages.push({role: 'user', content: text});
  await streamResponse();
}

async function streamResponse() {
  streaming = true;
  updateInputBarVisibility();
  const {div, body, cur} = addStreamDiv();
  let buffered = '';   // received from server
  let displayed = '';  // rendered to DOM
  let serverDone = false;
  let drainCancelled = false;
  const pendingSys = [];  // sys notes held until the reader finishes speaking
  let pendingDeal = null; // frame to deal once the reader is done speaking

  // tuned to elderly-reader speaking pace (~130 wpm), not typing pace
  const SPEED = 1.25;       // overall pace multiplier
  const BASE_MS = 65;
  function nextDelayAfter(ch) {
    let d;
    switch (ch) {
      case '.': case '!': case '?': d = 850; break;
      case ',': case ';': case ':': d = 420; break;
      case '—': case '-':           d = 480; break; // em-dash, hyphen
      case '\n':                    d = 1100; break;
      case ' ':                     d = 110; break;
      default:                      d = BASE_MS;
    }
    return d / SPEED;
  }
  function drainOne() {
    if (drainCancelled) return;
    if (displayed.length < buffered.length) {
      displayed = buffered.slice(0, displayed.length + 1);
      body.innerHTML = renderText(displayed);
      (body.lastElementChild || body).appendChild(cur);
      terminal.scrollTop = terminal.scrollHeight;
      const last = displayed[displayed.length - 1];
      setTimeout(drainOne, nextDelayAfter(last));
    } else if (!serverDone) {
      setTimeout(drainOne, 50);
    }
  }
  drainOne();

  try {
    const r = await fetch('/api/tarot/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({messages, spread: filteredSpread(), session_id: spread?.session_id || null}),
    });
    if (!r.ok) throw new Error(await r.text());
    const reader = r.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += dec.decode(value, {stream: true});
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let data;
        try { data = JSON.parse(line.slice(6)); } catch { continue; }
        if (data.type === 'text') {
          buffered += data.delta;
        } else if (data.type === 'tool_call') {
          if (data.name === 'set_significator' && data.input?.card_id) {
            const cid = data.input.card_id;
            if (significator) {
              pendingSys.push(`[ set_significator ignored: Significator already locked (${significator.name}) ]`);
            } else if (data.count === 0) {
              pendingSys.push(`[ set_significator failed: ${cid} (not a court card) ]`);
            } else {
              const c = courtList().find(x => x.card_id === cid);
              if (c) {
                significator = {card_id: c.card_id, name: c.name, image: c.image};
                localStorage.setItem(LS_SIG, JSON.stringify(significator));
                renderSigCard();
              }
              pendingSys.push(`[ Significator set: ${c?.name || cid} ]`);
            }
          } else if (data.name === 'deal_spread') {
            if (spread) {
              pendingSys.push('[ deal_spread ignored: spread already dealt ]');
            } else if (data.count === 0) {
              pendingSys.push('[ deal_spread error — reader will retry ]');
            } else {
              // no sys note — the '[drew a ...]' event marker already
              // announces the deal. defer the actual draw until the reader
              // has finished speaking.
              pendingDeal = data.input?.frame || 'past_present_future';
            }
          } else {
            const label = data.input?.card_id ? `card lookup — ${data.input.card_id}` : `${data.name} — ${data.count}`;
            pendingSys.push(`[ ${label} ]`);
          }
        }
      }
    }
    serverDone = true;
    // wait for the drain tick to finish revealing all buffered text
    while (displayed.length < buffered.length) {
      await new Promise(r => setTimeout(r, 50));
    }
    cur.remove();
    // The deal turn must end at "let me set the cards." — the flip invite is the
    // frontend's job now (see drawSpread). If the reader tacked one on anyway,
    // strip the trailing invite so it isn't duplicated.
    if (pendingDeal) {
      const stripped = stripDealInvite(buffered);
      if (stripped !== buffered) {
        buffered = stripped;
        body.innerHTML = renderText(buffered);
      }
    }
    // backstop: reader declared the Significator in prose but skipped the
    // set_significator tool call. Match the one court card it named and fill the
    // slot so the flow doesn't stall.
    if (!significator && buffered) {
      const low = buffered.toLowerCase();
      const named = courtList().filter(c => low.includes(c.name.toLowerCase()));
      if (named.length === 1) {
        const c = named[0];
        significator = {card_id: c.card_id, name: c.name, image: c.image};
        localStorage.setItem(LS_SIG, JSON.stringify(significator));
        renderSigCard();
      }
    }
    // reader done speaking — now emit any held sys notes
    for (const m of pendingSys) addMsg('sys', m);
    const sysMsgs = terminal.querySelectorAll('.msg.sys');
    for (let i = 0; i < sysMsgs.length - 6; i++) sysMsgs[i].remove();
    if (buffered) {
      messages.push({role: 'assistant', content: buffered});
      localStorage.setItem(LS_MESSAGES, JSON.stringify(messages));
    }
  } catch(e) {
    serverDone = true;
    drainCancelled = true;
    cur.remove();
    div.textContent = '[error: ' + e.message + ']';
    div.style.color = 'hsl(var(--orange-glow-hsl) / 0.75)';
    pendingDeal = null;
  }
  streaming = false;
  updateInputBarVisibility();
  // draw the spread only now — after the reader stopped and the note printed
  if (pendingDeal) drawSpread('three', pendingDeal);
  else focusInput();
}

// focus the composer whenever it is the querent's turn. Retries across a few
// frames because focus on a just-unhidden element is silently dropped.
function _caretToEnd() {
  // contenteditable .focus() alone leaves no caret/selection inside the node, so
  // typing has nowhere to land. Put the caret at the end explicitly.
  const sel = window.getSelection();
  if (!sel) return;
  const range = document.createRange();
  range.selectNodeContents(_msgInput);
  range.collapse(false);
  sel.removeAllRanges();
  sel.addRange(range);
}

function focusInput() {
  if (document.body.classList.contains('no-input')) return;
  if (cardZoom.classList.contains('open')) return;
  const tries = [0, 60, 180];
  for (const t of tries) {
    setTimeout(() => {
      if (document.body.classList.contains('no-input')) return;
      if (cardZoom.classList.contains('open')) return;
      _msgInput.focus({preventScroll: true});
      // only seat the caret if focus actually landed and there isn't already a
      // live selection inside the field (don't stomp a mid-edit cursor)
      if (document.activeElement === _msgInput) {
        const sel = window.getSelection();
        if (!sel || !sel.rangeCount || !_msgInput.contains(sel.anchorNode)) _caretToEnd();
        renderCaret();
      }
    }, t);
  }
}

const _pre = document.getElementById('input-pre');
const _post = document.getElementById('input-post');
const _inputCursor = document.getElementById('input-cursor');
const _msgInput = document.getElementById('msg-input');

function _caretOffset() {
  const sel = window.getSelection();
  if (!sel.rangeCount || !_msgInput.contains(sel.anchorNode)) return _msgInput.innerText.length;
  const range = document.createRange();
  range.selectNodeContents(_msgInput);
  range.setEnd(sel.anchorNode, sel.anchorOffset);
  return range.toString().length;
}

function renderCaret() {
  const text = _msgInput.innerText;
  const pos = _caretOffset();
  _pre.textContent = text.slice(0, pos);
  _post.textContent = text.slice(pos);
}

_msgInput.addEventListener('input', renderCaret);

// keep the terminal bottom pinned to the top of the input bar so a multi-line
// input pushes the scrollback up instead of covering it
const _inputBar = document.getElementById('input-bar');
const _syncInputH = () => {
  document.documentElement.style.setProperty('--input-h', _inputBar.offsetHeight + 'px');
  terminal.scrollTop = terminal.scrollHeight;
};
new ResizeObserver(_syncInputH).observe(_inputBar);
_syncInputH();
_msgInput.addEventListener('blur', () => { _inputCursor.style.display = 'none'; });
_msgInput.addEventListener('focus', () => { _inputCursor.style.display = ''; renderCaret(); });
_msgInput.addEventListener('keyup', renderCaret);
_msgInput.addEventListener('click', renderCaret);
document.addEventListener('selectionchange', () => {
  if (document.activeElement === _msgInput) renderCaret();
});
_msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

// last-resort: if auto-focus was dropped, the first printable keystroke routes
// into the composer
document.addEventListener('keydown', e => {
  if (document.activeElement === _msgInput) return;
  if (document.body.classList.contains('no-input')) return;
  if (cardZoom.classList.contains('open')) return;
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.key.length === 1) {
    _msgInput.focus({preventScroll: true});
    // place caret at end so the in-flight char appends correctly
    const sel = window.getSelection();
    const range = document.createRange();
    range.selectNodeContents(_msgInput);
    range.collapse(false);
    sel.removeAllRanges();
    sel.addRange(range);
  }
});

async function saveReading() {
  if (!messages.length && !spread && !significator) return;
  try {
    await fetch('/api/tarot/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ significator, spread, messages }),
      keepalive: true,
    });
  } catch (e) {
    console.warn('reading save failed', e);
  }
}

async function resetAll() {
  if (!confirm('Reset everything? This reading will be saved, then Significator, spread, and chat history cleared.')) return;
  await saveReading();
  significator = null;
  spread = null;
  messages = [];
  localStorage.removeItem(LS_SIG);
  localStorage.removeItem(LS_SPREAD);
  localStorage.removeItem(LS_MESSAGES);
  terminal.innerHTML = '';
  renderSigCard();
  renderSpread();
  autoTrigger(`[opened /tarot; no Significator yet, no spread; ${tarotTimeMarker()}]`);
}

function tarotTimeMarker() {
  const d = new Date();
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  const h = d.getHours();
  let band;
  if (h < 5)       band = 'late-night';
  else if (h < 8)  band = 'predawn';
  else if (h < 11) band = 'morning';
  else if (h < 14) band = 'midday';
  else if (h < 17) band = 'afternoon';
  else if (h < 20) band = 'dusk';
  else if (h < 23) band = 'evening';
  else             band = 'late-night';
  return `time=${hh}:${mm} ${band}`;
}
document.getElementById('reset-btn').addEventListener('click', resetAll);

sigCard.addEventListener('click', () => {
  if (significator) openZoom(significator.image, significator.name, 'Significator');
});
cardZoom.addEventListener('click', closeZoom);
renderSigCard();

focusInput();

// iOS raises the soft keyboard only for a focus() that runs synchronously inside
// a user gesture — never from a setTimeout (so focusInput, which defers, can't do
// it). The send (return key) and zoom-dismiss taps already focus in-gesture; the
// one gap is the opening turn, which has no gesture. Seat focus on the first page
// interaction so the first question is typable, then later gestures keep it up.
function _focusNow() {
  if (document.body.classList.contains('no-input')) return;
  if (cardZoom.classList.contains('open')) return;
  _msgInput.focus({preventScroll: true});
  if (document.activeElement === _msgInput) { _caretToEnd(); renderCaret(); }
}
(function armOpeningFocus() {
  const onFirst = e => {
    // Taps on a real control (the input, a button/link, a card, the zoom) manage
    // their own focus — let them through.
    if (e.target.closest('button, a, input, textarea, [contenteditable], #spread-area, #card-zoom')) {
      document.removeEventListener('pointerdown', onFirst, true);
      return;
    }
    // Empty-space tap: without this, completing the tap on a non-editable element
    // blurs the input we just focused and iOS drops the keyboard. preventDefault
    // stops the tap from stealing focus.
    e.preventDefault();
    document.removeEventListener('pointerdown', onFirst, true);
    _focusNow();
  };
  document.addEventListener('pointerdown', onFirst, { capture: true, passive: false });
})();

// No Significator -> always force Phase 1 (selection interview), wiping any
// stale chat history so the bot leads cleanly.
if (!significator && messages.length) {
  messages = [];
  localStorage.removeItem(LS_MESSAGES);
}

if (messages.length) {
  for (const m of messages) {
    if (m.role === 'user' && m.content.startsWith('[') && m.content.endsWith(']')) {
      addEventMsg(m.content);
    } else {
      addMsg(m.role, m.content);
    }
  }
}

updateInputBarVisibility();
loadSpreadsMeta().then(renderSpread);

if (!significator) {
  const tm = tarotTimeMarker();
  const ev = spread
    ? `[opened /tarot; no Significator yet (spread already drawn — Significator must be chosen before any reading continues); ${tm}]`
    : `[opened /tarot; no Significator yet, no spread; ${tm}]`;
  autoTrigger(ev);
} else if (!messages.length) {
  autoTrigger(`[opened /tarot; Significator already chosen: ${significator.name}; no spread yet; ${tarotTimeMarker()}]`);
}
</script>
