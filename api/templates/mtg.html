
<style>
body { display:block !important; height:100vh; overflow:hidden !important; flex-direction:unset !important; align-items:unset !important; justify-content:unset !important; gap:unset !important; }
#terminal {
  position:fixed; top:0; left:0; right:0; bottom:104px;
  overflow-y:auto; padding:28px 44px;
  font-family:'BitLight',monospace; font-size:0.88rem; line-height:1.45;
  color:rgba(0,255,65,0.9);
}
.msg { margin-bottom:12px; max-width:720px; word-break:break-word; }
.msg.assistant::before { content:"> "; opacity:0.4; }
.msg.assistant { color:rgba(0,255,65,0.92); }
.msg.assistant p { margin:0 0 6px; }
.msg.assistant p:last-child { margin-bottom:0; }
.msg.assistant strong { color:rgba(0,255,65,1); font-weight:bold; }
.msg.assistant em { color:rgba(0,255,65,0.75); font-style:italic; }
.msg.assistant a { color:rgba(0,255,120,0.7) !important; text-decoration:underline !important; font-family:inherit !important; font-size:inherit !important; font-weight:inherit !important; letter-spacing:inherit !important; text-shadow:none !important; background:none !important; padding:0 !important; display:inline !important; }
.msg.assistant a:hover { color:rgba(0,255,120,1) !important; }
.msg.assistant code { background:rgba(0,255,65,0.08); padding:1px 4px; border-radius:2px; font-size:0.92em; }
.msg.assistant pre { background:rgba(0,255,65,0.05); border:1px solid rgba(0,255,65,0.15); padding:8px 12px; border-radius:3px; overflow-x:auto; margin:6px 0; }
.msg.assistant pre code { background:none; padding:0; }
.msg.assistant ul, .msg.assistant ol { margin:4px 0 4px 16px; padding:0; }
.msg.assistant li { margin-bottom:2px; }
.msg.assistant h1, .msg.assistant h2, .msg.assistant h3 { color:rgba(0,255,65,1); font-size:1em; font-weight:bold; margin:8px 0 4px; }
.msg.assistant hr { border:none; border-top:1px solid rgba(0,255,65,0.35); margin:10px 0 16px; }
.msg.assistant table { border-collapse:collapse; margin:6px 0; }
.msg.assistant th, .msg.assistant td { border:1px solid rgba(0,255,65,0.25); padding:3px 10px; text-align:left; }
.msg.assistant th { color:rgba(0,255,65,1); border-color:rgba(0,255,65,0.45); }
.msg.assistant [data-card] { text-decoration:underline dotted rgba(0,255,65,0.5); text-underline-offset:3px; cursor:pointer; }
.msg.assistant [data-card]:hover { text-decoration:underline rgba(0,255,65,0.9); color:rgba(0,255,65,1); }
.msg.user::before { content:"$ "; opacity:0.5; }
.msg.user { color:rgba(0,255,65,0.42); white-space:pre-wrap; }
.msg.sys::before { content:"# "; }
.msg.sys { color:rgba(0,255,65,0.26); font-size:0.72rem; }
#blinkcursor { display:inline-block; width:8px; height:1em; background:rgba(0,255,65,0.9); vertical-align:text-bottom; animation:blink 1s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
#input-bar {
  position:fixed; bottom:58px; left:0; right:0;
  padding:0 44px;
  background:rgba(0,0,0,0.94);
  border-top:1px solid rgba(0,255,65,0.1);
  display:flex; align-items:center; gap:10px;
}
#input-line {
  flex:1; display:flex; align-items:center;
  border:1px solid rgba(0,255,65,0.2);
  padding:8px 12px; gap:0;
}
#input-line:focus-within { border-color:rgba(0,255,65,0.55); }
#input-prompt {
  color:rgba(0,255,65,0.55); font-family:'Iosevka Mayukai Monolite',monospace; font-size:0.9rem;
  white-space:nowrap; user-select:none; padding-right:8px;
}
#msg-input {
  flex:1; background:none; border:none;
  color:rgba(0,255,65,0.95); font-family:'Iosevka Mayukai Monolite',monospace; font-size:16px;
  padding:0; outline:none; caret-color:rgba(0,255,65,1);
}
#msg-input::placeholder { color:rgba(0,255,65,0.15); }
.exec-send {
  background:none; border:none; color:rgba(0,255,65,0.25); font-family:'Iosevka Mayukai Monolite',monospace;
  font-size:0.78rem; padding:8px 0 8px 6px; cursor:pointer; transition:color 0.2s;
}
.exec-send:hover { color:rgba(0,255,65,0.75); }
.exec-send:disabled { opacity:0.12; cursor:default; }
#card-tooltip {
  position:fixed; z-index:9999; pointer-events:none;
  display:none; flex-direction:column; gap:0;
  filter:drop-shadow(0 4px 18px rgba(0,0,0,0.7));
}
#card-tooltip img {
  width:223px; height:auto; border-radius:10px; display:block;
}
#card-tooltip.loading::after {
  content:''; display:block; width:223px; height:311px;
  background:rgba(0,255,65,0.05); border:1px solid rgba(0,255,65,0.15);
  border-radius:10px;
}
</style>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<div id="card-tooltip"><img id="card-tooltip-img" src="" alt=""></div>
<div id="terminal"></div>
<div id="input-bar">
  <div id="input-line">
    <span id="input-prompt">mtg@rules:~$</span>
    <input id="msg-input" type="text" placeholder="ask a rules question..." autofocus>
  </div>
  <button class="exec-send" onclick="clearChat()">clear</button>
</div>

<script>
let messages = [];
let streaming = false;
let _sessionId = 'mtg_' + Date.now().toString(36);

const terminal = document.getElementById('terminal');
const _WELCOME = "Hi (＊＾▽＾)／! Ask about card interactions, rules, or mechanics - I'll look up oracle text, rulings, and comprehensive rules.";

const _renderer = new marked.Renderer();
_renderer.link = ({href, title, text}) => {
  if (href && href.includes('scryfall.com')) {
    const plain = text.replace(/<[^>]*>/g, '');
    return `<span data-card="${plain.replace(/"/g, '&quot;')}">${text}</span>`;
  }
  return `<a href="${href}" target="_blank" rel="noopener"${title ? ` title="${title}"` : ''}>${text}</a>`;
};
function renderText(raw) {
  return marked.parse(raw, {renderer: _renderer});
}

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = renderText(text);
  terminal.appendChild(div);
  terminal.scrollTop = terminal.scrollHeight;
  return div;
}

function addStreamDiv() {
  const div = document.createElement('div');
  div.className = 'msg assistant';
  const span = document.createElement('span');
  span.id = 'stream-span';
  const cur = document.createElement('span');
  cur.id = 'blinkcursor';
  div.appendChild(span);
  div.appendChild(cur);
  terminal.appendChild(div);
  return {div, span, cur};
}

async function sendMsg() {
  if (streaming) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.focus();
  addMsg('user', text);
  messages.push({role:'user', content: text});
  await streamResponse();
}

async function streamResponse() {
  streaming = true;
  const {div, span, cur} = addStreamDiv();
  let fullText = '';

  try {
    const r = await fetch('/api/mtg/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages, session_id: _sessionId}),
    });

    if (!r.ok) throw new Error(await r.text());

    const reader = r.body.getReader();
    const dec = new TextDecoder();
    let buf = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += dec.decode(value, {stream:true});
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let data;
        try { data = JSON.parse(line.slice(6)); } catch { continue; }
        if (data.type === 'text') {
          fullText += data.delta;
          span.innerHTML = renderText(fullText);
          terminal.scrollTop = terminal.scrollHeight;
        } else if (data.type === 'tool_call') {
          const label = data.name === 'lookup_card' ? `card lookup — ${data.count} found`
            : data.name === 'lookup_rulings' ? `rulings — ${data.count} found`
            : `rules — ${data.count} found`;
          addMsg('sys', `[ ${label} ]`);
          const sysMsgs = terminal.querySelectorAll('.msg.sys');
          if (sysMsgs.length > 3) sysMsgs[0].remove();
        }
      }
    }

    cur.remove();
    if (fullText) messages.push({role:'assistant', content: fullText});
  } catch(e) {
    cur.remove();
    div.textContent = '[error: ' + e.message + ']';
    div.style.color = 'rgba(255,100,100,0.75)';
  }

  streaming = false;
}

function clearChat() {
  if (streaming) return;
  messages = [];
  _sessionId = 'mtg_' + Date.now().toString(36);
  terminal.innerHTML = '';
  addMsg('assistant', _WELCOME);
  document.getElementById('msg-input').focus();
}

addMsg('assistant', _WELCOME);

document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

// Card image hover tooltip via Scryfall
const _tooltip = document.getElementById('card-tooltip');
const _tooltipImg = document.getElementById('card-tooltip-img');
const _imgCache = {};

function _positionTooltip(e) {
  const pad = 16, w = 223 + pad;
  const x = e.clientX + pad + w > window.innerWidth ? e.clientX - w : e.clientX + pad;
  const y = Math.min(e.clientY - 40, window.innerHeight - 340);
  _tooltip.style.left = x + 'px';
  _tooltip.style.top = y + 'px';
}

async function _showCardImage(name, e) {
  _tooltip.className = 'loading';
  _tooltip.style.display = 'flex';
  _positionTooltip(e);
  _tooltipImg.src = '';

  if (!_imgCache[name]) {
    try {
      const r = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(name)}`);
      if (!r.ok) { _imgCache[name] = null; }
      else {
        const d = await r.json();
        const img = d.image_uris?.normal || d.card_faces?.[0]?.image_uris?.normal || null;
        _imgCache[name] = img ? {img, url: d.scryfall_uri} : null;
      }
    } catch { _imgCache[name] = null; }
  }

  if (_imgCache[name]) {
    _tooltipImg.src = _imgCache[name].img;
    _tooltip.className = '';
  } else {
    _tooltip.style.display = 'none';
  }
}

terminal.addEventListener('click', e => {
  const el = e.target.closest('[data-card]');
  if (!el || !el.closest('.msg.assistant')) return;
  const cached = _imgCache[el.dataset.card];
  if (cached?.url) window.open(cached.url, '_blank', 'noopener');
});

terminal.addEventListener('mouseover', e => {
  const el = e.target.closest('[data-card]');
  if (el && el.closest('.msg.assistant')) {
    _showCardImage(el.dataset.card, e);
    el._mtgActive = true;
  }
});

terminal.addEventListener('mousemove', e => {
  const el = e.target.closest('[data-card]');
  if (el && el._mtgActive) _positionTooltip(e);
});

terminal.addEventListener('mouseout', e => {
  const el = e.target.closest('[data-card]');
  if (el && el._mtgActive) {
    el._mtgActive = false;
    _tooltip.style.display = 'none';
  }
});
</script>
